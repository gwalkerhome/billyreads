<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billy Reads | Editor Automático</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-blue: #4a90e2;
            --danger-red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; box-sizing: border-box;
        }

        .main-card {
            width: 100%; max-width: 500px;
            background: white; border-radius: 20px;
            padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center; margin-bottom: auto;
        }

        h1 { font-family: var(--mc-font); color: #2c3e50; font-size: 1.2rem; margin-top: 0; }
        
        .upload-zone {
            border: 3px dashed #cbd5e0;
            border-radius: 15px;
            padding: 40px 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .upload-zone:active { background: #edf2f7; }

        #fileInput { display: none; }

        #status {
            font-size: 0.9rem; color: #7f8c8d;
            margin-top: 15px; min-height: 1.5em;
        }

        /* Bottom Asset Strip */
        .bottom-strip-container {
            width: 100%; max-width: 600px;
            margin-top: 20px;
        }

        .strip-label {
            font-family: var(--mc-font); font-size: 0.7rem;
            color: #94a3b8; margin-bottom: 8px; text-transform: uppercase;
        }

        .asset-strip {
            display: flex; gap: 12px;
            overflow-x: auto; padding: 10px 5px;
            height: 120px; align-items: center;
        }

        .asset-strip::-webkit-scrollbar { height: 4px; }
        .asset-strip::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }

        .strip-item {
            position: relative;
            min-width: 80px; height: 100px;
            background-size: cover; background-position: center;
            border-radius: 10px; border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .btn-del {
            position: absolute; top: -8px; right: -8px;
            width: 24px; height: 24px; background: var(--danger-red);
            color: white; border: 2px solid white; border-radius: 50%;
            font-size: 14px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
        }

        .nav-footer { margin-top: 20px; width: 100%; max-width: 500px; display: flex; gap: 10px; }
        .btn-bottom {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            font-family: var(--mc-font); cursor: pointer; font-size: 0.8rem;
        }
        #btn-back { background: #eee; color: #666; }
    </style>
</head>
<body>

    <div class="main-card">
        <h1 id="book-title-display">CARGANDO...</h1>
        
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <strong style="color: var(--accent-blue);">+ AÑADIR PÁGINA</strong>
            <p style="font-size: 0.8rem; color: #94a3b8;">Toca para subir foto del libro.<br>La IA leerá y traducirá el texto automáticamente.</p>
        </div>
        
        <input type="file" id="fileInput" accept="image/*">
        <div id="status">Esperando página...</div>
    </div>

    <div class="bottom-strip-container">
        <div class="strip-label">Páginas en este libro (Desliza para ver todas):</div>
        <div class="asset-strip" id="assetStrip"></div>
    </div>

    <div class="nav-footer">
        <button id="btn-back" class="btn-bottom" onclick="location.href='pages.html'">FINALIZAR</button>
    </div>

    <script type="module">
        import { db, storage, collection, doc, setDoc, getDocs, deleteDoc, query, orderBy, ref, uploadBytes, getDownloadURL } from "./firebase-bridge.js";

        const bookid = localStorage.getItem('current_book_id');
        const booktitle = localStorage.getItem('current_book_title');
        
        if (!bookid) location.href = 'magicbook.html';
        document.getElementById('book-title-display').innerText = booktitle.toUpperCase();

        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const strip = document.getElementById('assetStrip');

        // This is the Magic: AI OCR + Translation logic
        async function processPageWithAI(file) {
            status.innerText = "🤖 La IA está leyendo y traduciendo...";
            
            // Note: This connects to your wingen/flashapp prompt logic. 
            // We are passing the image to Gemini 2.5-flash.
            // For now, we simulate the returned JSON structure.
            
            return {
                es: "Había una vez un pequeño Billy...", // OCR result
                va: "Hi havia una vegada un xicotet Billy...", // Translated
                en: "Once upon a time there was a little Billy..." // Translated
            };
        }

        async function refreshStrip() {
            const q = query(collection(db, `books/${bookid}/pages`), orderBy("pagenumber", "asc"));
            const snap = await getDocs(q);
            strip.innerHTML = "";
            snap.forEach(docSnap => {
                const data = docSnap.data();
                const item = document.createElement('div');
                item.className = 'strip-item';
                item.style.backgroundImage = `url('${data.imageurl}')`;
                item.innerHTML = `<button class="btn-del" onclick="window.deletePage('${docSnap.id}')">✕</button>`;
                strip.appendChild(item);
            });
        }

        window.deletePage = async (pageid) => {
            if (!confirm("¿Borrar esta página?")) return;
            await deleteDoc(doc(db, `books/${bookid}/pages`, pageid));
            refreshStrip();
        };

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.style.color = "#4a90e2";
            status.innerText = "📤 Subiendo imagen...";

            try {
                // 1. Process with AI (OCR & Translate)
                const aiData = await processPageWithAI(file);

                // 2. Upload to Storage
                const pageid = `page_${Date.now()}`;
                const storageRef = ref(storage, `books/${bookid}/pages/${pageid}`);
                const snap = await uploadBytes(storageRef, file);
                const url = await getDownloadURL(snap.ref);

                // 3. Save everything to Firestore
                const currentCount = strip.querySelectorAll('.strip-item').length;
                await setDoc(doc(collection(db, `books/${bookid}/pages`)), {
                    imageurl: url,
                    pagenumber: currentCount + 1,
                    text_es: aiData.es,
                    text_va: aiData.va,
                    text_en: aiData.en,
                    uploadedat: Date.now()
                });

                status.style.color = "green";
                status.innerText = "✅ Página procesada y guardada.";
                refreshStrip();
            } catch (err) {
                status.style.color = "red";
                status.innerText = "❌ Error: " + err.message;
            }
        };

        refreshStrip();
    </script>
</body>
</html>
