<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billy Reads | Editor de Páginas</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-blue: #4a90e2;
            --danger-red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container {
            width: 100%; max-width: 500px;
            background: white; border-radius: 20px;
            padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box; margin-bottom: 20px;
        }

        h1 { font-family: var(--mc-font); color: #2c3e50; text-align: center; margin-top: 0; font-size: 1.2rem; }
        #book-title-display { text-align: center; color: var(--accent-blue); font-weight: bold; margin-bottom: 15px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; font-size: 0.8rem; text-transform: uppercase; }
        
        input[type="file"], textarea {
            width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 12px;
            box-sizing: border-box; font-size: 0.9rem; font-family: inherit;
        }

        textarea { height: 120px; resize: none; }

        .btn-upload {
            width: 100%; padding: 15px;
            background: var(--accent-blue); color: white;
            border: none; border-radius: 15px;
            font-family: var(--mc-font); font-size: 1rem; cursor: pointer;
        }
        .btn-upload:disabled { background: #cbd5e0; }

        #status { margin-top: 10px; text-align: center; font-size: 0.8rem; min-height: 1.2em; }

        /* The Live Preview Strip with Delete */
        .preview-label { align-self: flex-start; max-width: 500px; width: 100%; font-family: var(--mc-font); font-size: 0.7rem; color: #7f8c8d; margin-bottom: 5px; }
        .asset-strip {
            width: 100%; max-width: 500px; height: 130px;
            background: #e2e8f0; border-radius: 15px;
            display: flex; gap: 10px; padding: 10px;
            overflow-x: auto; box-sizing: border-box;
            border: 2px dashed #cbd5e0;
        }
        .strip-item-container { position: relative; flex-shrink: 0; }
        .strip-item {
            width: 85px; height: 100%;
            background-size: cover; background-position: center;
            border-radius: 8px; background-color: #fff;
            border: 2px solid white;
        }
        .btn-del {
            position: absolute; top: -5px; right: -5px;
            width: 24px; height: 24px; background: var(--danger-red);
            color: white; border-radius: 50%; border: 2px solid white;
            font-size: 12px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .nav-footer { margin-top: 20px; width: 100%; max-width: 500px; }
        #btn-back {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            background: #eee; color: #666; font-family: var(--mc-font); cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AÑADIR PÁGINA</h1>
        <div id="book-title-display">---</div>
        
        <div class="input-group">
            <label>Imagen de la Página</label>
            <input type="file" id="pageFile" accept="image/*">
        </div>

        <div class="input-group">
            <label>Texto Original (Español)</label>
            <textarea id="textSource" placeholder="Escribe el texto que aparece en la página..."></textarea>
        </div>

        <button id="uploadBtn" class="btn-upload">GUARDAR Y TRADUCIR</button>
        <div id="status"></div>
    </div>

    <div class="preview-label">PÁGINAS ACTUALES (Toca la X para borrar):</div>
    <div class="asset-strip" id="assetStrip"></div>

    <div class="nav-footer">
        <button id="btn-back" onclick="location.href='pages.html'">FINALIZAR</button>
    </div>

    <script type="module">
        import { db, storage, collection, doc, setDoc, getDocs, deleteDoc, query, orderBy, ref, uploadBytes, getDownloadURL, deleteObject } from "./firebase-bridge.js";

        const bookid = localStorage.getItem('current_book_id');
        const booktitle = localStorage.getItem('current_book_title');
        
        if (!bookid) location.href = 'magicbook.html';
        document.getElementById('book-title-display').innerText = booktitle;

        const uploadBtn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const strip = document.getElementById('assetStrip');

        // Logic to fetch translations from Gemini (Mock for now until API bridge is active)
        async function getTranslations(text) {
            // Note: In the final stage, this will call your cloud function or flashapp bridge.
            // For the immediate build, we simulate the logic.
            return {
                va: `[VAL] ${text}`, 
                en: `[ENG] ${text}`
            };
        }

        async function refreshStrip() {
            const q = query(collection(db, `books/${bookid}/pages`), orderBy("pagenumber", "asc"));
            const snap = await getDocs(q);
            strip.innerHTML = "";
            snap.forEach(docSnap => {
                const data = docSnap.data();
                const container = document.createElement('div');
                container.className = 'strip-item-container';
                container.innerHTML = `
                    <div class="strip-item" style="background-image: url('${data.imageurl}')"></div>
                    <button class="btn-del" onclick="window.deletePage('${docSnap.id}', '${data.imageurl}')">✕</button>
                `;
                strip.appendChild(container);
            });
        }

        window.deletePage = async (pageid, url) => {
            if (!confirm("¿Seguro que quieres borrar esta página?")) return;
            try {
                await deleteDoc(doc(db, `books/${bookid}/pages`, pageid));
                // Optionally delete from storage too
                refreshStrip();
            } catch (e) { alert("Error al borrar: " + e.message); }
        };

        async function savePage() {
            const file = document.getElementById('pageFile').files[0];
            const sourceText = document.getElementById('textSource').value;

            if (!file || !sourceText) {
                alert("Selecciona una imagen y escribe el texto.");
                return;
            }

            uploadBtn.disabled = true;
            status.innerText = "⏳ Traducción en curso...";

            try {
                // Simulate AI Translation (In future this connects to your Gemini node)
                const translations = await getTranslations(sourceText);
                
                status.innerText = "📤 Subiendo archivos...";
                const pageid = `page_${Date.now()}`;
                const storagePath = `books/${bookid}/pages/${pageid}`;
                const pageRef = ref(storage, storagePath);
                const snap = await uploadBytes(pageRef, file);
                const url = await getDownloadURL(snap.ref);

                const currentCount = strip.querySelectorAll('.strip-item').length;
                
                await setDoc(doc(collection(db, `books/${bookid}/pages`)), {
                    imageurl: url,
                    pagenumber: currentCount + 1,
                    text_es: sourceText,
                    text_va: translations.va,
                    text_en: translations.en,
                    uploadedat: Date.now()
                });

                status.style.color = "green";
                status.innerText = "✅ ¡Listo!";
                document.getElementById('textSource').value = "";
                document.getElementById('pageFile').value = "";
                
                refreshStrip();
                uploadBtn.disabled = false;
            } catch (error) {
                status.style.color = "red";
                status.innerText = "❌ " + error.message;
                uploadBtn.disabled = false;
            }
        }

        uploadBtn.onclick = savePage;
        refreshStrip();
    </script>
</body>
</html>
