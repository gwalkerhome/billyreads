<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>billy reads | editor automático</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-blue: #4a90e2;
            --danger-red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; box-sizing: border-box;
        }

        #btn-top-back {
            position: absolute;
            top: 25px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 100;
            font-size: 1.2rem;
            color: #2c3e50;
            border: none;
        }
        #btn-top-back:active { transform: scale(0.9); }

        .main-card {
            width: 100%; max-width: 500px;
            background: white; border-radius: 20px;
            padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center; margin-bottom: auto;
            margin-top: 50px;
        }

        h1 { font-family: var(--mc-font); color: #2c3e50; font-size: 1.2rem; margin-top: 0; }
        
        .upload-zone {
            border: 3px dashed #cbd5e0;
            border-radius: 15px;
            padding: 40px 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .upload-zone:active { background: #edf2f7; }

        #file-input { display: none; }

        #status {
            font-size: 0.9rem; color: #7f8c8d;
            margin-top: 15px; min-height: 1.5em;
        }

        .bottom-strip-container {
            width: 100%; max-width: 600px;
            margin-top: 20px;
        }

        .strip-label {
            font-family: var(--mc-font); font-size: 0.7rem;
            color: #94a3b8; margin-bottom: 8px; text-transform: uppercase;
        }

        .asset-strip {
            display: flex; gap: 12px;
            overflow-x: auto; padding: 10px 5px;
            height: 120px; align-items: center;
        }

        .asset-strip::-webkit-scrollbar { height: 4px; }
        .asset-strip::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }

        .strip-item {
            position: relative;
            min-width: 80px; height: 100px;
            background-size: cover; background-position: center;
            border-radius: 10px; border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .btn-del {
            position: absolute; top: -8px; right: -8px;
            width: 24px; height: 24px; background: var(--danger-red);
            color: white; border: 2px solid white; border-radius: 50%;
            font-size: 14px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
        }

        .nav-footer { margin-top: 20px; width: 100%; max-width: 500px; display: flex; gap: 10px; }
        .btn-bottom {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            font-family: var(--mc-font); cursor: pointer; font-size: 0.8rem;
            background: #4a90e2; color: white;
        }
    </style>
</head>
<body>

    <button id="btn-top-back" onclick="location.href='pages.html'">←</button>

    <div class="main-card">
        <h1 id="book-title-display">cargando...</h1>
        
        <div class="upload-zone" onclick="document.getElementById('file-input').click()">
            <strong style="color: var(--accent-blue);">+ añadir página</strong>
            <p style="font-size: 0.8rem; color: #94a3b8;">toca para subir foto del libro.<br>la ia leerá y traducirá todo automáticamente.</p>
        </div>
        
        <input type="file" id="file-input" accept="image/*">
        <div id="status">esperando página...</div>
    </div>

    <div class="bottom-strip-container">
        <div class="strip-label">páginas (desliza para ver todas / toca x para borrar):</div>
        <div class="asset-strip" id="asset-strip"></div>
    </div>

    <div class="nav-footer">
        <button class="btn-bottom" onclick="location.href='pages.html'">finalizar</button>
    </div>

    <script type="module">
        import { db, storage, collection, doc, setDoc, getDocs, deleteDoc, query, orderBy, ref, uploadBytes, getDownloadURL } from "./firebase-bridge.js";

        const bookid = localStorage.getItem('current_book_id');
        const booktitle = localStorage.getItem('current_book_title');
        
        if (!bookid) location.href = 'magicbook.html';
        document.getElementById('book-title-display').innerText = booktitle ? booktitle.toLowerCase() : "libro sin título";

        const fileinput = document.getElementById('file-input');
        const status = document.getElementById('status');
        const strip = document.getElementById('asset-strip');

        async function processpagewithai(file) {
            status.innerText = "🤖 la ia está leyendo y traduciendo...";
            
            const prompt = `Perform OCR on this image. 
            1. Detect if the text is in Spanish, Valenciano, or English.
            2. Regardless of the original language, provide a translation for all three:
               - "es": The text in Spanish.
               - "va": The text in Valenciano.
               - "en": The text in English.
            Return ONLY a valid JSON object with these three keys. Use lowercase for all keys.`;

            try {
                if (typeof window.callgemini === "function") {
                    const response = await window.callgemini(file, prompt);
                    // Clean response in case AI includes markdown code blocks
                    const jsonstring = response.replace(/```json|```/gi, '').trim();
                    return JSON.parse(jsonstring);
                } else {
                    throw new Error("ai bridge not configured");
                }
            } catch (e) {
                console.error("ai error:", e);
                throw e;
            }
        }

        async function refreshstrip() {
            try {
                const q = query(collection(db, `books/${bookid}/pages`), orderBy("pagenumber", "asc"));
                const snap = await getDocs(q);
                strip.innerHTML = "";
                snap.forEach(docsnap => {
                    const data = docsnap.data();
                    const item = document.createElement('div');
                    item.className = 'strip-item';
                    item.style.backgroundImage = `url('${data.imageurl}')`;
                    item.innerHTML = `<button class="btn-del" onclick="window.deletepage('${docsnap.id}')">✕</button>`;
                    strip.appendChild(item);
                });
                if (status.innerText === "esperando página...") status.innerText = "galería actualizada.";
            } catch (err) {
                console.error("refresh error:", err);
                status.innerText = "❌ error cargando galería.";
            }
        }

        window.deletepage = async (pageid) => {
            if (!confirm("¿borrar esta página?")) return;
            try {
                await deleteDoc(doc(db, `books/${bookid}/pages`, pageid));
                refreshstrip();
            } catch (err) {
                alert("error al borrar: " + err.message);
            }
        };

        fileinput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.style.color = "#4a90e2";
            status.innerText = "📤 procesando imagen...";

            try {
                const aidata = await processpagewithai(file);

                const pageid = `page_${Date.now()}`;
                const storageref = ref(storage, `books/${bookid}/pages/${pageid}`);
                const snap = await uploadBytes(storageref, file);
                const url = await getDownloadURL(snap.ref);

                const currentcount = strip.querySelectorAll('.strip-item').length;
                await setDoc(doc(collection(db, `books/${bookid}/pages`)), {
                    imageurl: url,
                    pagenumber: currentcount + 1,
                    text_es: aidata.es,
                    text_va: aidata.va,
                    text_en: aidata.en,
                    uploadedat: Date.now()
                });

                status.style.color = "green";
                status.innerText = "✅ guardado correctamente.";
                refreshstrip();
            } catch (err) {
                status.style.color = "red";
                status.innerText = "❌ error: " + err.message;
            }
        };

        refreshstrip();
    </script>
</body>
</html>
