<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión: BillyReads</title>
    <link rel="stylesheet" href="flashstyle.css">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
        }
        #game-container {
            width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            position: relative;
        }
        .dynamic-pane {
            position: absolute;
            display: flex;
            justify-content: center; align-items: center;
            text-align: center; box-sizing: border-box;
            overflow: hidden;
            background: transparent; border: none; outline: none;
        }
        #val-translation {
            color: #AACCFF; font-size: 1.2rem; font-style: italic;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        #val-translation.visible { opacity: 1; }
        
        .xp-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 10px;
            background: rgba(0,0,0,0.5); z-index: 100;
        }
        #energy-bar {
            height: 100%; width: 0%; background: #76FF03;
            transition: width 0.3s;
        }
        .mc-btn { cursor: pointer; }
    </style>
</head>
<body>
    <div id="game-container">
        
        <div class="xp-container"><div id="energy-bar"></div></div>

        <button id="pane-back" class="dynamic-pane mc-btn" onclick="window.location.href='index.html'"></button>
        
        <div id="pane-birch" class="dynamic-pane"><span id="subject-tag">SINCRONIZANDO...</span></div>
        <div id="pane-stone" class="dynamic-pane"><span id="target-sentence">CARGANDO MISIÓN...</span></div>
        <div id="pane-valenciano" class="dynamic-pane"><span id="val-translation"></span></div>
        
        <button id="pane-record" class="dynamic-pane mc-btn"></button>
        
        <button id="pane-speech" class="dynamic-pane mc-btn" onclick="playSpeech()"></button>
        <button id="pane-val-toggle" class="dynamic-pane mc-btn" onclick="toggleValenciano()">V</button>
        
        <div id="pane-slab" class="dynamic-pane"><span id="live-transcript">ESPERANDO SEÑAL...</span></div>

    </div>

    <script>
        function toggleValenciano() {
            const trans = document.getElementById('val-translation');
            if (trans) trans.classList.toggle('visible');
        }

        // iPad Compatibility: Explicitly trigger the mic function from the module
        window.triggerMic = () => {
            if (window.toggleMicModule) {
                window.toggleMicModule();
            }
        };
        document.getElementById('pane-record').onclick = window.triggerMic;
    </script>

    <script type="module" src="flashapp.js"></script>
</body>
</html>
