<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión: Flashcards</title>
    <link rel="stylesheet" href="flashstyle.css">
</head>
<body>
    <div class="app-container">
        <div class="header-status">
            <div class="status-label">SINCRONIZACIÓN DE MISIÓN</div>
            <div class="progress-container">
                <div id="energy-bar" class="energy-fill"></div>
            </div>
        </div>

        <main class="mission-card">
            <div class="category-tag" id="subject-tag">SISTEMA LISTO</div>
            
            <div class="display-zone">
                <h2 id="target-sentence">Iniciando protocolo...</h2>
                
                <button class="btn-audio-circle" onclick="playAudio()" aria-label="Escuchar">
                    <span class="icon">🔊</span>
                </button>
            </div>

            <details class="valenciano-bridge">
                <summary>DESCIFRAR EN VALENCIANO</summary>
                <div class="valenciano-content">
                    <p id="val-translation">...</p>
                </div>
            </details>
        </main>

        <section class="action-zone">
            <div id="live-transcript" class="transcript-preview">ESPERANDO SEÑAL...</div>
            
            <button class="btn-stage-1" id="record-btn">
                <span class="icon">🎤</span>
                <span class="label">COMUNICAR</span>
            </button>
        </section>

        <footer>
            <button class="btn-exit" onclick="window.location.href='index.html'">ABORTAR MISIÓN</button>
        </footer>
    </div>
    
    <script src="flashapp.js"></script>
</body>
</html>
