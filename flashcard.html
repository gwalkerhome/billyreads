<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión: Flashcards</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="flashstyle.css">
</head>
<body>
    <div class="app-container">
        <div class="progress-container">
            <div id="energy-bar" class="energy-fill"></div>
        </div>

        <main class="practice-card">
            <div class="category-tag">CARGANDO...</div>
            
            <h2 id="target-sentence">Cargando misión...</h2>
            
            <div class="audio-controls">
                <button class="btn-audio" onclick="playAudio()">🔊 Escuchar</button>
            </div>

            <details class="valenciano-bridge">
                <summary>Ver en Valenciano</summary>
                <p id="val-translation">...</p>
            </details>

            <div id="live-transcript" class="transcript-preview">Esperando voz...</div>
        </main>

        <section class="action-zone">
            <button class="btn-stage-1" id="record-btn">
                <span class="icon">🎤</span>
                <span class="label">HABLAR</span>
            </button>
        </section>

        <footer>
            <button class="btn-back" onclick="window.location.href='index.html'">SALIR</button>
        </footer>
    </div>
    <script src="flashapp.js"></script>
</body>
</html>
