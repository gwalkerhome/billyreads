<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión: BillyReads</title>
    <link rel="stylesheet" href="flashstyle.css">
    <style>
        .dynamic-pane {
            position: absolute;
            display: flex;
            justify-content: center; align-items: center;
            text-align: center; box-sizing: border-box;
            transition: opacity 0.3s;
        }
        #val-translation {
            color: #AACCFF; font-size: 1.2rem; font-style: italic;
            opacity: 0; transition: opacity 0.3s;
        }
        #val-translation.visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="xp-container"><div id="energy-bar"></div></div>

    <button id="back-btn" class="dynamic-pane" onclick="window.location.href='index.html'"></button>
    <div id="subject-tag" class="dynamic-pane">SINCRONIZANDO...</div>
    <div id="target-sentence" class="dynamic-pane">CARGANDO MISIÓN...</div>
    <div id="val-translation" class="dynamic-pane"></div>
    
    <button id="record-btn" class="dynamic-pane mc-btn">
        <span class="label" style="display:none">COMUNICAR</span>
    </button>
    <button id="audio-btn" class="dynamic-pane mc-btn" onclick="playAudio()"></button>
    <button id="val-btn" class="dynamic-pane mc-btn" onclick="toggleValenciano()">V</button>
    
    <div id="live-transcript" class="dynamic-pane">ESPERANDO SEÑAL...</div>

    <script>
        function applyTheme() {
            const themeId = parseInt(localStorage.getItem('bg_flashcard'));
            if (!themeId) {
                document.body.style.backgroundImage = "url('assets/minecraft.png')";
                return;
            }
            const request = indexedDB.open("ThemeDB", 1);
            request.onsuccess = e => {
                const db = e.target.result;
                const transaction = db.transaction("themes", "readonly");
                const store = transaction.objectStore("themes");
                const getRequest = store.get(themeId);
                getRequest.onsuccess = () => {
                    const theme = getRequest.result;
                    if (theme) document.body.style.backgroundImage = `url('${theme.data}')`;
                };
            };
        }

        function applyCalibration() {
            const saved = JSON.parse(localStorage.getItem('ui_positions'));
            if (!saved) return;
            const mapping = {
                'pane-back': 'back-btn',
                'pane-birch': 'subject-tag',
                'pane-stone': 'target-sentence',
                'pane-record': 'record-btn',
                'pane-speech': 'audio-btn',
                'pane-valenciano': 'val-translation',
                'pane-val-toggle': 'val-btn',
                'pane-slab': 'live-transcript'
            };
            Object.keys(mapping).forEach(paneKey => {
                const el = document.getElementById(mapping[paneKey]);
                const pos = saved[paneKey];
                if (el && pos) {
                    el.style.top = pos.t + '%';
                    el.style.left = pos.l + '%';
                    el.style.width = pos.w + '%';
                    el.style.height = pos.h + '%';
                }
            });
        }

        function toggleValenciano() {
            document.getElementById('val-translation').classList.toggle('visible');
        }

        window.onload = () => {
            applyTheme();
            applyCalibration();
        };
    </script>
    <script src="flashapp.js"></script>
</body>
</html>
