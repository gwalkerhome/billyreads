<button id="back-btn" class="dynamic-pane" onclick="window.location.href='index.html'"></button>
<div id="subject-tag" class="dynamic-pane">Sincronizando...</div>
<div id="target-sentence" class="dynamic-pane">Iniciando...</div>
<div id="control-zone" class="dynamic-pane">
    <button id="record-btn" class="mc-btn"></button>
    <button id="audio-btn" class="mc-btn" onclick="playAudio()"></button>
</div>
<div id="transcript-zone" class="dynamic-pane">
    <div id="live-transcript">Esperando...</div>
</div>

<script>
    // THE MASTER STROKE: Apply saved positions
    function applyCalibration() {
        const saved = JSON.parse(localStorage.getItem('ui_positions'));
        if (!saved) return; // Use CSS defaults if nothing saved

        const mapping = {
            'pane-back': 'back-btn',
            'pane-birch': 'subject-tag',
            'pane-stone': 'target-sentence',
            'pane-buttons': 'control-zone',
            'pane-slab': 'transcript-zone'
        };

        Object.keys(mapping).forEach(paneKey => {
            const elementId = mapping[paneKey];
            const el = document.getElementById(elementId);
            const pos = saved[paneKey];
            if (el && pos) {
                el.style.position = 'absolute';
                el.style.top = pos.t + '%';
                el.style.left = pos.l + '%';
                el.style.width = pos.w + '%';
                el.style.height = pos.h + '%';
            }
        });
    }

    // Call this as soon as the page loads
    window.onload = () => {
        applyCalibration();
        fetchJourneyCards(); // Your existing AI logic
    };
</script>
