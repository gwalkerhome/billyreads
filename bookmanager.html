<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billy Reads | Administrar Biblioteca</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --danger-red: #ff5252;
            --accent-blue: #4a90e2;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container {
            width: 100%; max-width: 800px;
            background: white; border-radius: 20px;
            padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { font-family: var(--mc-font); color: #2c3e50; text-align: center; margin-bottom: 30px; }

        .book-item {
            display: flex; align-items: center; gap: 20px;
            padding: 15px; border-bottom: 1px solid #eee;
        }

        .book-thumb {
            width: 60px; height: 80px;
            background-size: cover; background-position: center;
            border-radius: 8px; border: 1px solid #ddd;
            background-color: #eee;
        }

        .book-info { flex-grow: 1; }
        .book-title { font-weight: bold; font-size: 1.1rem; color: #2c3e50; }
        .book-meta { font-size: 0.8rem; color: #7f8c8d; }

        .action-btns { display: flex; gap: 10px; }
        .btn {
            padding: 10px 15px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-size: 0.8rem;
            text-transform: uppercase;
        }

        .btn-edit { background: #e3f2fd; color: var(--accent-blue); }
        .btn-delete { background: #ffebee; color: var(--danger-red); }

        .nav-footer { margin-top: 30px; display: flex; gap: 15px; width: 100%; max-width: 800px; }
        #btn-back { 
            flex: 1; padding: 15px; border: none; border-radius: 12px;
            font-family: var(--mc-font); cursor: pointer; text-align: center; 
            background: #cbd5e0; color: #4a5568; text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>GESTOR DE LIBROS</h1>
        <div id="book-list">
            <p style="text-align: center; color: #888;">Consultando biblioteca...</p>
        </div>
    </div>

    <div class="nav-footer">
        <button id="btn-back" onclick="location.href='settings.html'">VOLVER A AJUSTES</button>
    </div>

    <script type="module">
        // Mirroring the exact working imports from magicbooks.html
        import { db, collection, getDocs, doc, deleteDoc, query, orderBy } from "./firebase-bridge.js";

        async function fetchBooks() {
            const listDiv = document.getElementById('book-list');
            
            try {
                // Using the exact same query that works in magicbooks.html
                const q = query(collection(db, "books"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                
                listDiv.innerHTML = "";

                if (snap.empty) {
                    listDiv.innerHTML = "<p style='text-align:center; color:#888;'>No hay libros todavía.</p>";
                    return;
                }

                snap.forEach(d => {
                    const book = d.data();
                    const id = d.id;
                    
                    const item = document.createElement('div');
                    item.className = 'book-item';
                    item.innerHTML = `
                        <div class="book-thumb" style="background-image: url('${book.coverURL}')"></div>
                        <div class="book-info">
                            <div class="book-title">${book.title}</div>
                            <div class="book-meta">ID: ${id}</div>
                        </div>
                        <div class="action-btns">
                            <button class="btn btn-delete" onclick="confirmDelete('${id}', '${book.title}')">Borrar</button>
                        </div>
                    `;
                    listDiv.appendChild(item);
                });
            } catch (e) { 
                console.error("Manager Error:", e);
                listDiv.innerHTML = `<p style='color:red; text-align:center;'>Error: ${e.message}</p>`;
            }
        }

        window.confirmDelete = async (id, title) => {
            if (confirm(`¿Borrar "${title}"?`)) {
                try {
                    await deleteDoc(doc(db, "books", id));
                    location.reload();
                } catch (e) {
                    alert("Error al borrar.");
                }
            }
        };

        window.onload = fetchBooks;
    </script>
</body>
</html>
