<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinAdjust: UI Architect</title>
    <style>
        :root { --mc-font: 'Arial Black', sans-serif; }
        
        body, html {
            margin: 0; padding: 0; background: #000;
            height: 100vh; width: 100vw; overflow: hidden; font-family: var(--mc-font);
        }

        /* GOLD STANDARD CONTAINER */
        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            margin: 0 auto; display: block;
        }

        /* UNIFIED ASSET CLASS */
        .dynamic-pane {
            position: absolute;
            display: flex; justify-content: center; align-items: center;
            text-align: center; box-sizing: border-box; overflow: hidden;
            background: rgba(255,255,255,0.1); /* Subtle visibility for editing */
            border: 1px dashed rgba(255,255,255,0.3);
            cursor: pointer; color: white; font-size: 10px;
            text-shadow: 1px 1px 2px black;
        }

        .active { border: 4px solid #76FF03 !important; background: rgba(118, 255, 3, 0.2) !important; z-index: 100; }
        
        #control-panel {
            position: fixed; right: 20px; top: 20px; width: 260px;
            background: rgba(0,0,0,0.95); color: #76FF03; padding: 20px;
            border-radius: 15px; border: 2px solid #333; z-index: 1000;
        }
        
        input[type=range] { width: 100%; margin: 8px 0; }
        
        button { 
            width: 100%; padding: 12px; margin-top: 10px; border: none; 
            border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        #save-btn { background: #76FF03; color: black; }
        #back-btn { background: #444; color: white; }
        .pos-label { font-size: 11px; color: #aaa; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="pane-back" class="dynamic-pane" onclick="selectPane('pane-back')">BACK</div>
        <div id="pane-birch" class="dynamic-pane" onclick="selectPane('pane-birch')">SUBJECT</div>
        <div id="pane-stone" class="dynamic-pane" onclick="selectPane('pane-stone')">SENTENCE</div>
        <div id="pane-record" class="dynamic-pane" onclick="selectPane('pane-record')">REC</div>
        <div id="pane-speech" class="dynamic-pane" onclick="selectPane('pane-speech')">VOICE</div>
        <div id="pane-valenciano" class="dynamic-pane" onclick="selectPane('pane-valenciano')">VAL TEXT</div>
        <div id="pane-val-toggle" class="dynamic-pane" onclick="selectPane('pane-val-toggle')">V</div>
        <div id="pane-slab" class="dynamic-pane" onclick="selectPane('pane-slab')">TRANSCRIPT</div>
    </div>

    <div id="control-panel">
        <h3 id="panel-title" style="margin:0">SELECT ZONE</h3>
        <span id="pos-info" class="pos-label">T:0% L:0% W:0% H:0%</span>
        <label>Top %</label><input type="range" id="val-top" min="0" max="100" oninput="updateUI()">
        <label>Left %</label><input type="range" id="val-left" min="0" max="100" oninput="updateUI()">
        <label>Width %</label><input type="range" id="val-width" min="1" max="100" oninput="updateUI()">
        <label>Height %</label><input type="range" id="val-height" min="1" max="100" oninput="updateUI()">
        <button id="save-btn" onclick="savePositions()">SAVE TO CLOUD</button>
        <button id="back-btn" onclick="window.location.href='themes.html'">BACK TO THEMES</button>
    </div>

    <script type="module">
        import { getGlobalTheme, saveGlobalTheme } from "./firebase-bridge.js";

        let activeId = null;
        let currentThemeId = null;
        let currentThemeUrl = null;
        let positions = {};

        async function init() {
            const cloudState = await getGlobalTheme();
            const container = document.getElementById('game-container');
            
            if (cloudState) {
                currentThemeId = cloudState.activeThemeId;
                currentThemeUrl = cloudState.activeThemeUrl;
                positions = cloudState.layout || {};
                if (currentThemeUrl) container.style.backgroundImage = `url('${currentThemeUrl}')`;
            }

            Object.keys(positions).forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    const p = positions[id];
                    el.style.top = p.t + '%'; el.style.left = p.l + '%';
                    el.style.width = p.w + '%'; el.style.height = p.h + '%';
                }
            });
        }

        window.selectPane = (id) => {
            if(activeId) document.getElementById(activeId).classList.remove('active');
            activeId = id;
            document.getElementById(id).classList.add('active');
            const p = positions[id] || {t:0, l:0, w:10, h:10};
            document.getElementById('val-top').value = p.t;
            document.getElementById('val-left').value = p.l;
            document.getElementById('val-width').value = p.w;
            document.getElementById('val-height').value = p.h;
            updatePosLabel(p);
        };

        window.updateUI = () => {
            if(!activeId) return;
            const t = parseInt(document.getElementById('val-top').value);
            const l = parseInt(document.getElementById('val-left').value);
            const w = parseInt(document.getElementById('val-width').value);
            const h = parseInt(document.getElementById('val-height').value);
            const el = document.getElementById(activeId);
            el.style.top = t+'%'; el.style.left = l+'%';
            el.style.width = w+'%'; el.style.height = h+'%';
            positions[activeId] = {t, l, w, h};
            updatePosLabel(positions[activeId]);
        };

        function updatePosLabel(p) {
            document.getElementById('pos-info').innerText = `T:${p.t}% L:${p.l}% W:${p.w}% H:${p.h}%`;
        }

        window.savePositions = async () => {
            const btn = document.getElementById('save-btn');
            btn.innerText = "SAVING...";
            const success = await saveGlobalTheme(currentThemeId, currentThemeUrl, positions);
            btn.innerText = success ? "SAVE TO CLOUD" : "FAILED";
        };

        init();
    </script>
</body>
</html>
