<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinAdjust: UI Calibrator & Architect</title>
    <style>
        :root { --mc-font: 'Arial Black', sans-serif; }
        body {
            margin: 0; padding: 0;
            background: #000 url('assets/minecraft.png') no-repeat center center fixed;
            background-size: 100% 100%; 
            height: 100vh; width: 100vw;
            overflow-x: hidden; font-family: var(--mc-font);
        }
        .pane {
            position: absolute; border: 2px dashed rgba(255,255,255,0.5);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: white; font-size: 10px; box-sizing: border-box;
            text-shadow: 1px 1px 2px black;
        }
        .active { border: 4px solid #76FF03 !important; background: rgba(118, 255, 3, 0.2) !important; z-index: 100; }
        
        #control-panel {
            position: fixed; right: 20px; top: 20px; width: 260px;
            background: rgba(0,0,0,0.95); color: #76FF03; padding: 20px;
            border-radius: 15px; border: 2px solid #333; z-index: 1000;
        }
        input[type=range] { width: 100%; margin: 8px 0; }
        button { 
            width: 100%; padding: 12px; margin-top: 10px; border: none; 
            border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        #save-btn { background: #76FF03; color: black; }
        #blueprint-btn { background: #4a90e2; color: white; }
        #back-btn { background: #444; color: white; }
        .pos-label { font-size: 11px; color: #aaa; margin-bottom: 10px; display: block; }
        
        #blueprint-box {
            width: 90%; max-width: 800px; height: 150px; margin: 20px auto; 
            display: none; background: #111; color: #76FF03; 
            font-family: monospace; font-size: 12px; padding: 15px; border: 1px solid #4a90e2;
        }
    </style>
</head>
<body>

    <div id="pane-back" class="pane" onclick="selectPane('pane-back')">BACK</div>
    <div id="pane-birch" class="pane" onclick="selectPane('pane-birch')">SUBJECT</div>
    <div id="pane-stone" class="pane" onclick="selectPane('pane-stone')">SENTENCE</div>
    <div id="pane-record" class="pane" onclick="selectPane('pane-record')" style="background:rgba(255,0,0,0.2)">TNT (REC)</div>
    <div id="pane-speech" class="pane" onclick="selectPane('pane-speech')" style="background:rgba(255,255,0,0.2)">MEGA (VOICE)</div>
    <div id="pane-valenciano" class="pane" onclick="selectPane('pane-valenciano')" style="background:rgba(0,0,255,0.2)">VAL TEXT</div>
    <div id="pane-val-toggle" class="pane" onclick="selectPane('pane-val-toggle')" style="background:rgba(255,255,255,0.2)">VAL TOGGLE</div>
    <div id="pane-slab" class="pane" onclick="selectPane('pane-slab')">TRANSCRIPT</div>

    <div id="control-panel">
        <h3 id="panel-title" style="margin:0">Select a Zone</h3>
        <span id="pos-info" class="pos-label">T:0% L:0% W:0% H:0%</span>

        <label>Top %</label><input type="range" id="val-top" min="0" max="100" oninput="updateUI()">
        <label>Left %</label><input type="range" id="val-left" min="0" max="100" oninput="updateUI()">
        <label>Width %</label><input type="range" id="val-width" min="1" max="100" oninput="updateUI()">
        <label>Height %</label><input type="range" id="val-height" min="1" max="100" oninput="updateUI()">
        
        <button id="save-btn" onclick="savePositions()">SAVE CALIBRATION</button>
        <button id="blueprint-btn" onclick="generateBlueprint()">GET GEMINI PROMPT INFO</button>
        <button id="back-btn" onclick="window.location.href='settings.html'">BACK TO SETTINGS</button>
    </div>

    <center>
        <textarea id="blueprint-box" readonly placeholder="Blueprint data will appear here..."></textarea>
    </center>

    <script>
        let activeId = null;
        const defaultPos = {
            'pane-back': {t:2, l:2, w:10, h:12},
            'pane-birch': {t:10, l:30, w:40, h:10},
            'pane-stone': {t:25, l:20, w:60, h:45},
            'pane-record': {t:72, l:43, w:7, h:12},
            'pane-speech': {t:72, l:50, w:7, h:12},
            'pane-valenciano': {t:83, l:30, w:40, h:8},
            'pane-val-toggle': {t:83, l:90, w:5, h:8},
            'pane-slab': {t:92, l:25, w:50, h:6}
        };

        let positions = JSON.parse(localStorage.getItem('ui_positions')) || defaultPos;

        function init() {
            Object.keys(positions).forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    const p = positions[id];
                    el.style.top = p.t + '%'; el.style.left = p.l + '%';
                    el.style.width = p.w + '%'; el.style.height = p.h + '%';
                }
            });
        }

        function selectPane(id) {
            if(activeId) document.getElementById(activeId).classList.remove('active');
            activeId = id;
            document.getElementById(id).classList.add('active');
            document.getElementById('panel-title').innerText = id.replace('pane-', '').toUpperCase();
            
            const p = positions[id];
            document.getElementById('val-top').value = p.t;
            document.getElementById('val-left').value = p.l;
            document.getElementById('val-width').value = p.w;
            document.getElementById('val-height').value = p.h;
            updatePosLabel(p);
        }

        function updateUI() {
            if(!activeId) return;
            const t = parseInt(document.getElementById('val-top').value);
            const l = parseInt(document.getElementById('val-left').value);
            const w = parseInt(document.getElementById('val-width').value);
            const h = parseInt(document.getElementById('val-height').value);
            
            const el = document.getElementById(activeId);
            el.style.top = t+'%'; el.style.left = l+'%';
            el.style.width = w+'%'; el.style.height = h+'%';
            
            positions[activeId] = {t, l, w, h};
            updatePosLabel(positions[activeId]);
        }

        function updatePosLabel(p) {
            document.getElementById('pos-info').innerText = `T:${p.t}% L:${p.l}% W:${p.w}% H:${p.h}%`;
        }

        function savePositions() {
            localStorage.setItem('ui_positions', JSON.stringify(positions));
            alert("System Calibrated!");
        }

        function generateBlueprint() {
    const bBox = document.getElementById('blueprint-box');
    bBox.style.display = 'block';
    
    // Header for the prompt
    let promptInfo = "### SYSTEM INSTRUCTION: BACKGROUND GENERATION BRIEF ###\n";
    promptInfo += "Create a high-fidelity, 16:9 background image for a child's reading app. The style must be high-quality and thematic based on the prompt at the end. The following UI objects must be visually integrated into the scenery at these exact coordinates:\n\n. CRITICAL RULE 1: Every text window and monitor listed below MUST be COMPLETELY EMPTY and blank. No placeholder text, no "Sector 7" labels, and no UI gibberish. They must be clean surfaces (glass, metal, or screens) ready for digital overlay.
CRITICAL RULE 2: You must follow these exact pixel-perfect coordinates. Do not center objects where you think they look "cool"; use the mathematical centers provided.";
    
    // Mapping internal names to descriptive names for Gemini
    const names = {
        'pane-back': 'Thematic BACK BUTTON',
        'pane-birch': 'SUBJECT/TITLE text display sign',
        'pane-stone': 'MAIN FOCUS text display window (Monitor/Screen)',
        'pane-record': 'RECORD ACTION button (e.g. TNT or mic)',
        'pane-speech': 'LISTEN/AUDIO button (e.g. Megaphone)',
        'pane-val-toggle': 'VALENCIANO TOGGLE button',
        'pane-valenciano': 'TRANSLATED TEXT display window',
        'pane-slab': 'TRANSCRIPT dynamic text area'
    };

    Object.keys(positions).forEach(id => {
        const p = positions[id];
        const label = names[id] || id.toUpperCase();
        
        // Calculate center points for the AI artist
        const centerX = p.l + (p.w / 2);
        const centerY = p.t + (p.h / 2);
        
        promptInfo += `${label}:\n`;
        promptInfo += `   - Center: ${centerX}% horizontal, ${centerY}% vertical\n`;
        promptInfo += `   - Dimensions: ${p.w}% width, ${p.h}% height\n\n`;
    });
    
    promptInfo += "The theme for this background image will be: [INSERT THEME HERE, e.g., MINECRAFT, SPACE, UNDERWATER]";
    
    bBox.value = promptInfo;
    bBox.scrollIntoView({ behavior: 'smooth' });
    bBox.select();
}

        init();
    </script>
</body>
</html>
