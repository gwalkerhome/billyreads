<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billy Reads | Mis Libros Mágicos</title>
    <style>
        :root {
            /* Change to rgba(0,0,0,0) once you are happy with the alignment */
            --hitbox-color: rgba(255, 0, 0, 0.4); 
            --hitbox-border: 1px solid rgba(255, 255, 255, 0.5);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #1a1a1a;
            display: flex; align-items: center; justify-content: center;
        }

        .background-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('assets/magicback1.png') no-repeat center center;
            background-size: contain; 
        }

        .hitbox {
            position: absolute;
            cursor: pointer;
            background: var(--hitbox-color);
            border: var(--hitbox-border);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #btn-back { 
            top: 2%; left: 2%; width: 12%; height: 14%; 
            border-radius: 15px;
        }

        #btn-settings { 
            bottom: 3.5%; right: 3.5%; width: 12%; height: 14%; 
            border-radius: 15px;
        }

        #btn-new-book {
            top: 66.5%; left: 57.5%; width: 28.5%; height: 11.5%;
            border-radius: 10px;
        }

        .scroll-container {
            position: absolute;
            top: 27%; left: 15%; width: 28%; height: 38%;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 8px;
            background: var(--hitbox-color);
            border: var(--hitbox-border);
            box-sizing: border-box;
            border-radius: 5px;
        }

        .scroll-container::-webkit-scrollbar { width: 0px; background: transparent; }

        .book-thumb {
            width: 100%;
            aspect-ratio: 1 / 1.3;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            transition: transform 0.1s;
        }
        .book-thumb:active { transform: scale(0.95); }

        #empty-msg {
            grid-column: span 2;
            color: white;
            font-size: 0.7rem;
            text-align: center;
            font-family: sans-serif;
            opacity: 0.7;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div id="btn-back" class="hitbox" onclick="location.href='index.html'"></div>
        <div id="btn-settings" class="hitbox" onclick="location.href='settings.html'"></div>

        <div class="scroll-container" id="bookGrid">
            <div id="empty-msg">Cargando biblioteca...</div>
        </div>

        <div id="btn-new-book" class="hitbox" onclick="location.href='newbook.html'"></div>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase-bridge.js";

        async function loadBooks() {
            const grid = document.getElementById('bookGrid');
            
            try {
                const q = query(collection(db, "books"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                grid.innerHTML = ''; // Clear loading message

                if (querySnapshot.empty) {
                    grid.innerHTML = '<div id="empty-msg">No hay libros todavía. ¡Añade uno nuevo!</div>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const book = docSnap.data();
                    const id = docSnap.id;

                    const thumb = document.createElement('div');
                    thumb.className = 'book-thumb';
                    thumb.style.backgroundImage = `url('${book.coverURL}')`;
                    thumb.onclick = () => selectBook(id, book.backdropURL, book.title);
                    grid.appendChild(thumb);
                });
            } catch (err) {
                console.error("Error loading library:", err);
                grid.innerHTML = '<div id="empty-msg">Error al conectar con la nube.</div>';
            }
        }

        window.selectBook = (id, backdropURL, title) => {
            localStorage.setItem('current_book_id', id);
            localStorage.setItem('current_book_backdrop', backdropURL);
            localStorage.setItem('current_book_title', title);
            location.href = 'reading.html';
        };

        window.onload = loadBooks;
    </script>
</body>
</html>
