<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>billy reads | mi biblioteca 3d</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-gold: #ffd700;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #0a0a0a;
            font-family: var(--mc-font);
        }

        .library-stage {
            position: relative;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            perspective: 2000px;
            overflow: hidden;
        }

        /* Navigation */
        #btn-back { position: absolute; top: 2%; left: 2%; width: 10%; height: 10%; z-index: 100; cursor: pointer; }
        #btn-new { 
            position: absolute; bottom: 5%; right: 5%; z-index: 100;
            padding: 15px 30px; border: 2px solid var(--accent-gold); 
            border-radius: 50px; color: var(--accent-gold); font-size: 0.8rem; 
            text-decoration: none; background: rgba(0,0,0,0.5);
        }

        .book-track {
            position: absolute;
            top: 0; left: 0;
            display: flex; align-items: center;
            height: 100%; padding: 0 20vw; gap: 60px;
            overflow-x: auto; scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .book-track::-webkit-scrollbar { display: none; }

        .book-container {
            position: relative;
            min-width: 280px; height: 420px;
            scroll-snap-align: center;
            transform-style: preserve-3d;
            display: flex; align-items: center; justify-content: center;
        }

        /* THE BOOK ASSEMBLY - Now centered on the template */
        .book-assembly {
            position: relative;
            width: 240px; /* Base width for the 3D object */
            aspect-ratio: 2 / 3;
            transform-style: preserve-3d;
            animation: float 5s ease-in-out infinite;
            animation-delay: var(--float-delay);
            cursor: pointer;
        }

        @keyframes float {
            0%, 100% { transform: rotateY(-8deg) translateY(0); }
            50% { transform: rotateY(8deg) translateY(-15px); }
        }

        /* THE TEMPLATE - Now the background of the assembly */
        .book-template {
            position: absolute;
            inset: 0;
            background: url('assets/flbktmp.png') no-repeat center center;
            background-size: contain;
            z-index: 5; /* Above the cover to create the 'frame' feel */
            pointer-events: none;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        /* THE COVER - Sits BEHIND the template frame */
        .book-cover-art {
            position: absolute;
            /* Adjust these values until the cover peeks through the gold frame perfectly */
            top: 14%; 
            left: 18%;
            width: 65%; 
            height: 72%;
            background-size: cover;
            background-position: center;
            z-index: 2; /* Behind the template */
            border-radius: 3px;
        }

        .book-shadow {
            position: absolute;
            bottom: -30px; left: 50%;
            width: 140px; height: 15px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            filter: blur(8px);
            transform: translateX(-50%);
        }

        #loading-overlay {
            position: fixed; inset: 0; background: black; z-index: 2000;
            display: flex; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">leyendo pergaminos...</div>

    <div class="library-stage">
        <a href="index.html" id="btn-back"></a>
        <a href="newbook.html" id="btn-new">+ añadir libro</a>
        <div class="book-track" id="book-track"></div>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase-bridge.js";

        async function init3dLibrary() {
            const track = document.getElementById('book-track');
            const loader = document.getElementById('loading-overlay');

            try {
                const q = query(collection(db, "books"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                track.innerHTML = "";

                if (snap.empty) {
                    track.innerHTML = "<div style='color:white; width: 60vw; text-align:center;'>La biblioteca está vacía.</div>";
                    loader.style.display = 'none';
                    return;
                }

                snap.forEach((docSnap, index) => {
                    const book = docSnap.data();
                    const bookid = docSnap.id;
                    const coverUrl = book.coverURL || book.imageurl;

                    const container = document.createElement('div');
                    container.className = 'book-container';
                    const delay = (Math.random() * -5).toFixed(2) + "s";
                    
                    container.innerHTML = `
                        <div class="book-shadow"></div>
                        <div class="book-assembly" style="--float-delay: ${delay}" onclick="selectBook('${bookid}', '${book.title}', '${book.backdropURL}')">
                            <div class="book-cover-art" style="background-image: url('${coverUrl}')"></div>
                            <div class="book-template"></div>
                        </div>
                    `;
                    track.appendChild(container);
                });

                loader.style.display = 'none';
            } catch (error) {
                console.error("Load error:", error);
                loader.innerText = "Error de conexión.";
            }
        }

        window.selectBook = (id, title, backdrop) => {
            localStorage.setItem('current_book_id', id);
            localStorage.setItem('current_book_title', title);
            localStorage.setItem('current_book_backdrop', backdrop);
            location.href = 'pages.html';
        };

        window.onload = init3dLibrary;
    </script>
</body>
</html>
