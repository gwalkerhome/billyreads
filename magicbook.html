<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>billy reads | mi biblioteca 3d</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-gold: #ffd700;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            background: #00ff00; /* Green Screen */
            font-family: var(--mc-font);
        }

        .library-stage {
            position: relative;
            width: 100vw; height: 100vh;
            background: #00ff00; 
            perspective: 2000px;
            display: flex; align-items: center; justify-content: center;
        }

        #btn-back { position: absolute; top: 5%; left: 3%; width: 60px; height: 60px; z-index: 100; cursor: pointer; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: none; font-size: 1.5rem; }
        
        #btn-new { 
            position: absolute; bottom: 5%; right: 5%; z-index: 100;
            padding: 15px 30px; border: 3px solid #000; 
            border-radius: 50px; color: #000; font-family: var(--mc-font);
            text-decoration: none; background: var(--accent-gold);
            box-shadow: 0 4px 0 #b8860b;
        }

        .book-track {
            display: flex; align-items: center;
            height: 100%; width: 100%; padding: 0 30vw; gap: 80px;
            overflow-x: auto; scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .book-track::-webkit-scrollbar { display: none; }

        .book-container {
            position: relative;
            min-width: 300px; height: 450px;
            scroll-snap-align: center;
            transform-style: preserve-3d;
            display: flex; align-items: center; justify-content: center;
        }

        .book-assembly {
            position: relative;
            width: 280px; height: 400px;
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite;
            animation-delay: var(--float-delay);
            cursor: pointer;
        }

        @keyframes float {
            0%, 100% { transform: rotateY(-10deg) translateY(0); }
            50% { transform: rotateY(10deg) translateY(-20px); }
        }

        /* THE TEMPLATE - Pushed Forward slightly on Z axis */
        .book-template {
            position: absolute;
            inset: 0;
            background: url('assets/flbktmp.png') no-repeat center center;
            background-size: contain;
            z-index: 20; 
            pointer-events: none;
            /* Move it 2 pixels toward the user */
            transform: translateZ(2px);
            backface-visibility: hidden;
        }

        /* THE COVER - Pushed Backward slightly on Z axis */
        .book-cover-art {
            position: absolute;
            top: 15.5%; 
            left: 21%;
            width: 61%; 
            height: 68.5%;
            background-size: cover;
            background-position: center;
            z-index: 5;
            /* Move it 2 pixels away from the user */
            transform: translateZ(-2px);
            backface-visibility: hidden;
            background-color: #222;
        }

        .book-shadow {
            position: absolute;
            bottom: -30px; left: 50%;
            width: 160px; height: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            filter: blur(10px);
            transform: translateX(-50%);
        }

        #loading-overlay {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">conjurando pergaminos...</div>

    <div class="library-stage">
        <button id="btn-back" onclick="location.href='index.html'">←</button>
        <a href="newbook.html" id="btn-new">+ añadir libro</a>
        <div class="book-track" id="book-track"></div>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase-bridge.js";

        async function init3dLibrary() {
            const track = document.getElementById('book-track');
            const loader = document.getElementById('loading-overlay');

            try {
                const q = query(collection(db, "books"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                track.innerHTML = "";

                if (snap.empty) {
                    track.innerHTML = "<div style='color:black; width: 40vw; text-align:center;'>No hay libros.</div>";
                    loader.style.display = 'none';
                    return;
                }

                snap.forEach((docSnap, index) => {
                    const book = docSnap.data();
                    // Crucial: check both naming possibilities
                    const url = book.coverURL || book.imageurl;

                    const container = document.createElement('div');
                    container.className = 'book-container';
                    const delay = (Math.random() * -5).toFixed(2) + "s";
                    
                    container.innerHTML = `
                        <div class="book-shadow"></div>
                        <div class="book-assembly" style="--float-delay: ${delay}" onclick="selectBook('${docSnap.id}', '${book.title}', '${book.backdropURL}')">
                            <div class="book-cover-art" style="background-image: url('${url}')"></div>
                            <div class="book-template"></div>
                        </div>
                    `;
                    track.appendChild(container);
                });

                loader.style.display = 'none';
            } catch (error) {
                console.error("Load error:", error);
                loader.innerText = "Error.";
            }
        }

        window.selectBook = (id, title, backdrop) => {
            localStorage.setItem('current_book_id', id);
            localStorage.setItem('current_book_title', title);
            localStorage.setItem('current_book_backdrop', backdrop);
            location.href = 'pages.html';
        };

        window.onload = init3dLibrary;
    </script>
</body>
</html>
