<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billy Reads | Biblioteca Mágica</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
        }

        body {
            margin: 0; padding: 20px;
            background: #f0f4f8;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 {
            font-family: var(--mc-font);
            color: #2c3e50;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .book-card {
            background: white;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Hitbox alignment per previous notes */
            border: 2px solid transparent; 
        }

        .book-card:active {
            transform: scale(0.95);
        }

        .book-cover {
            width: 100%;
            aspect-ratio: 3/4;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            background-color: #eee;
        }

        .book-title {
            margin-top: 12px;
            font-family: var(--mc-font);
            font-size: 0.9rem;
            color: #34495e;
            text-align: center;
            line-height: 1.2;
        }

        .nav-footer {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .btn-nav {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-family: var(--mc-font);
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        #btn-settings { background: #cbd5e0; color: #4a5568; }
        #btn-add { background: #4a90e2; color: white; }

        #loading-msg {
            font-family: var(--mc-font);
            color: #94a3b8;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h1>MIS LIBROS MÁGICOS</h1>

    <div id="loading-msg">Abriendo el cofre...</div>
    
    <div class="book-grid" id="bookGrid">
        </div>

    <div class="nav-footer">
        <button id="btn-settings" class="btn-nav" onclick="location.href='settings.html'">Ajustes</button>
        <button id="btn-add" class="btn-nav" onclick="location.href='newbook.html'">+ Nuevo Libro</button>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase-bridge.js";

        async function loadLibrary() {
            const grid = document.getElementById('bookGrid');
            const loader = document.getElementById('loading-msg');

            try {
                // Fetch from the "books" collection, ordered by most recent
                const q = query(collection(db, "books"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                
                loader.style.display = 'none';
                grid.innerHTML = "";

                if (snap.empty) {
                    grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:#94a3b8;'>La biblioteca está vacía. ¡Añade tu primer libro!</p>";
                    return;
                }

                snap.forEach(doc => {
                    const book = doc.data();
                    const bookid = doc.id;

                    const card = document.createElement('div');
                    card.className = 'book-card';
                    card.innerHTML = `
                        <div class="book-cover" style="background-image: url('${book.coverURL}')"></div>
                        <div class="book-title">${book.title}</div>
                    `;

                    card.onclick = () => {
                        // Store the selection for the next pages
                        localStorage.setItem('current_book_id', bookid);
                        localStorage.setItem('current_book_title', book.title);
                        localStorage.setItem('current_book_backdrop', book.backdropURL);
                        
                        // Move to the page selection screen
                        location.href = 'reading.html';
                    };

                    grid.appendChild(card);
                });

            } catch (error) {
                console.error("Library load error:", error);
                loader.innerText = "Error al cargar la biblioteca.";
            }
        }

        window.onload = loadLibrary;
    </script>
</body>
</html>
