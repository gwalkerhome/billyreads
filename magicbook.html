<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>billy reads | mi biblioteca 3d</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-gold: #ffd700;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #0a0a0a;
            font-family: var(--mc-font);
        }

        .library-stage {
            position: relative;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            perspective: 2000px;
            overflow: hidden;
        }

        .hitbox {
            position: absolute;
            cursor: pointer;
            z-index: 100;
        }
        #btn-back { top: 2%; left: 2%; width: 10%; height: 10%; }
        
        #btn-new { 
            bottom: 5%; right: 5%; 
            padding: 15px 30px;
            border: 2px solid var(--accent-gold); 
            border-radius: 50px; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--accent-gold); font-size: 0.8rem; 
            text-decoration: none;
            background: rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        #btn-new:active { transform: scale(0.9); }

        .book-track {
            position: absolute;
            top: 0; left: 0;
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0 20vw;
            gap: 120px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .book-track::-webkit-scrollbar { display: none; }

        .book-container {
            position: relative;
            min-width: 300px; height: 450px;
            scroll-snap-align: center;
            transform-style: preserve-3d;
            display: flex; align-items: center; justify-content: center;
        }

        .book-assembly {
            position: relative;
            /* Scaled assembly to match your cover size better */
            width: 260px; height: 390px;
            transform-style: preserve-3d;
            animation: float 5s ease-in-out infinite;
            animation-delay: var(--float-delay);
            cursor: pointer;
        }

        @keyframes float {
            0%, 100% { transform: rotateY(-12deg) translateY(0); }
            50% { transform: rotateY(8deg) translateY(-20px); }
        }

        /* The Template - now fits snug to the cover dimensions */
        .book-template {
            position: absolute;
            inset: -10%; /* Grows slightly larger than the container to provide the border */
            background: url('assets/flbk.png') no-repeat center center;
            background-size: contain;
            z-index: 1;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.7));
            pointer-events: none;
        }

        /* The Art - Centered and scaled to the inner gold frame */
        .book-cover-art {
            position: absolute;
            /* Coordinates tuned for flbk.png inner window */
            top: 15%; 
            left: 21%;
            width: 63%; 
            height: 69%;
            background-size: cover;
            background-position: center;
            z-index: 10;
            border-radius: 2px;
            /* mix-blend-mode: multiply; /* Optional: merges art with template texture */
        }

        .book-shadow {
            position: absolute;
            bottom: -40px; left: 50%;
            width: 160px; height: 20px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            filter: blur(10px);
            transform: translateX(-50%);
            z-index: 0;
        }

        #loading-overlay {
            position: fixed; inset: 0; background: black; z-index: 2000;
            display: flex; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">leyendo pergaminos...</div>

    <div class="library-stage">
        <a href="index.html" id="btn-back" class="hitbox"></a>
        <a href="newbook.html" id="btn-new" class="hitbox">+ añadir libro</a>

        <div class="book-track" id="book-track"></div>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase-bridge.js";

        async function init3dLibrary() {
            const track = document.getElementById('book-track');
            const loader = document.getElementById('loading-overlay');

            try {
                const q = query(collection(db, "books"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                
                track.innerHTML = "";

                if (snap.empty) {
                    track.innerHTML = "<div style='color:white; width: 60vw; text-align:center;'>La biblioteca está vacía.</div>";
                    loader.style.display = 'none';
                    return;
                }

                snap.forEach((docSnap, index) => {
                    const book = docSnap.data();
                    const bookid = docSnap.id;
                    const coverUrl = book.coverURL || book.imageurl;

                    const container = document.createElement('div');
                    container.className = 'book-container';
                    
                    const delay = (Math.random() * -5).toFixed(2) + "s";
                    
                    container.innerHTML = `
                        <div class="book-shadow"></div>
                        <div class="book-assembly" style="--float-delay: ${delay}" onclick="selectBook('${bookid}', '${book.title}', '${book.backdropURL}')">
                            <div class="book-template"></div>
                            <div class="book-cover-art" style="background-image: url('${coverUrl}')"></div>
                        </div>
                    `;

                    track.appendChild(container);
                });

                loader.style.display = 'none';

            } catch (error) {
                console.error("Library load error:", error);
                loader.innerText = "Error de conexión.";
            }
        }

        window.selectBook = (id, title, backdrop) => {
            localStorage.setItem('current_book_id', id);
            localStorage.setItem('current_book_title', title);
            localStorage.setItem('current_book_backdrop', backdrop);
            location.href = 'pages.html';
        };

        window.onload = init3dLibrary;
    </script>
</body>
</html>
