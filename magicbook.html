<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billy Reads | Mis Libros Mágicos</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-gold: #ffd700;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: sans-serif;
        }

        .background-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: url('assets/magicback1.png') no-repeat center center;
            background-size: cover;
        }

        /* --- Header Title --- */
        .page-title {
            position: absolute;
            top: 2.5%; left: 22%; width: 56%; height: 10%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-family: var(--mc-font); font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        /* --- Navigation Overlays --- */
        .nav-overlay {
            position: absolute; cursor: pointer;
            background: rgba(255,255,255,0); /* Transparent */
            border: none; border-radius: 50%;
        }
        #btn-back { top: 1%; left: 1%; width: 13%; height: 16%; }
        #btn-settings { bottom: 1%; right: 1%; width: 15%; height: 18%; }

        /* --- Scrollable Grid Section --- */
        .grid-label {
            position: absolute;
            top: 75%; left: 35%;
            font-family: var(--mc-font); font-size: 1.2rem; color: #5d4037;
        }

        .scroll-container {
            position: absolute;
            top: 22%; left: 11%; width: 37%; height: 52%;
            overflow-y: auto; padding: 10px; box-sizing: border-box;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
        }

        /* Hide scrollbar but keep functionality */
        .scroll-container::-webkit-scrollbar { display: none; }

        .book-thumb {
            width: 100%; aspect-ratio: 3/4;
            background: #e0d5c1; border: 3px solid #8d6e63; border-radius: 8px;
            cursor: pointer; transition: transform 0.2s;
            background-size: cover; background-position: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .book-thumb:hover { transform: scale(1.05); }

        /* --- Add Book Button --- */
        .btn-add-container {
            position: absolute;
            top: 66%; right: 10%; width: 28%; height: 12%;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-magic-add {
            background: linear-gradient(145deg, #76FF03, #64dd17);
            border: 2px solid #2e7d32; border-radius: 10px;
            color: #000; font-family: var(--mc-font); font-size: 0.9rem;
            padding: 15px 25px; cursor: pointer; box-shadow: 0 4px 0 #1b5e20;
            text-transform: uppercase; width: 90%;
        }
        .btn-magic-add:active { transform: translateY(2px); box-shadow: 0 2px 0 #1b5e20; }

    </style>
</head>
<body>

    <div class="background-container">
        
        <div class="page-title">MAGIC BOOKS</div>

        <button id="btn-back" class="nav-overlay" onclick="location.href='index.html'"></button>
        <button id="btn-settings" class="nav-overlay" onclick="location.href='settings.html'"></button>

        <div class="grid-label">CHOOSE A BOOK</div>

        <div class="scroll-container" id="bookGrid">
            <div class="book-thumb" onclick="selectBook('example1')" style="background-image: url('assets/placeholder_book.png')"></div>
            <div class="book-thumb" onclick="selectBook('example2')"></div>
            <div class="book-thumb" onclick="selectBook('example3')"></div>
            <div class="book-thumb" onclick="selectBook('example4')"></div>
        </div>

        <div class="btn-add-container">
            <button class="btn-magic-add" onclick="location.href='newbook.html'">+ Nuevo Libro</button>
        </div>

    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase-bridge.js";

        async function loadBooks() {
            const grid = document.getElementById('bookGrid');
            // Eventually replace the static examples with a Firebase fetch loop here
            console.log("Conectando a la biblioteca de Billy...");
            
            // Logic to fetch from 'books' collection will go here
        }

        window.selectBook = (bookId) => {
            localStorage.setItem('current_book_id', bookId);
            location.href = 'reading.html';
        };

        window.onload = loadBooks;
    </script>
</body>
</html>
