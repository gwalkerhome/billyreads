<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billy Reads | Mis Libros Mágicos</title>
    <style>
        :root {
            /* Semi-transparent red for alignment calibration */
            --hitbox-color: rgba(255, 0, 0, 0.4); 
            --hitbox-border: 1px solid rgba(255, 255, 255, 0.5);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #1a1a1a;
            display: flex; align-items: center; justify-content: center;
        }

        /* Essential for maintaining asset alignment across devices */
        .background-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('assets/magicback1.png') no-repeat center center;
            background-size: contain; 
        }

        /* Transparent Hitbox Overlays */
        .hitbox {
            position: absolute;
            cursor: pointer;
            background: var(--hitbox-color);
            border: var(--hitbox-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Back Button (Top Left Book) */
        #btn-back { 
            top: 1.5%; left: 1.5%; width: 14%; height: 17%; 
            border-radius: 20px;
        }

        /* Settings Button (Bottom Right Gear) */
        #btn-settings { 
            bottom: 2.5%; right: 2.5%; width: 14%; height: 17%; 
            border-radius: 20px;
        }

        /* New Book Button (Stone Slab) */
        #btn-new-book {
            top: 66.5%; left: 57.5%; width: 28.5%; height: 11.5%;
        }

        /* Scrollable Grid Section (Parchment Area) */
        .scroll-container {
            position: absolute;
            top: 23%; left: 10.5%; width: 34.5%; height: 47%;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 10px;
            background: var(--hitbox-color);
            border: var(--hitbox-border);
            box-sizing: border-box;
        }

        /* Custom Scrollbar for visibility during calibration */
        .scroll-container::-webkit-scrollbar { width: 5px; }
        .scroll-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); }

        .book-thumb {
            width: 100%;
            aspect-ratio: 3/4;
            background: rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }

    </style>
</head>
<body>

    <div class="background-container">
        
        <div id="btn-back" class="hitbox" onclick="location.href='index.html'"></div>

        <div id="btn-settings" class="hitbox" onclick="location.href='settings.html'"></div>

        <div class="scroll-container" id="bookGrid">
            <div class="book-thumb" onclick="selectBook('1')"></div>
            <div class="book-thumb" onclick="selectBook('2')"></div>
            <div class="book-thumb" onclick="selectBook('3')"></div>
            <div class="book-thumb" onclick="selectBook('4')"></div>
            <div class="book-thumb" onclick="selectBook('5')"></div>
            <div class="book-thumb" onclick="selectBook('6')"></div>
        </div>

        <div id="btn-new-book" class="hitbox" onclick="location.href='newbook.html'"></div>

    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase-bridge.js";

        // This function will eventually pull the actual thumbnails from Firebase
        async function loadBooks() {
            const grid = document.getElementById('bookGrid');
            console.log("Library cloud sync active...");
            // Firebase retrieval logic will be inserted here when ready
        }

        window.selectBook = (id) => {
            localStorage.setItem('current_book_id', id);
            location.href = 'reading.html';
        };

        window.onload = loadBooks;
    </script>
</body>
</html>
