<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billy Reads | Mis Libros Mágicos</title>
    <style>
        :root {
            /* Semi-transparent red for alignment calibration */
            --hitbox-color: rgba(255, 0, 0, 0.4); 
            --hitbox-border: 1px solid rgba(255, 255, 255, 0.5);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #1a1a1a;
            display: flex; align-items: center; justify-content: center;
        }

        /* Essential for maintaining asset alignment across devices */
        .background-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('assets/magicback1.png') no-repeat center center;
            background-size: contain; 
        }

        /* Transparent Hitbox Overlays */
        .hitbox {
            position: absolute;
            cursor: pointer;
            background: var(--hitbox-color);
            border: var(--hitbox-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Back Button (Top Left Book) - Adjusted to be tighter */
        #btn-back { 
            top: 2%; left: 2%; width: 12%; height: 14%; 
            border-radius: 15px;
        }

        /* Settings Button (Bottom Right Gear) - Adjusted to be tighter */
        #btn-settings { 
            bottom: 3.5%; right: 3.5%; width: 12%; height: 14%; 
            border-radius: 15px;
        }

        /* New Book Button (Stone Slab) - Nudged for alignment */
        #btn-new-book {
            top: 71%; left: 58.5%; width: 26.5%; height: 10%;
            border-radius: 10px;
        }

        /* Scrollable Grid Section (Parchment Area) - Resized to respect the knight */
        .scroll-container {
            position: absolute;
            top: 25.5%; left: 12.5%; width: 31%; height: 43%;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 8px;
            background: var(--hitbox-color);
            border: var(--hitbox-border);
            box-sizing: border-box;
            border-radius: 5px;
        }

        /* Hide scrollbar but keep functionality */
        .scroll-container::-webkit-scrollbar { width: 0px; background: transparent; }

        .book-thumb {
            width: 100%;
            aspect-ratio: 1 / 1.3;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }

    </style>
</head>
<body>

    <div class="background-container">
        
        <div id="btn-back" class="hitbox" onclick="location.href='index.html'"></div>

        <div id="btn-settings" class="hitbox" onclick="location.href='settings.html'"></div>

        <div class="scroll-container" id="bookGrid">
            <div class="book-thumb" onclick="selectBook('1')"></div>
            <div class="book-thumb" onclick="selectBook('2')"></div>
            <div class="book-thumb" onclick="selectBook('3')"></div>
            <div class="book-thumb" onclick="selectBook('4')"></div>
            <div class="book-thumb" onclick="selectBook('5')"></div>
            <div class="book-thumb" onclick="selectBook('6')"></div>
        </div>

        <div id="btn-new-book" class="hitbox" onclick="location.href='newbook.html'"></div>

    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase-bridge.js";

        async function loadBooks() {
            const grid = document.getElementById('bookGrid');
            console.log("Magic Library ready for Billy.");
            // Data loading logic will go here
        }

        window.selectBook = (id) => {
            localStorage.setItem('current_book_id', id);
            location.href = 'reading.html';
        };

        window.onload = loadBooks;
    </script>
</body>
</html>
