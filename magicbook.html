<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>billy reads | mi biblioteca 3d</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-gold: #ffd700;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: var(--mc-font);
        }

        .library-stage {
            position: relative;
            width: 100vw; height: 100vh;
            /* 16:9 Background Image */
            background: url('assets/magicback.png') no-repeat center center;
            background-size: cover; 
            perspective: 2000px;
            overflow: hidden;
        }

        /* Asset-based Buttons */
        .ui-btn {
            position: absolute;
            cursor: pointer;
            z-index: 100;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: transform 0.1s;
        }
        .ui-btn:active { transform: scale(0.9); }

        #btn-back { 
            top: 2%; left: 2%; 
            width: 80px; height: 80px; 
            background-image: url('assets/back1.png');
        }

        #btn-settings { 
            bottom: 2%; right: 2%; 
            width: 80px; height: 80px; 
            background-image: url('assets/settings.png');
        }

        /* The hidden button to add new books - keeping logic but removing CSS styling */
        #btn-new-logic {
            position: absolute;
            bottom: 2%;
            right: 12%;
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
            color: var(--accent-gold);
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.7rem;
            z-index: 101;
            border: 1px solid var(--accent-gold);
        }

        .book-track {
            position: absolute;
            top: 0; left: 0;
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0 10vw;
            gap: 40px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .book-track::-webkit-scrollbar { display: none; }

        .book-container {
            position: relative;
            min-width: 250px;
            height: 500px;
            scroll-snap-align: center;
            transform-style: preserve-3d;
            display: flex; align-items: center; justify-content: center;
        }

        .book-assembly {
            position: relative;
            width: 210px; height: 315px;
            transform-style: preserve-3d;
            animation: float 5s ease-in-out infinite;
            animation-delay: var(--float-delay);
            cursor: pointer;
        }

        @keyframes float {
            0%, 100% { transform: rotateY(-10deg) translateY(0); }
            50% { transform: rotateY(10deg) translateY(-25px); }
        }

        .book-template {
            position: absolute;
            inset: 0;
            background: url('assets/flbktmp.png') no-repeat center center;
            background-size: contain;
            z-index: 1;
        }

        .book-cover-art {
            position: absolute;
            top: 5%; 
            left: 2%;
            width: 90%; 
            height: 90%;
            background-size: cover;
            background-position: center;
            z-index: 10;
            border-radius: 2px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            background-color: #333;
            opacity: 0.9;
        }

        .book-shadow {
            position: absolute;
            bottom: -30px; left: 50%;
            width: 150px; height: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 50%;
            filter: blur(12px);
            transform: translateX(-50%);
            z-index: 0;
        }

        #loading-overlay {
            position: fixed; inset: 0; background: black; z-index: 2000;
            display: flex; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">leyendo pergaminos...</div>

    <div class="library-stage">
        <a href="index.html" id="btn-back" class="ui-btn"></a>
        <a href="settings.html" id="btn-settings" class="ui-btn"></a>
        
        <a href="newbook.html" id="btn-new-logic">+ añadir</a>

        <div class="book-track" id="book-track"></div>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase-bridge.js";

        async function init3dLibrary() {
            const track = document.getElementById('book-track');
            const loader = document.getElementById('loading-overlay');

            try {
                const q = query(collection(db, "books"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                
                track.innerHTML = "";

                if (snap.empty) {
                    track.innerHTML = "<div style='color:white; width: 70vw; text-align:center;'>La biblioteca está vacía.</div>";
                    loader.style.display = 'none';
                    return;
                }

                snap.forEach((docSnap) => {
                    const book = docSnap.data();
                    const bookid = docSnap.id;
                    const coverUrl = book.coverURL || book.imageurl;

                    const container = document.createElement('div');
                    container.className = 'book-container';
                    
                    const delay = (Math.random() * -5).toFixed(2) + "s";
                    
                    container.innerHTML = `
                        <div class="book-shadow"></div>
                        <div class="book-assembly" style="--float-delay: ${delay}" onclick="selectBook('${bookid}', '${book.title}', '${book.backdropURL}')">
                            <div class="book-template"></div>
                            <div class="book-cover-art" style="background-image: url('${coverUrl}')"></div>
                        </div>
                    `;

                    track.appendChild(container);
                });

                loader.style.display = 'none';

            } catch (error) {
                console.error("Library load error:", error);
                loader.innerText = "Error de conexión.";
            }
        }

        window.selectBook = (id, title, backdrop) => {
            localStorage.setItem('current_book_id', id);
            localStorage.setItem('current_book_title', title);
            localStorage.setItem('current_book_backdrop', backdrop);
            location.href = 'pages.html';
        };

        window.onload = init3dLibrary;
    </script>
</body>
</html>
