<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>billy reads | mi biblioteca</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-gold: #ffd700;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #00ff00; /* Green Screen */
            font-family: var(--mc-font);
        }

        /* 16:9 Stage */
        .library-stage {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; align-items: center;
        }

        #btn-back { position: absolute; top: 5%; left: 3%; width: 60px; height: 60px; z-index: 100; cursor: pointer; background: rgba(0,0,0,0.5); border-radius: 50%; border: none; color: white; font-size: 1.5rem; }
        
        #btn-new { 
            position: absolute; bottom: 5%; right: 5%; z-index: 100;
            padding: 15px 30px; border: 3px solid #000; border-radius: 50px; 
            color: #000; text-decoration: none; background: var(--accent-gold);
        }

        .book-track {
            display: flex; align-items: center;
            width: 100%; height: 100%;
            padding: 0 30vw; gap: 60px;
            overflow-x: auto; scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .book-track::-webkit-scrollbar { display: none; }

        .book-item {
            position: relative;
            min-width: 280px; height: 400px;
            scroll-snap-align: center;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .book-item:active { transform: scale(0.95); }

        /* THE TEMPLATE - The Main Container */
        .book-template {
            position: absolute;
            width: 100%; height: 100%;
            background: url('assets/flbktmp.png') no-repeat center center;
            background-size: contain;
            z-index: 10; /* Sits on top of the cover art */
            pointer-events: none;
        }

        /* THE COVER ART - Sits behind the gold frame */
        .book-cover-art {
            position: absolute;
            /* Recalibrated for flbktmp.png */
            top: 15%; 
            left: 20%;
            width: 61%; 
            height: 69%;
            background-size: cover;
            background-position: center;
            z-index: 5;
            background-color: #333;
            border-radius: 4px;
        }

        #loading-overlay {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">Cargando biblioteca...</div>

    <div class="library-stage">
        <button id="btn-back" onclick="location.href='index.html'">←</button>
        <a href="newbook.html" id="btn-new">+ añadir libro</a>
        <div class="book-track" id="book-track"></div>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase-bridge.js";

        async function loadLibrary() {
            const track = document.getElementById('book-track');
            const loader = document.getElementById('loading-overlay');

            try {
                const q = query(collection(db, "books"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                track.innerHTML = "";

                if (snap.empty) {
                    track.innerHTML = "<div style='color:black; font-family:sans-serif;'>No hay libros.</div>";
                    loader.style.display = 'none';
                    return;
                }

                snap.forEach(docSnap => {
                    const book = docSnap.data();
                    const url = book.coverURL || book.imageurl;

                    const item = document.createElement('div');
                    item.className = 'book-item';
                    item.onclick = () => {
                        localStorage.setItem('current_book_id', docSnap.id);
                        localStorage.setItem('current_book_title', book.title);
                        localStorage.setItem('current_book_backdrop', book.backdropURL);
                        location.href = 'pages.html';
                    };
                    
                    item.innerHTML = `
                        <div class="book-cover-art" style="background-image: url('${url}')"></div>
                        <div class="book-template"></div>
                    `;
                    track.appendChild(item);
                });

                loader.style.display = 'none';
            } catch (error) {
                console.error("Error:", error);
                loader.innerText = "Error de conexión.";
            }
        }

        window.onload = loadLibrary;
    </script>
</body>
</html>
