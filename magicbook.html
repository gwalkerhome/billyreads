<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>billy reads | mi biblioteca 3d</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-gold: #ffd700;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            background: #00ff00; /* Green Screen for testing */
            font-family: var(--mc-font);
        }

        .library-stage {
            position: relative;
            width: 100vw; 
            aspect-ratio: 16 / 9; /* 16:9 Constraint */
            margin: auto;
            background: #00ff00; 
            perspective: 2000px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        /* Navigation */
        #btn-back { position: absolute; top: 5%; left: 3%; width: 60px; height: 60px; z-index: 100; cursor: pointer; background: rgba(0,0,0,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: none; font-size: 1.5rem; }
        
        #btn-new { 
            position: absolute; bottom: 5%; right: 5%; z-index: 100;
            padding: 15px 30px; border: 3px solid #000; 
            border-radius: 50px; color: #000; font-family: var(--mc-font);
            text-decoration: none; background: var(--accent-gold);
            box-shadow: 0 4px 0 #b8860b;
        }

        .book-track {
            display: flex; align-items: center;
            height: 80%; width: 100%; padding: 0 25vw; gap: 80px;
            overflow-x: auto; scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .book-track::-webkit-scrollbar { display: none; }

        .book-container {
            position: relative;
            min-width: 320px; height: 480px;
            scroll-snap-align: center;
            transform-style: preserve-3d;
            display: flex; align-items: center; justify-content: center;
        }

        .book-assembly {
            position: relative;
            width: 280px; height: 400px;
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite;
            animation-delay: var(--float-delay);
            cursor: pointer;
        }

        @keyframes float {
            0%, 100% { transform: rotateY(-5deg) translateY(0); }
            50% { transform: rotateY(15deg) translateY(-20px); }
        }

        /* THE TEMPLATE - Scaled to be the largest layer */
        .book-template {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('assets/flbktmp.png') no-repeat center center;
            background-size: contain;
            z-index: 20; /* High z-index to ensure it sits on top */
            pointer-events: none;
        }

        /* THE COVER - Positioned inside the template frame */
        .book-cover-art {
            position: absolute;
            top: 15%; 
            left: 20%;
            width: 60%; 
            height: 70%;
            background-size: cover;
            background-position: center;
            z-index: 10; /* Lower than template */
            background-color: #333; /* Placeholder color if image fails */
        }

        .book-shadow {
            position: absolute;
            bottom: -20px; left: 50%;
            width: 180px; height: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 50%;
            filter: blur(10px);
            transform: translateX(-50%);
        }

        #loading-overlay {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">conjurando libros...</div>

    <div class="library-stage">
        <button id="btn-back" onclick="location.href='index.html'">←</button>
        <a href="newbook.html" id="btn-new">+ añadir libro</a>
        <div class="book-track" id="book-track"></div>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase-bridge.js";

        async function init3dLibrary() {
            const track = document.getElementById('book-track');
            const loader = document.getElementById('loading-overlay');

            try {
                const q = query(collection(db, "books"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                track.innerHTML = "";

                if (snap.empty) {
                    track.innerHTML = "<div style='color:black; width: 50vw; text-align:center;'>No hay libros todavía.</div>";
                    loader.style.display = 'none';
                    return;
                }

                snap.forEach((docSnap, index) => {
                    const book = docSnap.data();
                    const coverUrl = book.coverURL || book.imageurl;

                    const container = document.createElement('div');
                    container.className = 'book-container';
                    const delay = (Math.random() * -5).toFixed(2) + "s";
                    
                    container.innerHTML = `
                        <div class="book-shadow"></div>
                        <div class="book-assembly" style="--float-delay: ${delay}" onclick="selectBook('${docSnap.id}', '${book.title}', '${book.backdropURL}')">
                            <div class="book-cover-art" style="background-image: url('${coverUrl}')"></div>
                            <div class="book-template"></div>
                        </div>
                    `;
                    track.appendChild(container);
                });

                loader.style.display = 'none';
            } catch (error) {
                console.error("Load error:", error);
                loader.innerText = "Error de conexión.";
            }
        }

        window.selectBook = (id, title, backdrop) => {
            localStorage.setItem('current_book_id', id);
            localStorage.setItem('current_book_title', title);
            localStorage.setItem('current_book_backdrop', backdrop);
            location.href = 'pages.html';
        };

        window.onload = init3dLibrary;
    </script>
</body>
</html>
