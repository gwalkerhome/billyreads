<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Libro Mágico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button class="btn-back" onclick="window.location.href='index.html'">⬅ Volver</button>
        
        <div id="upload-zone">
            <h2>Escanea una página de tu libro</h2>
            <input type="file" id="book-upload" accept="image/*" capture="environment" hidden>
            <button class="btn-stage-1" onclick="document.getElementById('book-upload').click()">
                <span class="icon">📸</span>
                <span class="label">Tomar Foto</span>
            </button>
        </div>

        <div id="interaction-zone" style="display:none;">
            <div id="scanned-text-display" class="text-card"></div>
            <div id="ai-question" class="question-box"></div>
            <button id="mic-btn" class="btn-stage-1">
                <span class="icon">🎤</span>
                <span class="label">Responder</span>
            </button>
            <div id="feedback-display"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
