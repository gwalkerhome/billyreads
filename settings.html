<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Command Center: BillyReads</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-blue: #4a90e2;
            --mc-green: #76FF03;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
        }

        body {
            margin: 0; padding: 20px;
            background-image: url('assets/settingsback.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; width: 100%; max-width: 1100px;
            /* AMENDED: Pushed down to 30% of screen height */
            margin-top: 10vh;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 15px; 
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
            display: flex; flex-direction: column;
        }

        .card-header {
            display: flex; align-items: center; gap: 10px;
            color: var(--mc-green); 
            font-weight: bold; text-transform: uppercase;
            font-size: 0.8rem; margin-bottom: 20px; 
            border-bottom: 1px solid var(--glass-border); 
            padding-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        label { 
            display: block; font-weight: bold; margin: 15px 0 5px; 
            font-size: 0.85rem; color: #fff; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        input[type="date"], select {
            width: 100%; padding: 12px; border: 1px solid var(--glass-border);
            border-radius: 8px; box-sizing: border-box; 
            background: rgba(255, 255, 255, 0.1); 
            color: white;
        }
        
        option { background: #2c3e50; color: white; }

        .slider-row { display: flex; justify-content: space-between; align-items: center; }
        input[type="range"] { flex-grow: 1; margin: 0 15px; cursor: pointer; }
        .val-display { font-weight: bold; color: var(--mc-green); width: 30px; }

        .level-selector { display: flex; gap: 8px; margin-top: 5px; }
        .lvl-btn {
            flex: 1; padding: 10px 5px; border-radius: 8px; 
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1); 
            cursor: pointer; font-weight: bold; font-size: 0.65rem;
            color: white; transition: all 0.2s;
        }
        .lvl-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }

        .admin-btn {
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid var(--glass-border); padding: 15px;
            border-radius: 8px; cursor: pointer; font-weight: bold; color: white;
            margin-top: 10px; text-transform: uppercase; font-size: 0.8rem;
            width: 100%; text-align: center; text-decoration: none; display: block;
            box-sizing: border-box;
        }

        .footer-actions {
            margin-top: 40px; display: flex; gap: 20px; width: 100%; max-width: 600px;
            padding-bottom: 40px;
        }
        .main-btn {
            flex: 1; padding: 20px; border-radius: 12px; border: none;
            font-family: var(--mc-font); font-size: 1rem; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #save-btn { background: var(--accent-blue); color: white; }
        #cancel-btn { background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>

    <div class="settings-grid">
        
        <div class="card">
            <div class="card-header">⚙️ GENERAL</div>
            <button class="admin-btn" style="color: #ffd166;" onclick="location.href='bookmanager.html'">📖 LIBRARY MANAGER</button>
            <button class="admin-btn" onclick="location.href='themes.html'">🎨 MANAGE THEMES</button>
            <button class="admin-btn" style="color: #ff6b6b;" onclick="location.href='testing.html'">🛠️ API TESTER & KEYS</button>
        </div>

        <div class="card">
            <div class="card-header">📊 DIFFICULTY SETTINGS</div>
            <label>User Date of Birth</label>
            <input type="date" id="billy-dob">
            <label style="margin-top:20px;">Reading Tier (Content)</label>
            <div class="level-selector" style="margin-bottom: 20px;">
                <button class="lvl-btn" id="lvl-1" onclick="setlevel('1')">T1: FONÉTICO</button>
                <button class="lvl-btn" id="lvl-2" onclick="setlevel('2')">T2: FLUIDEZ</button>
                <button class="lvl-btn" id="lvl-3" onclick="setlevel('3')">T3: AVANZADO</button>
                <button class="lvl-btn" id="lvl-4" onclick="setlevel('4')">T4: EXPERTO</button>
            </div>
            <label>Listening Strictness (Assessment)</label>
            <div class="level-selector">
                <button class="lvl-btn" id="strict-1" onclick="setstrictness('1')">L1: PERMISIVO</button>
                <button class="lvl-btn" id="strict-2" onclick="setstrictness('2')">L2: ESTÁNDAR</button>
                <button class="lvl-btn" id="strict-3" onclick="setstrictness('3')">L3: PRECISO</button>
                <button class="lvl-btn" id="strict-4" onclick="setstrictness('4')">L4: MAESTRÍA</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">🔊 VOICE CALIBRATION</div>
            <label>Iberian Voice (ES/VA)</label>
            <select id="voice-select-es"><option>Loading voices...</option></select>
            <button class="admin-btn" style="margin-top:5px; padding: 8px; font-size: 0.7rem;" onclick="testspeech('es')">Test Iberian</button>
            <label style="margin-top: 20px;">English Voice (EN)</label>
            <select id="voice-select-en"><option>Loading voices...</option></select>
            <button class="admin-btn" style="margin-top:5px; padding: 8px; font-size: 0.7rem;" onclick="testspeech('en')">Test English</button>
            <label style="margin-top: 20px;">Reading Speed</label>
            <div class="slider-row">
                <input type="range" id="rate" min="0.5" max="1.5" step="0.1" oninput="updatevals()">
                <span class="val-display" id="rate-val">1.0</span>
            </div>
            <label>Tone (Pitch)</label>
            <div class="slider-row">
                <input type="range" id="pitch" min="0.5" max="2.0" step="0.1" oninput="updatevals()">
                <span class="val-display" id="pitch-val">1.0</span>
            </div>
        </div>

    </div>

    <div class="footer-actions">
        <button id="save-btn" class="main-btn" onclick="saveall()">SAVE CHANGES</button>
        <button id="cancel-btn" class="main-btn" onclick="location.href='index.html'">CANCEL</button>
    </div>

    <script>
        let currentlevel = '2';
        let currentstrictness = '2';

        function loadvoices() {
            const voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) return;
            const selectes = document.getElementById('voice-select-es');
            const selecten = document.getElementById('voice-select-en');
            const esvoices = voices.filter(v => v.lang.includes('es'));
            const envoices = voices.filter(v => v.lang.includes('en'));
            selectes.innerHTML = esvoices.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
            selecten.innerHTML = envoices.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
            if (localStorage.getItem('billy_voice')) selectes.value = localStorage.getItem('billy_voice');
            if (localStorage.getItem('billy_voice_en')) selecten.value = localStorage.getItem('billy_voice_en');
        }

        const voiceinterval = setInterval(() => {
            if (window.speechSynthesis.getVoices().length > 0) {
                loadvoices();
                clearInterval(voiceinterval);
            }
        }, 500);

        window.speechSynthesis.onvoiceschanged = loadvoices;

        window.onload = () => {
            document.getElementById('billy-dob').value = localStorage.getItem('billy_dob') || '';
            document.getElementById('rate').value = localStorage.getItem('billy_rate') || 1.0;
            document.getElementById('pitch').value = localStorage.getItem('billy_pitch') || 1.0;
            setlevel(localStorage.getItem('billy_level') || '2');
            setstrictness(localStorage.getItem('billy_strictness') || '2');
            updatevals();
        };

        function updatevals() {
            document.getElementById('rate-val').innerText = document.getElementById('rate').value;
            document.getElementById('pitch-val').innerText = document.getElementById('pitch').value;
        }

        function setlevel(lvl) {
            currentlevel = lvl;
            document.querySelectorAll('.level-selector:first-of-type .lvl-btn').forEach(btn => btn.classList.remove('active'));
            const activebtn = document.getElementById('lvl-' + lvl);
            if (activebtn) activebtn.classList.add('active');
        }

        function setstrictness(lvl) {
            currentstrictness = lvl;
            document.querySelectorAll('.level-selector:last-of-type .lvl-btn').forEach(btn => btn.classList.remove('active'));
            const activebtn = document.getElementById('strict-' + lvl);
            if (activebtn) activebtn.classList.add('active');
        }

        function testspeech(lang) {
            window.speechSynthesis.cancel();
            const isEn = lang === 'en';
            const selectId = isEn ? 'voice-select-en' : 'voice-select-es';
            const voiceName = document.getElementById(selectId).value;
            const testText = isEn ? "Testing the English voice." : "Probando la voz ibérica.";
            const msg = new SpeechSynthesisUtterance(testText);
            msg.voice = window.speechSynthesis.getVoices().find(v => v.name === voiceName);
            msg.rate = document.getElementById('rate').value;
            msg.pitch = document.getElementById('pitch').value;
            msg.lang = isEn ? "en-US" : "es-ES";
            window.speechSynthesis.speak(msg);
        }

        function saveall() {
            localStorage.setItem('billy_dob', document.getElementById('billy-dob').value);
            localStorage.setItem('billy_rate', document.getElementById('rate').value);
            localStorage.setItem('billy_pitch', document.getElementById('pitch').value);
            localStorage.setItem('billy_voice', document.getElementById('voice-select-es').value);
            localStorage.setItem('billy_voice_en', document.getElementById('voice-select-en').value);
            localStorage.setItem('billy_level', currentlevel);
            localStorage.setItem('billy_strictness', currentstrictness);
            alert("Settings Synchronized.");
            location.href = 'index.html';
        }
    </script>
</body>
</html>
