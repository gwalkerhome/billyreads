<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configuración de Misión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Perfil del Operador</h2>
        
        <div class="setting-group">
            <label>Gemini API Key:</label>
            <input type="password" id="api-key" placeholder="Pega tu clave aquí...">
        </div>

        <div class="setting-group">
            <label>Fecha de Nacimiento de Billy:</label>
            <input type="date" id="billy-dob">
        </div>

        <div class="setting-group">
            <label>Tono (Agudeza): <span id="pitch-val">1.0</span></label>
            <input type="range" id="speech-pitch" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('pitch-val').innerText = this.value">
        </div>

        <div class="setting-group">
            <label>Voz del Compañero:</label>
            <select id="voice-select"><option value="">Buscando voces...</option></select>
            <button class="btn-settings" style="margin-top:10px; width:100%" onclick="testVoice()">🔊 Probar Voz</button>
        </div>

        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button class="btn-stage-1" style="flex: 1;" onclick="saveSettings()"><span class="label">GUARDAR</span></button>
            <button class="btn-stage-1" style="flex: 1; background: #718096; box-shadow: 0 8px 0 #4A5568;" onclick="window.location.href='index.html'"><span class="label">VOLVER</span></button>
        </div>
    </div>

    <script>
        document.getElementById('api-key').value = localStorage.getItem('gemini_key') || '';
        document.getElementById('billy-dob').value = localStorage.getItem('billy_dob') || '';
        document.getElementById('speech-pitch').value = localStorage.getItem('speech_pitch') || 1.0;

        function populateVoices() {
            let voices = window.speechSynthesis.getVoices();
            const select = document.getElementById('voice-select');
            select.innerHTML = '';
            voices.filter(v => v.lang.includes('es')).forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.name;
                opt.innerText = v.name;
                if(v.name === localStorage.getItem('preferred_voice')) opt.selected = true;
                select.appendChild(opt);
            });
        }
        window.speechSynthesis.onvoiceschanged = populateVoices;
        setTimeout(populateVoices, 500);

        function testVoice() {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance("¡Hola! Estoy listo para la misión.");
            msg.voice = window.speechSynthesis.getVoices().find(v => v.name === document.getElementById('voice-select').value);
            msg.pitch = document.getElementById('speech-pitch').value;
            window.speechSynthesis.speak(msg);
        }

        function saveSettings() {
            localStorage.setItem('gemini_key', document.getElementById('api-key').value);
            localStorage.setItem('billy_dob', document.getElementById('billy-dob').value);
            localStorage.setItem('speech_pitch', document.getElementById('speech-pitch').value);
            localStorage.setItem('preferred_voice', document.getElementById('voice-select').value);
            alert('Perfil actualizado');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
