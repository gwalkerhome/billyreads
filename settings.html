<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BillyReads: System Settings</title>
    <style>
        :root { --mc-font: 'Arial Black', sans-serif; }
        body { 
            background: #1a1a1a; color: white; font-family: sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        .card {
            background: #2a2a2a; padding: 20px; border-radius: 15px; 
            border: 2px solid #444; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card-header {
            font-family: var(--mc-font); font-size: 1.2rem; color: #76FF03; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #aaa; font-size: 0.9rem; }
        input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444;
            background: #111; color: white; font-size: 1rem; box-sizing: border-box;
            margin-bottom: 10px;
        }
        .save-btn {
            width: 100%; padding: 15px; background: #76FF03; color: black;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: all 0.2s; font-family: var(--mc-font);
        }
        .save-btn:active { transform: scale(0.98); background: #fff; }
        .footer-text { font-size: 0.7rem; color: #666; margin-top: 15px; text-align: center; }
        .nav-link { margin-top: 25px; color: #4a90e2; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">⚙️ System Core</div>
        
        <label>OpenAI API Key</label>
        <input type="password" id="openai-key" placeholder="Paste sk-...">
        
        <button class="save-btn" id="save-btn" onclick="saveSettings()">Save System Core</button>
        
        <p class="footer-text">
            This key enables dynamic curriculum generation via OpenAI's 2026 intelligence engine.
        </p>
    </div>

    <a href="testing.html" class="nav-link">Run Model Discovery →</a>
    <a href="index.html" class="nav-link" style="color: #999; font-size: 0.8rem;">Exit to Menu</a>

    <script>
        // 1. Load the key from memory on startup
        window.onload = function() {
            const savedKey = localStorage.getItem('openai-key');
            if (savedKey) {
                document.getElementById('openai-key').value = savedKey;
            }
        };

        // 2. The explicit route to saving the key
        function saveSettings() {
            const keyInput = document.getElementById('openai-key');
            const saveBtn = document.getElementById('save-btn');
            const keyValue = keyInput.value.trim();

            if (keyValue.startsWith('sk-')) {
                // Save to LocalStorage
                localStorage.setItem('openai-key', keyValue);
                
                // Visual feedback for iPad users
                const originalText = saveBtn.innerText;
                saveBtn.innerText = "✅ CORE UPDATED";
                saveBtn.style.background = "#ffffff";
                
                setTimeout(() => {
                    saveBtn.innerText = originalText;
                    saveBtn.style.background = "#76FF03";
                }, 2000);
            } else {
                alert("Please enter a valid OpenAI key starting with 'sk-'");
                keyInput.style.borderColor = "red";
            }
        }
    </script>

</body>
</html>
