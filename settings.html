<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajustes: Misión Minecraft</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --mc-green: #76FF03;
            --mc-bg: #1e1e1e;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--mc-bg);
            color: var(--text-color);
            font-family: var(--mc-font);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-top: 10px;
        }

        h1 {
            font-size: 1.6rem;
            margin: 0;
            text-transform: uppercase;
            color: var(--mc-green);
            letter-spacing: 1px;
        }

        .back-btn {
            background: #444;
            color: white;
            border: 2px solid #555;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--mc-font);
            font-size: 0.8rem;
        }

        .settings-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 25px; /* Plenty of space between cards */
        }

        .setting-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #3d3d3d;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .setting-card h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: #bbb;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .setting-card p {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        input {
            width: 100%;
            padding: 18px;
            box-sizing: border-box;
            background: #1a1a1a;
            border: 2px solid #444;
            color: var(--mc-green);
            border-radius: 10px;
            font-family: monospace;
            font-size: 1.2rem;
            outline: none;
        }

        input:focus {
            border-color: var(--mc-green);
        }

        .action-btn {
            width: 100%;
            padding: 20px;
            background-color: var(--mc-green);
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-family: var(--mc-font);
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .secondary-btn {
            background-color: #555;
            color: white;
            margin-top: 0;
        }

        .status-msg {
            text-align: center;
            margin-top: 25px;
            font-size: 1rem;
            min-height: 24px;
            color: var(--mc-green);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Configuración</h1>
        <button class="back-btn" onclick="location.href='index.html'">VOLVER</button>
    </div>

    <div class="settings-container">
        
        <div class="setting-card">
            <h2>Ajuste de Interfaz</h2>
            <p>Entra en el modo visual para mover y redimensionar las ventanas de Minecraft en tu iPad.</p>
            <button class="action-btn secondary-btn" onclick="location.href='winadjust.html'">CALIBRAR PANTALLA</button>
        </div>

        <div class="setting-card">
            <h2>Gemini API Key</h2>
            <p>Necesaria para generar las misiones personalizadas de Billy.</p>
            <input type="password" id="api-key" placeholder="••••••••••••••••">
        </div>

        <div class="setting-card">
            <h2>Perfil del Alumno</h2>
            <p>Fecha de nacimiento para calcular el nivel escolar automáticamente.</p>
            <input type="date" id="dob">
        </div>

        <button class="action-btn" onclick="saveSettings()">GUARDAR TODO</button>
        <div id="status" class="status-msg"></div>

    </div>

    <script>
        window.onload = () => {
            document.getElementById('api-key').value = localStorage.getItem('gemini_key') || '';
            document.getElementById('dob').value = localStorage.getItem('billy_dob') || '';
        };

        function saveSettings() {
            const key = document.getElementById('api-key').value;
            const dob = document.getElementById('dob').value;
            
            localStorage.setItem('gemini_key', key);
            localStorage.setItem('billy_dob', dob);
            
            const status = document.getElementById('status');
            status.innerText = "✔ CAMBIOS GUARDADOS";
            
            setTimeout(() => {
                status.innerText = "";
            }, 3000);
        }
    </script>
</body>
</html>
