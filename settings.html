<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configuración del Sistema</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --panel-bg: #ffffff;
            --accent-blue: #3182CE;
            --border-color: #E2E8F0;
            --text-main: #2D3748;
        }

        body { background: #F7FAFC; padding: 20px; font-family: sans-serif; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto 40px auto;
        }

        .config-box {
            background: var(--panel-bg);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
        }

        /* Span the full width for the header */
        .dashboard-header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 10px;
        }

        .config-box h3 {
            margin: 0 0 20px 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #718096;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .row { margin-bottom: 20px; }
        .row label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-main); }

        .input-field { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1.5px solid var(--border-color); 
            box-sizing: border-box; 
            background: #F8FAFC;
        }

        .toggle-group { 
            display: flex; 
            background: #EDF2F7; 
            border-radius: 12px; 
            padding: 4px; 
        }

        .toggle-btn { 
            flex: 1; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            cursor: pointer; 
            background: transparent; 
            font-weight: bold; 
            transition: all 0.2s;
        }

        .toggle-btn.active { background: white; color: var(--accent-blue); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .slider-wrap { display: flex; align-items: center; gap: 15px; }
        input[type="range"] { flex-grow: 1; accent-color: var(--accent-blue); }
        .value-badge { font-weight: bold; color: var(--accent-blue); min-width: 30px; }

        .btn-test {
            margin-top: auto;
            background: white;
            border: 2px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .action-footer {
            grid-column: 1 / -1;
            display: flex;
            gap: 20px;
        }
    </style>
</head>
<body>

    <div class="dashboard-grid">
        <header class="dashboard-header">
            <h2 style="font-size: 1.8rem; color: #1A202C;">Centro de Mando</h2>
            <p style="color: #A0AEC0;">Configuración de la Misión y Perfil del Alumno</p>
        </header>

        <div class="config-box">
            <h3>👤 Perfil del Alumno</h3>
            <div class="row">
                <label>Fecha de Nacimiento</label>
                <input type="date" id="billy-dob" class="input-field">
            </div>
            <div class="row">
                <label>Nivel de Desafío</label>
                <div class="toggle-group">
                    <button class="toggle-btn" id="btn-normal" onclick="setDiff('normal')">NORMAL</button>
                    <button class="toggle-btn" id="btn-high" onclick="setDiff('high')">EXPERTO</button>
                </div>
            </div>
        </div>

        <div class="config-box">
            <h3>🔊 Calibración de Voz</h3>
            <div class="row">
                <label>Voz Seleccionada</label>
                <select id="voice-select" class="input-field"></select>
            </div>
            <div class="row">
                <label>Velocidad</label>
                <div class="slider-wrap">
                    <input type="range" id="speech-rate" min="0.5" max="1.5" step="0.1" oninput="updateVal('speed-val', this.value)">
                    <span class="value-badge" id="speed-val">1.0</span>
                </div>
            </div>
            <div class="row">
                <label>Tono (Pitch)</label>
                <div class="slider-wrap">
                    <input type="range" id="speech-pitch" min="0.5" max="2.0" step="0.1" oninput="updateVal('pitch-val', this.value)">
                    <span class="value-badge" id="pitch-val">1.0</span>
                </div>
            </div>
            <button class="btn-test" onclick="testVoice()">PROBAR CONFIGURACIÓN</button>
        </div>

        <div class="config-box">
            <h3>⚙️ Núcleo del Sistema</h3>
            <div class="row">
                <label>Gemini API Key</label>
                <input type="password" id="api-key" class="input-field" placeholder="Pega tu clave aquí...">
            </div>
            <p style="font-size: 0.8rem; color: #A0AEC0;">Esta clave permite la generación dinámica de contenido curricular.</p>
        </div>

        <footer class="action-footer">
            <button class="btn-stage-1" style="flex: 2;" onclick="saveSettings()"><span class="label">GUARDAR CAMBIOS</span></button>
            <button class="btn-stage-1" style="flex: 1; background: #718096; box-shadow: 0 8px 0 #4A5568;" onclick="window.location.href='index.html'"><span class="label">CANCELAR</span></button>
        </footer>
    </div>

    <script>
        // Load initial values
        document.getElementById('api-key').value = localStorage.getItem('gemini_key') || '';
        document.getElementById('billy-dob').value = localStorage.getItem('billy_dob') || '';
        
        const r = localStorage.getItem('speech_rate') || 1.0;
        document.getElementById('speech-rate').value = r;
        document.getElementById('speed-val').innerText = r;

        const p = localStorage.getItem('speech_pitch') || 1.0;
        document.getElementById('speech-pitch').value = p;
        document.getElementById('pitch-val').innerText = p;

        let diff = localStorage.getItem('difficulty') || 'normal';
        setDiff(diff);

        function updateVal(id, val) { document.getElementById(id).innerText = val; }

        function setDiff(val) {
            localStorage.setItem('difficulty', val);
            document.getElementById('btn-normal').className = val === 'normal' ? 'toggle-btn active' : 'toggle-btn';
            document.getElementById('btn-high').className = val === 'high' ? 'toggle-btn active' : 'toggle-btn';
        }

        function populateVoices() {
            let voices = window.speechSynthesis.getVoices();
            const select = document.getElementById('voice-select');
            select.innerHTML = '';
            voices.filter(v => v.lang.includes('es')).forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.name; opt.innerText = v.name;
                if(v.name === localStorage.getItem('preferred_voice')) opt.selected = true;
                select.appendChild(opt);
            });
        }
        window.speechSynthesis.onvoiceschanged = populateVoices;
        setTimeout(populateVoices, 500);

        function testVoice() {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance("Sincronización lista.");
            msg.voice = window.speechSynthesis.getVoices().find(v => v.name === document.getElementById('voice-select').value);
            msg.pitch = document.getElementById('speech-pitch').value;
            msg.rate = document.getElementById('speech-rate').value;
            window.speechSynthesis.speak(msg);
        }

        function saveSettings() {
            localStorage.setItem('gemini_key', document.getElementById('api-key').value);
            localStorage.setItem('billy_dob', document.getElementById('billy-dob').value);
            localStorage.setItem('speech_rate', document.getElementById('speech-rate').value);
            localStorage.setItem('speech_pitch', document.getElementById('speech-pitch').value);
            localStorage.setItem('preferred_voice', document.getElementById('voice-select').value);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
