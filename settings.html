<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajustes: BillyReads</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>CENTRO DE CONTROL</h2>

    <div class="setting-group">
        <label>GEMINI API KEY</label>
        <input type="password" id="gemini-key" placeholder="Pega tu clave aquí...">
    </div>

    <div class="setting-group">
        <label>FECHA DE NACIMIENTO (BILLY)</label>
        <input type="date" id="billy-dob">
    </div>

    <div class="setting-group">
        <label>NIVEL DE DESAFÍO</label>
        <select id="billy-level">
            <option value="NORMAL">NORMAL (70/10/20)</option>
            <option value="EXPERTO">EXPERTO (SOPHISTICATED)</option>
        </select>
    </div>

    <div class="setting-group">
        <label>VOZ DE LECTURA</label>
        <select id="billy-voice"></select>
    </div>

    <div class="setting-group">
        <label>VELOCIDAD (RATE)</label>
        <input type="range" id="billy-rate" min="0.5" max="1.5" step="0.1" value="1.0">
    </div>

    <div class="setting-group">
        <label>TONO (PITCH)</label>
        <input type="range" id="billy-pitch" min="0.5" max="1.5" step="0.1" value="1.0">
    </div>

    <div class="grid-choice" style="margin-top: 30px;">
        <button class="btn-stage-1" onclick="location.href='winadjust.html'">
            <div class="icon">📐</div>
            <div class="label">CALIBRAR</div>
        </button>

        <button class="btn-stage-1" onclick="location.href='themes.html'">
            <div class="icon">🎨</div>
            <div class="label">TEMAS</div>
        </button>

        <button class="btn-stage-1" style="background: #f44336; box-shadow: 0 8px 0 #b71c1c;" onclick="location.href='testing.html'">
            <div class="icon">🛠️</div>
            <div class="label">TEST API</div>
        </button>
    </div>

    <button id="save-settings" class="btn-settings" onclick="saveAll()" style="margin-top: 30px;">GUARDAR CONFIGURACIÓN</button>
    <button class="btn-settings" onclick="location.href='index.html'">VOLVER AL MENÚ</button>
</div>

<script>
    function populateVoices() {
        const voiceSelect = document.getElementById('billy-voice');
        const voices = window.speechSynthesis.getVoices();
        voiceSelect.innerHTML = '';
        voices.forEach(voice => {
            if (voice.lang.includes('es')) {
                const option = document.createElement('option');
                option.value = voice.name;
                option.textContent = `${voice.name} (${voice.lang})`;
                voiceSelect.appendChild(option);
            }
        });
        const savedVoice = localStorage.getItem('billy_voice');
        if (savedVoice) voiceSelect.value = savedVoice;
    }

    function loadSettings() {
        document.getElementById('gemini-key').value = localStorage.getItem('gemini_key') || '';
        document.getElementById('billy-dob').value = localStorage.getItem('billy_dob') || '2016-01-01';
        document.getElementById('billy-level').value = localStorage.getItem('billy_level') || 'NORMAL';
        document.getElementById('billy-rate').value = localStorage.getItem('billy_rate') || 1.0;
        document.getElementById('billy-pitch').value = localStorage.getItem('billy_pitch') || 1.0;
        
        populateVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoices;
        }
    }

    function saveAll() {
        localStorage.setItem('gemini_key', document.getElementById('gemini-key').value.trim());
        localStorage.setItem('billy_dob', document.getElementById('billy-dob').value);
        localStorage.setItem('billy_level', document.getElementById('billy-level').value);
        localStorage.setItem('billy_voice', document.getElementById('billy-voice').value);
        localStorage.setItem('billy_rate', document.getElementById('billy-rate').value);
        localStorage.setItem('billy_pitch', document.getElementById('billy-pitch').value);
        alert("Configuración Guardada.");
    }

    window.onload = loadSettings;
</script>

</body>
</html>
