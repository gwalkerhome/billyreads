<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Command Center: BillyReads</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-blue: #4a90e2;
            --mc-green: #76FF03;
            --card-bg: #ffffff;
            --body-bg: #f0f4f8;
        }

        body {
            margin: 0; padding: 20px;
            background-color: var(--body-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { font-family: var(--mc-font); color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 30px; font-size: 0.9rem; }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; width: 100%; max-width: 1100px;
        }

        .card {
            background: var(--card-bg); border-radius: 15px; padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column;
        }

        .card-header {
            display: flex; align-items: center; gap: 10px;
            color: #7f8c8d; font-weight: bold; text-transform: uppercase;
            font-size: 0.8rem; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;
        }

        label { display: block; font-weight: bold; margin: 15px 0 5px; font-size: 0.85rem; color: #444; }

        input[type="text"], input[type="password"], input[type="date"], select {
            width: 100%; padding: 12px; border: 1px solid #e0e0e0;
            border-radius: 8px; box-sizing: border-box; background: #fafafa;
        }

        .slider-row { display: flex; justify-content: space-between; align-items: center; }
        input[type="range"] { flex-grow: 1; margin: 0 15px; }
        .val-display { font-weight: bold; color: var(--accent-blue); width: 30px; }

        .level-selector { display: flex; gap: 8px; margin-top: 5px; }
        .lvl-btn {
            flex: 1; padding: 10px 5px; border-radius: 8px; border: 1px solid #e0e0e0;
            background: #fff; cursor: pointer; font-weight: bold; font-size: 0.65rem;
            transition: all 0.2s;
        }
        .lvl-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }

        .admin-btn {
            background: #f8f9fa; border: 1px solid #ddd; padding: 15px;
            border-radius: 8px; cursor: pointer; font-weight: bold; color: #555;
            margin-top: 10px; text-transform: uppercase; font-size: 0.8rem;
            width: 100%; text-align: center; text-decoration: none; display: block;
            box-sizing: border-box;
        }

        .inner-save-btn {
            background: var(--mc-green); color: #000; border: none; padding: 8px;
            border-radius: 5px; font-weight: bold; margin-top: 10px; cursor: pointer;
            font-size: 0.7rem; text-transform: uppercase; align-self: flex-end;
        }

        .footer-actions {
            margin-top: 40px; display: flex; gap: 20px; width: 100%; max-width: 600px;
        }
        .main-btn {
            flex: 1; padding: 20px; border-radius: 12px; border: none;
            font-family: var(--mc-font); font-size: 1rem; cursor: pointer;
        }
        #save-btn { background: var(--accent-blue); color: white; }
        #cancel-btn { background: #cbd5e0; color: #4a5568; }
    </style>
</head>
<body>

    <h1>Command Center</h1>
    <div class="subtitle">Mission Configuration & Student Profile</div>

    <div class="settings-grid">
        
        <div class="card">
            <div class="card-header">👤 Student Profile</div>
            <label>Date of Birth</label>
            <input type="date" id="billy-dob">
            <p style="font-size: 0.75rem; color: #888; margin-top: 15px;">Determines the target curriculum year group.</p>
        </div>

        <div class="card">
            <div class="card-header">📊 Difficulty Settings</div>
            <label>Reading Tier (Content)</label>
            <div class="level-selector" style="margin-bottom: 20px;">
                <button class="lvl-btn" id="lvl-1" onclick="setlevel('1')">T1: FONÉTICO</button>
                <button class="lvl-btn" id="lvl-2" onclick="setlevel('2')">T2: FLUIDEZ</button>
                <button class="lvl-btn" id="lvl-3" onclick="setlevel('3')">T3: AVANZADO</button>
                <button class="lvl-btn" id="lvl-4" onclick="setlevel('4')">T4: EXPERTO</button>
            </div>

            <label>Listening Strictness (Assessment)</label>
            <div class="level-selector">
                <button class="lvl-btn" id="strict-1" onclick="setstrictness('1')">L1: PERMISIVO</button>
                <button class="lvl-btn" id="strict-2" onclick="setstrictness('2')">L2: ESTÁNDAR</button>
                <button class="lvl-btn" id="strict-3" onclick="setstrictness('3')">L3: PRECISO</button>
                <button class="lvl-btn" id="strict-4" onclick="setstrictness('4')">L4: MAESTRÍA</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">🔊 Voice Calibration</div>
            
            <label>Iberian Voice (ES/VA)</label>
            <select id="voice-select-es"><option>Loading voices...</option></select>

            <label>English Voice (EN)</label>
            <select id="voice-select-en"><option>Loading voices...</option></select>

            <label>Reading Speed</label>
            <div class="slider-row">
                <input type="range" id="rate" min="0.5" max="1.5" step="0.1" oninput="updatevals()">
                <span class="val-display" id="rate-val">1.0</span>
            </div>

            <label>Tone (Pitch)</label>
            <div class="slider-row">
                <input type="range" id="pitch" min="0.5" max="2.0" step="0.1" oninput="updatevals()">
                <span class="val-display" id="pitch-val">1.0</span>
            </div>

            <button class="admin-btn" style="margin-top:20px; color:var(--accent-blue);" onclick="testspeech()">Test Voices</button>
        </div>

        <div class="card">
            <div class="card-header">⚙️ System Core</div>
            <label>OpenAI API Key</label>
            <input type="password" id="openai-key">

            <label>Gemini API Key</label>
            <input type="password" id="gemini-key">
            
            <div style="display: flex; gap: 10px; align-items: center; justify-content: flex-end; margin-top: 10px;">
                <button class="admin-btn" style="color: #d9534f; padding: 8px; flex: 1; margin-top:0;" onclick="location.href='testing.html'">🛠️ API TESTER</button>
                <button class="inner-save-btn" onclick="savekeyonly()" style="flex: 0.5; margin-top:0;">Save Keys</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">🖼️ Background Themes</div>
            <button class="admin-btn" onclick="location.href='themes.html'">🎨 MANAGE THEMES</button>
        </div>

        <div class="card">
            <div class="card-header">📚 Magic Books</div>
            <button class="admin-btn" style="color: #6d4c41;" onclick="location.href='bookmanager.html'">📖 LIBRARY MANAGER</button>
        </div>

    </div>

    <div class="footer-actions">
        <button id="save-btn" class="main-btn" onclick="saveall()">SAVE CHANGES</button>
        <button id="cancel-btn" class="main-btn" onclick="location.href='index.html'">CANCEL</button>
    </div>

    <script>
        let currentlevel = '2';
        let currentstrictness = '2';

        function loadvoices() {
            const voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) return;

            const selectes = document.getElementById('voice-select-es');
            const selecten = document.getElementById('voice-select-en');

            const esvoices = voices.filter(v => v.lang.includes('es'));
            const envoices = voices.filter(v => v.lang.includes('en'));

            selectes.innerHTML = esvoices.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
            selecten.innerHTML = envoices.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
            
            // Keeps original billy_voice for Spanish
            if (localStorage.getItem('billy_voice')) selectes.value = localStorage.getItem('billy_voice');
            if (localStorage.getItem('billy_voice_en')) selecten.value = localStorage.getItem('billy_voice_en');
        }

        const voiceinterval = setInterval(() => {
            const voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                loadvoices();
                clearInterval(voiceinterval);
            }
        }, 500);

        window.speechSynthesis.onvoiceschanged = loadvoices;

        window.onload = () => {
            document.getElementById('openai-key').value = localStorage.getItem('openai_key') || '';
            document.getElementById('gemini-key').value = localStorage.getItem('gemini_key') || '';
            document.getElementById('billy-dob').value = localStorage.getItem('billy_dob') || '';
            document.getElementById('rate').value = localStorage.getItem('billy_rate') || 1.0;
            document.getElementById('pitch').value = localStorage.getItem('billy_pitch') || 1.0;
            
            setlevel(localStorage.getItem('billy_level') || '2');
            setstrictness(localStorage.getItem('billy_strictness') || '2');
            updatevals();
        };

        function updatevals() {
            document.getElementById('rate-val').innerText = document.getElementById('rate').value;
            document.getElementById('pitch-val').innerText = document.getElementById('pitch').value;
        }

        function setlevel(lvl) {
            currentlevel = lvl;
            document.querySelectorAll('.level-selector:first-of-type .lvl-btn').forEach(btn => btn.classList.remove('active'));
            const activebtn = document.getElementById('lvl-' + lvl);
            if (activebtn) activebtn.classList.add('active');
        }

        function setstrictness(lvl) {
            currentstrictness = lvl;
            document.querySelectorAll('.level-selector:last-of-type .lvl-btn').forEach(btn => btn.classList.remove('active'));
            const activebtn = document.getElementById('strict-' + lvl);
            if (activebtn) activebtn.classList.add('active');
        }

        function testspeech() {
    window.speechSynthesis.cancel();
    
    // Determine which language to test based on the last selector used 
    // or simply test based on which dropdown has focus
    const isEnActive = document.activeElement.id === 'voice-select-en';
    const voiceName = isEnActive 
        ? document.getElementById('voice-select-en').value 
        : document.getElementById('voice-select-es').value;
    
    const testText = isEnActive 
        ? "Testing the English voice for Billy Reads." 
        : "Probando la voz ibérica para Billy Reads.";

    const msg = new SpeechSynthesisUtterance(testText);
    const voices = window.speechSynthesis.getVoices();
    
    msg.voice = voices.find(v => v.name === voiceName);
    msg.rate = document.getElementById('rate').value;
    msg.pitch = document.getElementById('pitch').value;
    
    // Set the language tag explicitly for the test
    msg.lang = isEnActive ? "en-US" : "es-ES";

    window.speechSynthesis.speak(msg);
}

        function savekeyonly() {
            localStorage.setItem('gemini_key', document.getElementById('gemini-key').value.trim());
            localStorage.setItem('openai_key', document.getElementById('openai-key').value.trim());
            alert("API Keys Locked.");
        }

        function saveall() {
            localStorage.setItem('openai_key', document.getElementById('openai-key').value.trim());
            localStorage.setItem('gemini_key', document.getElementById('gemini-key').value.trim());
            localStorage.setItem('billy_dob', document.getElementById('billy-dob').value);
            localStorage.setItem('billy_rate', document.getElementById('rate').value);
            localStorage.setItem('billy_pitch', document.getElementById('pitch').value);
            
            // Maintain original billy_voice for Spanish compatibility
            localStorage.setItem('billy_voice', document.getElementById('voice-select-es').value);
            localStorage.setItem('billy_voice_en', document.getElementById('voice-select-en').value);
            
            localStorage.setItem('billy_level', currentlevel);
            localStorage.setItem('billy_strictness', currentstrictness);
            
            alert("Settings Synchronized.");
            location.href = 'index.html';
        }
    </script>
</body>
</html>
