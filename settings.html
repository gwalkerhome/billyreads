<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajustes: BillyReads</title>
    <style>
        :root { --mc-font: 'Arial Black', sans-serif; --mc-green: #76FF03; }
        body {
            margin: 0; padding: 20px;
            background: #111 url('assets/minecraft.png') no-repeat center center fixed;
            background-size: cover; color: white; font-family: var(--mc-font);
        }
        .config-card {
            background: rgba(0,0,0,0.85); border: 3px solid #444;
            padding: 20px; border-radius: 10px; max-width: 500px; margin: 0 auto;
        }
        h2 { color: var(--mc-green); border-bottom: 2px solid var(--mc-green); padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-size: 12px; color: #aaa; }
        input, select {
            width: 100%; padding: 12px; background: #222; border: 1px solid #555;
            color: white; border-radius: 5px; box-sizing: border-box;
        }
        .admin-section { margin-top: 30px; border-top: 1px dashed #555; padding-top: 20px; }
        .admin-btn {
            width: 100%; padding: 12px; margin-top: 10px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; font-size: 11px;
        }
        #save-settings { background: var(--mc-green); color: black; margin-top: 20px; width: 100%; height: 50px; font-size: 16px; }
        .win-btn { background: #4a90e2; color: white; }
        .theme-btn { background: #9c27b0; color: white; }
        .test-btn { background: #f44336; color: white; }
        .back-btn { background: #444; color: white; margin-bottom: 20px; }
    </style>
</head>
<body>

    <button class="admin-btn back-btn" onclick="location.href='index.html'">⬅ VOLVER AL MENÚ</button>

    <div class="config-card">
        <h2>CENTRO DE CONTROL</h2>
        
        <label>GEMINI API KEY</label>
        <input type="password" id="gemini-key" placeholder="Pega tu clave aquí...">

        <label>FECHA DE NACIMIENTO (BILLY)</label>
        <input type="date" id="billy-dob">

        <label>NIVEL DE DESAFÍO</label>
        <select id="billy-level">
            <option value="NORMAL">NORMAL (70/10/20)</option>
            <option value="EXPERTO">EXPERTO (SOPHISTICATED)</option>
        </select>

        <button id="save-settings" onclick="saveAll()">GUARDAR CONFIGURACIÓN</button>

        <div class="admin-section">
            <h3 style="color:#aaa; font-size: 14px;">HERRAMIENTAS DE ARQUITECTO</h3>
            <button class="admin-btn win-btn" onclick="location.href='winadjust.html'">📐 CALIBRAR INTERFAZ</button>
            <button class="admin-btn theme-btn" onclick="location.href='themes.html'">🎨 GESTIONAR TEMAS</button>
            <button class="admin-btn test-btn" onclick="location.href='testing.html'">🛠️ API TESTER</button>
        </div>
    </div>

    <script>
        function loadSettings() {
            document.getElementById('gemini-key').value = localStorage.getItem('gemini_key') || '';
            document.getElementById('billy-dob').value = localStorage.getItem('billy_dob') || '2016-01-01';
            document.getElementById('billy-level').value = localStorage.getItem('billy_level') || 'NORMAL';
        }

        function saveAll() {
            localStorage.setItem('gemini_key', document.getElementById('gemini-key').value.trim());
            localStorage.setItem('billy_dob', document.getElementById('billy-dob').value);
            localStorage.setItem('billy_level', document.getElementById('billy-level').value);
            alert("¡Configuración guardada en el dispositivo!");
        }

        window.onload = loadSettings;
    </script>
</body>
</html>
