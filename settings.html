<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Panel de Control</h2>
        
        <div class="setting-group">
            <label>OpenAI API Key:</label>
            <input type="password" id="api-key" placeholder="sk-...">
        </div>

        <div class="setting-group">
            <label>Velocidad de Voz: <span id="speed-val">1.0</span></label>
            <input type="range" id="speech-rate" min="0.5" max="1.5" step="0.1" value="1.0" oninput="document.getElementById('speed-val').innerText = this.value">
        </div>

        <div class="setting-group">
            <label>Voz del Compañero:</label>
            <select id="voice-select">
                <option value="es-ES">Cargando voces...</option>
            </select>
        </div>

        <button class="btn-stage-1" onclick="saveSettings()">
            <span class="label">GUARDAR CAMBIOS</span>
        </button>
    </div>

    <script>
        // Load settings
        document.getElementById('api-key').value = localStorage.getItem('openai_key') || '';
        document.getElementById('speech-rate').value = localStorage.getItem('speech_rate') || 1.0;
        document.getElementById('speed-val').innerText = localStorage.getItem('speech_rate') || 1.0;

        // Populate Voices
        function populateVoices() {
            const voices = window.speechSynthesis.getVoices();
            const select = document.getElementById('voice-select');
            select.innerHTML = '';
            
            // Look for Spanish voices
            voices.filter(v => v.lang.includes('es')).forEach(v => {
                const option = document.createElement('option');
                option.value = v.name;
                option.innerText = v.name;
                if(v.name === localStorage.getItem('preferred_voice')) option.selected = true;
                select.appendChild(option);
            });
        }

        window.speechSynthesis.onvoiceschanged = populateVoices;
        populateVoices();

        function saveSettings() {
            localStorage.setItem('openai_key', document.getElementById('api-key').value);
            localStorage.setItem('speech_rate', document.getElementById('speech-rate').value);
            localStorage.setItem('preferred_voice', document.getElementById('voice-select').value);
            alert('Configuración guardada');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
