<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BillyReads: Settings</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #4a90e2; margin-top: 0; }
        .card { border: 1px solid #e0e0e0; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .card-header { font-weight: bold; color: #555; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { display: block; margin-top: 10px; font-size: 0.85rem; color: #666; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 15px; background: #4a90e2; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .save-btn:active { background: #357abd; }
        .nav-links { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid #eee; padding-top: 20px; }
        .nav-links a { color: #4a90e2; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>Settings & Core</h2>

    <div class="card">
        <div class="card-header">⚙️ System Core</div>
        <label>OpenAI API Key</label>
        <input type="password" id="openai-key" placeholder="sk-...">
        <p style="font-size: 0.7rem; color: #888; margin-top: 10px;">Enables curriculum generation via OpenAI.</p>
    </div>

    <div class="card">
        <div class="card-header">👦 Student Profile</div>
        <label>Billy's Date of Birth</label>
        <input type="date" id="billy_dob">
        
        <label>Learning Level</label>
        <select id="billy_level">
            <option value="NORMAL">NORMAL</option>
            <option value="EXPERTO">EXPERTO</option>
        </select>
    </div>

    <div class="card">
        <div class="card-header">🗣️ Speech Engine</div>
        <label>Voice</label>
        <select id="billy_voice"></select>
        
        <label>Speed & Pitch</label>
        <div style="display:flex; gap:10px;">
            <input type="range" id="billy_rate" min="0.5" max="1.5" step="0.1" value="1">
            <input type="range" id="billy_pitch" min="0.5" max="1.5" step="0.1" value="1">
        </div>
    </div>

    <button class="save-btn" onclick="saveSettings()">SAVE ALL SETTINGS</button>

    <div class="nav-links">
        <a href="testing.html">📡 API Discovery & Testing</a>
        <a href="winadjust.html">📐 WinAdjust: UI Architect</a>
        <a href="index.html">🏠 Back to Main Menu</a>
    </div>
</div>

<script>
    function loadSettings() {
        document.getElementById('openai-key').value = localStorage.getItem('openai-key') || '';
        document.getElementById('billy_dob').value = localStorage.getItem('billy_dob') || '';
        document.getElementById('billy_level').value = localStorage.getItem('billy_level') || 'NORMAL';
        document.getElementById('billy_rate').value = localStorage.getItem('billy_rate') || 1;
        document.getElementById('billy_pitch').value = localStorage.getItem('billy_pitch') || 1;

        const voiceSelect = document.getElementById('billy_voice');
        function populateVoices() {
            const voices = window.speechSynthesis.getVoices();
            voiceSelect.innerHTML = voices
                .filter(v => v.lang.includes('es') || v.lang.includes('en'))
                .map(v => `<option value="${v.name}" ${v.name === localStorage.getItem('billy_voice') ? 'selected' : ''}>${v.name}</option>`)
                .join('');
        }
        populateVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoices;
        }
    }

    function saveSettings() {
        localStorage.setItem('openai-key', document.getElementById('openai-key').value.trim());
        localStorage.setItem('billy_dob', document.getElementById('billy_dob').value);
        localStorage.setItem('billy_level', document.getElementById('billy_level').value);
        localStorage.setItem('billy_voice', document.getElementById('billy_voice').value);
        localStorage.setItem('billy_rate', document.getElementById('billy_rate').value);
        localStorage.setItem('billy_pitch', document.getElementById('billy_pitch').value);

        const btn = document.querySelector('.save-btn');
        btn.innerText = "✅ SAVED!";
        setTimeout(() => { btn.innerText = "SAVE ALL SETTINGS"; }, 2000);
    }

    window.onload = loadSettings;
</script>

</body>
</html>
