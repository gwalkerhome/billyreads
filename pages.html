<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billy Reads | Selección de Páginas</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --gold-glow: 0 0 15px #ffd700;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #1a1a1a;
            font-family: sans-serif;
        }

        #main-backdrop {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .asset-window {
            position: absolute;
            right: 2%; top: 10%;
            width: 25%; height: 80%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 15px;
            overflow-y: auto;
            z-index: 10;
            display: flex; flex-direction: column; gap: 15px;
            box-sizing: border-box;
        }

        .asset-window::-webkit-scrollbar { width: 0px; }

        .page-thumb {
            width: 100%;
            aspect-ratio: 3/4;
            background: #eee;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 3px solid transparent;
        }

        .page-thumb.selected {
            border-color: #ffd700;
            box-shadow: var(--gold-glow);
            transform: scale(1.02);
        }

        .controls {
            position: absolute;
            left: 2%; bottom: 5%;
            display: flex; flex-direction: column; gap: 10px;
            z-index: 10;
        }

        .btn {
            padding: 15px 30px;
            border: none; border-radius: 15px;
            font-family: var(--mc-font);
            font-size: 1rem; cursor: pointer;
            text-transform: uppercase;
        }

        #btn-go { background: #4caf50; color: white; }
        #btn-add { background: #4a90e2; color: white; }
        #btn-back { background: #e74c3c; color: white; }

        #loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
            color: white; z-index: 100; font-family: var(--mc-font);
        }
    </style>
</head>
<body>

    <div id="loading-overlay">ABRIENDO LIBRO MÁGICO...</div>
    <div id="main-backdrop"></div>

    <div class="asset-window" id="pageList"></div>

    <div class="controls">
        <button id="btn-go" class="btn" onclick="goToActivity()">¡A LEER!</button>
        <button id="btn-add" class="btn" onclick="location.href='addpages.html'">AÑADIR PÁGINAS</button>
        <button id="btn-back" class="btn" onclick="location.href='magicbook.html'">VOLVER</button>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase-bridge.js";

        const bookid = localStorage.getItem('current_book_id');
        const backdropurl = localStorage.getItem('current_book_backdrop');
        let selectedpages = [];

        if (!bookid) location.href = 'magicbook.html';

        if (backdropurl) {
            document.getElementById('main-backdrop').style.backgroundImage = `url('${backdropurl}')`;
        }

        async function loadPages() {
            const list = document.getElementById('pageList');
            try {
                const q = query(collection(db, `books/${bookid}/pages`), orderBy("pagenumber", "asc"));
                const snap = await getDocs(q);
                
                list.innerHTML = "";
                document.getElementById('loading-overlay').style.display = 'none';

                if (snap.empty) {
                    list.innerHTML = "<p style='color:white; text-align:center; font-size:0.8rem; padding-top:20px;'>No hay páginas aún.<br>Pulsa 'Añadir'.</p>";
                    return;
                }

                snap.forEach(doc => {
                    const data = doc.data();
                    const thumb = document.createElement('div');
                    thumb.className = 'page-thumb';
                    thumb.style.backgroundImage = `url('${data.imageurl}')`;
                    
                    thumb.onclick = () => {
                        const index = selectedpages.indexOf(data.imageurl);
                        if (index > -1) {
                            selectedpages.splice(index, 1);
                            thumb.classList.remove('selected');
                        } else {
                            selectedpages.push(data.imageurl);
                            thumb.classList.add('selected');
                        }
                    };
                    
                    list.appendChild(thumb);
                });
            } catch (e) {
                console.error("Error loading pages:", e);
                document.getElementById('loading-overlay').innerText = "Error al cargar páginas.";
            }
        }

        window.goToActivity = () => {
            if (selectedpages.length === 0) {
                alert("Selecciona al menos una página para leer");
                return;
            }
            // Save the array as a string so readassist.html can handle the sequence
            localStorage.setItem('selected_pages_json', JSON.stringify(selectedpages));
            location.href = 'readassist.html';
        };

        window.onload = loadPages;
    </script>
</body>
</html>
