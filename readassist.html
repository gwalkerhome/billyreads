<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>billy reads | modo lectura</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --window-bg: rgba(255, 255, 255, 0.15);
            --accent-gold: #ffd700;
            --read-green: #76FF03;
            --quiz-bg: rgba(0, 0, 0, 0.6);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: sans-serif;
        }

        #backdrop {
            position: fixed; inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .language-bar {
            position: absolute;
            top: 1%; right: 5%;
            width: 45%; height: 4%;
            display: flex; justify-content: center; gap: 10px;
            z-index: 20;
        }

        .lang-btn {
            background: rgba(0,0,0,0.5);
            color: white; border: 1px solid white;
            padding: 2px 15px; border-radius: 10px;
            font-family: var(--mc-font); font-size: 0.8rem;
            cursor: pointer; transition: 0.3s;
        }

        .lang-btn.active {
            background: var(--accent-gold);
            color: black; border-color: var(--accent-gold);
        }

        .page-window {
            position: absolute;
            top: 5%; right: 5%;
            width: 45%; height: 55%;
            background: var(--window-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-sizing: border-box;
            z-index: 10;
            display: flex; flex-direction: column;
            color: white; overflow-y: auto;
        }

        /* Quiz Window - Appears below Page Window */
        .quiz-window {
            position: absolute;
            top: 62%; right: 5%;
            width: 45%; height: 13%;
            background: var(--quiz-bg);
            backdrop-filter: blur(15px);
            border: 2px solid var(--accent-gold);
            border-radius: 15px;
            padding: 15px;
            box-sizing: border-box;
            z-index: 11;
            display: none; /* Hidden by default */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.1rem;
            text-align: center;
        }

        .page-text {
            font-size: 1.4rem; line-height: 1.6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .word-span { transition: color 0.2s; display: inline-block; white-space: pre; }
        .word-read { color: var(--read-green); text-shadow: 0 0 5px rgba(118, 255, 3, 0.5); }

        .nav-arrow {
            position: absolute;
            top: 25%;
            width: 50px; height: 50px;
            background: rgba(0,0,0,0.4);
            color: white; border: 2px solid white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mc-font); cursor: pointer;
            z-index: 15;
        }

        #prev-btn { left: 47%; }
        #next-btn { right: 1%; }

        .bottom-controls {
            position: absolute;
            bottom: 5%; left: 5%;
            z-index: 20;
            display: flex; gap: 15px;
        }

        .btn-action {
            padding: 12px 25px; border: none; border-radius: 12px;
            font-family: var(--mc-font); cursor: pointer;
            transition: transform 0.1s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-action:active { transform: scale(0.95); }

        #btn-exit { background: #e74c3c; color: white; }
        #btn-voice { background: var(--accent-gold); color: black; }
        #btn-mic { background: white; color: black; }
        #btn-quiz { background: #9b59b6; color: white; }

        .listening { animation: pulse 1.5s infinite; background: #ff4757 !important; color: white !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Success Overlay */
        #success-overlay {
            position: fixed; inset: 0;
            display: none; align-items: center; justify-content: center;
            z-index: 100; pointer-events: none;
            font-size: 15rem;
        }

        #loading-txt { text-align: center; font-style: italic; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="backdrop"></div>
    <div id="success-overlay">✅</div>

    <div class="language-bar">
        <button id="btn-es" class="lang-btn active" onclick="setlanguage('es')">ES</button>
        <button id="btn-va" class="lang-btn" onclick="setlanguage('va')">VA</button>
        <button id="btn-en" class="lang-btn" onclick="setlanguage('en')">EN</button>
    </div>

    <div id="prev-btn" class="nav-arrow" onclick="changepage(-1)">&lt;</div>
    
    <div class="page-window">
        <div id="text-content" class="page-text">
            <p id="loading-txt">abriendo libro...</p>
        </div>
    </div>

    <div id="quiz-window" class="quiz-window">
        <div id="quiz-text">preparando pregunta...</div>
    </div>

    <div id="next-btn" class="nav-arrow" onclick="changepage(1)">&gt;</div>

    <div class="bottom-controls">
        <button id="btn-exit" class="btn-action" onclick="location.href='pages.html'">salir</button>
        <button id="btn-voice" class="btn-action" onclick="togglevoice()">🔊 escuchar</button>
        <button id="btn-mic" class="btn-action" onclick="togglemic()">🎤 leer</button>
        <button id="btn-quiz" class="btn-action" onclick="startquiz()">❓ quiz me</button>
    </div>

    <script type="module">
        import { db, collection, getDocs, query } from "./firebase-bridge.js";

        const bookid = localStorage.getItem('current_book_id');
        const backdropurl = localStorage.getItem('current_book_backdrop');
        const selectedimageurls = JSON.parse(localStorage.getItem('selected_pages_json') || "[]");
        const geminikey = localStorage.getItem('gemini_key');
        
        let pagedata = []; 
        let currentindex = 0;
        let currentlang = 'es';
        let lastmatchedindex = -1;
        let isquizactive = false;

        const recognition = 'webkitSpeechRecognition' in window ? new webkitSpeechRecognition() : null;
        if (recognition) {
            recognition.continuous = true;
            recognition.interimResults = true;
        }

        if (backdropurl) {
            document.getElementById('backdrop').style.backgroundImage = `url('${backdropurl}')`;
        }

        async function initbook() {
            try {
                const q = query(collection(db, `books/${bookid}/pages`));
                const snap = await getDocs(q);
                const allpages = [];
                snap.forEach(doc => allpages.push(doc.data()));
                pagedata = selectedimageurls.map(url => allpages.find(p => p.imageurl === url)).filter(p => p !== undefined);
                updatedisplay();
            } catch (e) {
                console.error(e);
            }
        }

        window.setlanguage = (lang) => {
            stopvoice(); stopmic();
            currentlang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.id === `btn-${lang}`));
            document.getElementById('quiz-window').style.display = 'none';
            isquizactive = false;
            updatedisplay();
        };

        window.changepage = (direction) => {
            const newindex = currentindex + direction;
            if (newindex >= 0 && newindex < pagedata.length) {
                stopvoice(); stopmic();
                currentindex = newindex;
                document.getElementById('quiz-window').style.display = 'none';
                isquizactive = false;
                updatedisplay();
            }
        };

        function updatedisplay() {
            const textcontent = document.getElementById('text-content');
            if (pagedata.length === 0) return;
            const currentpage = pagedata[currentindex];
            const fulltext = currentpage[`text_${currentlang}`] || "texto no disponible";
            lastmatchedindex = -1;
            textcontent.innerHTML = fulltext.split(/\s+/).map((word, i) => `<span id="word-${i}" class="word-span">${word}</span>`).join(' ');
        }

        window.togglevoice = () => {
            if (window.speechSynthesis.speaking) { stopvoice(); return; }
            stopmic();
            const rawtext = pagedata[currentindex][`text_${currentlang}`];
            const msg = new SpeechSynthesisUtterance(rawtext);
            msg.lang = currentlang === 'en' ? 'en-US' : 'es-ES';
            const voicename = currentlang === 'en' ? localStorage.getItem('billy_voice_en') : localStorage.getItem('billy_voice');
            const voices = window.speechSynthesis.getVoices();
            if (voicename) msg.voice = voices.find(v => v.name === voicename);
            msg.rate = parseFloat(localStorage.getItem('billy_rate') || 1.0);
            msg.pitch = parseFloat(localStorage.getItem('billy_pitch') || 1.0);
            document.getElementById('btn-voice').innerHTML = "⏹ detener";
            msg.onend = () => document.getElementById('btn-voice').innerHTML = "🔊 escuchar";
            window.speechSynthesis.speak(msg);
        };

        function stopvoice() {
            window.speechSynthesis.cancel();
            document.getElementById('btn-voice').innerHTML = "🔊 escuchar";
        }

        // Quiz Logic
        window.startquiz = async () => {
            if (!geminikey) { alert("api key missing in settings"); return; }
            stopmic(); stopvoice();
            
            const qwin = document.getElementById('quiz-window');
            const qtext = document.getElementById('quiz-text');
            qwin.style.display = 'block';
            qtext.innerText = "pensando una pregunta...";
            isquizactive = true;

            const pagetext = pagedata[currentindex][`text_${currentlang}`];
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminikey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Based on this text: "${pagetext}", ask a very short, simple question for a child in ${currentlang}. Only output the question text.` }] }]
                    })
                });
                const data = await response.json();
                const question = data.candidates[0].content.parts[0].text;
                qtext.innerText = question;
                
                // Automatically open mic for Billy to answer
                setTimeout(() => togglemic(), 1000);
            } catch (e) {
                qtext.innerText = "error al generar pregunta.";
            }
        };

        window.togglemic = () => {
            const btn = document.getElementById('btn-mic');
            if (btn.classList.contains('listening')) { stopmic(); } 
            else {
                stopvoice();
                btn.classList.add('listening');
                btn.innerHTML = "⏹ parar";
                recognition.lang = currentlang === 'en' ? 'en-US' : 'es-ES';
                recognition.start();
            }
        };

        function stopmic() {
            if (recognition) recognition.stop();
            const btn = document.getElementById('btn-mic');
            btn.classList.remove('listening');
            btn.innerHTML = "🎤 leer";
        }

        function playting() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        async function verifyanswer(answer) {
            const pagetext = pagedata[currentindex][`text_${currentlang}`];
            const question = document.getElementById('quiz-text').innerText;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminikey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Text: "${pagetext}". Question: "${question}". Billy's answer: "${answer}". Is this answer correct? Reply only with "YES" or "NO".` }] }]
                    })
                });
                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text.trim().toUpperCase();
                
                if (result.includes("YES")) {
                    playting();
                    const overlay = document.getElementById('success-overlay');
                    overlay.style.display = 'flex';
                    setTimeout(() => { overlay.style.display = 'none'; }, 2000);
                    stopmic();
                }
            } catch (e) { console.error(e); }
        }

        if (recognition) {
            recognition.onresult = (event) => {
                let transcript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    transcript += event.results[i][0].transcript;
                }
                
                if (isquizactive) {
                    if (event.results[event.results.length - 1].isFinal) {
                        verifyanswer(transcript);
                    }
                } else {
                    // Standard reading highlight logic
                    const spokenwords = transcript.toLowerCase().split(/\s+/);
                    const spans = document.querySelectorAll('.word-span');
                    const strictness = parseInt(localStorage.getItem('billy_strictness') || '2');
                    const lookahead = strictness === 1 ? 5 : (strictness === 4 ? 1 : 3);
                    
                    spokenwords.forEach(spoken => {
                        const cleanvoice = spoken.replace(/[.,!?;:]/g, "");
                        for (let i = lastmatchedindex + 1; i <= Math.min(lastmatchedindex + lookahead, spans.length - 1); i++) {
                            if (cleanvoice === spans[i].innerText.toLowerCase().replace(/[.,!?;:]/g, "")) {
                                spans[i].classList.add('word-read');
                                lastmatchedindex = i;
                                break;
                            }
                        }
                    });
                }
            };
            recognition.onend = () => { if (document.getElementById('btn-mic').classList.contains('listening')) recognition.start(); };
        }

        initbook();
    </script>
</body>
</html>
