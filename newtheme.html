<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billy Reads | Add New Theme</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-blue: #4a90e2;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { font-family: var(--mc-font); color: #2c3e50; text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; font-size: 0.9rem; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 12px; box-sizing: border-box; font-size: 1rem; }
        .btn-save { width: 100%; padding: 18px; background: var(--accent-blue); color: white; border: none; border-radius: 15px; font-family: var(--mc-font); font-size: 1.1rem; cursor: pointer; }
        .btn-save:disabled { background: #cbd5e0; }
        #status { margin-top: 15px; text-align: center; font-size: 0.85rem; color: #7f8c8d; min-height: 1.5em; }
        .nav-footer { margin-top: 20px; width: 100%; max-width: 500px; }
        #btn-back { width: 100%; padding: 12px; border: none; border-radius: 12px; background: #eee; color: #666; font-family: var(--mc-font); cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>NUEVO THEME</h1>
        <div class="input-group">
            <label>Nombre del Theme</label>
            <input type="text" id="themeTitle" placeholder="Ej: seaside">
        </div>
        <div class="input-group">
            <label>Imagen de Fondo</label>
            <input type="file" id="bgImg" accept="image/*">
        </div>
        <button id="saveBtn" class="btn-save" onclick="saveNewTheme()">GUARDAR THEME</button>
        <div id="status"></div>
    </div>

    <div class="nav-footer">
        <button id="btn-back" onclick="location.href='themes.html'">CANCELAR</button>
    </div>

    <script type="module">
        // We MUST use module to import from the bridge
        import { db, storage, collection, doc, setDoc, ref, uploadBytes, getDownloadURL } from "./firebase-bridge.js";

        window.saveNewTheme = async function() {
            console.log("Function triggered");
            const titleInput = document.getElementById('themeTitle');
            const fileInput = document.getElementById('bgImg');
            const status = document.getElementById('status');
            const saveBtn = document.getElementById('saveBtn');

            if (!titleInput.value || !fileInput.files[0]) {
                alert("Por favor, rellena todos los campos.");
                return;
            }

            const safeName = titleInput.value.trim().toLowerCase().replace(/\s+/g, '_');
            saveBtn.disabled = true;
            status.innerText = "⏳ Procesando...";

            try {
                const themeRef = doc(db, "themes", safeName);
                const storageRef = ref(storage, `themes/${safeName}/background`);
                
                const snap = await uploadBytes(storageRef, fileInput.files[0]);
                const downloadURL = await getDownloadURL(snap.ref);

                await setDoc(themeRef, {
                    themeName: safeName,
                    url: downloadURL,
                    storagePath: `themes/${safeName}/background`,
                    createdAt: Date.now(),
                    layout: {
                        'pane-back': {t:5, l:5, w:10, h:10},
                        'pane-birch': {t:5, l:30, w:40, h:10},
                        'pane-stone': {t:25, l:25, w:50, h:30},
                        'pane-record': {t:65, l:35, w:30, h:15},
                        'pane-speech': {t:40, l:80, w:10, h:15},
                        'pane-valenciano': {t:75, l:25, w:50, h:8},
                        'pane-val-toggle': {t:75, l:15, w:8, h:8},
                        'pane-slab': {t:88, l:20, w:60, h:10}
                    }
                });

                status.style.color = "green";
                status.innerText = "✅ Éxito";
                setTimeout(() => location.href = 'themes.html', 1000);

            } catch (error) {
                alert("Error: " + error.message);
                saveBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
