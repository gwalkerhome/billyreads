<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billy Reads | Test Connection</title>
    <style>
        :root { --mc-font: 'Arial Black', Gadget, sans-serif; --accent-blue: #4a90e2; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-family: var(--mc-font); font-size: 1.2rem; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #edf2f7; border-radius: 12px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 18px; background: var(--accent-blue); color: white; border: none; border-radius: 15px; font-family: var(--mc-font); cursor: pointer; }
        #status { margin-top: 15px; text-align: center; font-size: 0.85rem; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="container">
        <h1>DB CONNECTION TEST</h1>
        <input type="text" id="testName" placeholder="Enter test name here">
        <button id="saveBtn" class="btn-save">TEST SAVE</button>
        <div id="status">Ready to test...</div>
    </div>

    <script type="module">
        import { db, doc, setDoc } from "./firebase-bridge.js";

        async function runTest() {
            const nameInput = document.getElementById('testName');
            const status = document.getElementById('status');
            const saveBtn = document.getElementById('saveBtn');

            if (!nameInput.value) {
                alert("Type a name first");
                return;
            }

            const safeName = nameInput.value.trim().toLowerCase().replace(/\s+/g, '_');
            
            saveBtn.disabled = true;
            status.innerText = "⏳ Attempting DB write...";

            try {
                // Testing direct write to 'themes' collection
                const testRef = doc(db, "themes", safeName);
                
                await setDoc(testRef, {
                    themeName: safeName,
                    testDate: Date.now(),
                    status: "connection_test_successful"
                });

                status.style.color = "green";
                status.innerText = "✅ DB WRITE SUCCESSFUL!";
                console.log("Success for ID:", safeName);

            } catch (error) {
                console.error("DB Error:", error);
                status.style.color = "red";
                status.innerText = "❌ ERROR: " + error.message;
                saveBtn.disabled = false;
            }
        }

        document.getElementById('saveBtn').onclick = runTest;
    </script>
</body>
</html>
