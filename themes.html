<script type="module">
    import { 
        db, storage, ref, deleteObject, 
        collection, getDocs, deleteDoc, doc, query, orderBy, 
        saveGlobalTheme, getGlobalTheme 
    } from "./firebase-bridge.js";

    const BASE_PROMPT = `Role & Context: Act as an Architectural Illustrator specializing in children's educational interface design. 3D style (3:2 aspect ratio). Functional Constraint: Text Windows must be empty. Illustrated features (buttons/toggles) must be physical parts of environment. NO text/labeling. [Layout: Primary 45x27, Subject 41x9, Translation 53x6, Subtitle 57x6]. Theme/mood = `;

    // Default layout to use if a theme was saved without one
    const DEFAULT_LAYOUT = {
        'pane-back': {t:5, l:5, w:10, h:10},
        'pane-birch': {t:5, l:30, w:40, h:10},
        'pane-stone': {t:25, l:25, w:50, h:30},
        'pane-record': {t:65, l:35, w:30, h:15},
        'pane-speech': {t:40, l:80, w:10, h:15},
        'pane-valenciano': {t:75, l:25, w:50, h:8},
        'pane-val-toggle': {t:75, l:15, w:8, h:8},
        'pane-slab': {t:88, l:20, w:60, h:10}
    };

    window.updatePromptText = () => {
        const mood = document.getElementById('moodInput').value;
        document.getElementById('promptArea').value = BASE_PROMPT + mood;
    };

    window.openPrompt = () => { 
        document.getElementById('promptModal').style.display = 'flex'; 
        updatePromptText();
    };
    window.closePrompt = () => { document.getElementById('promptModal').style.display = 'none'; };

    window.copyPrompt = () => {
        const area = document.getElementById("promptArea");
        area.select();
        navigator.clipboard.writeText(area.value);
        alert("Prompt Copied!");
    };

    window.loadThemes = async () => {
        const grid = document.getElementById('themeGrid');
        grid.innerHTML = 'Fetching themes...';
        
        try {
            const cloudState = await getGlobalTheme();
            const activeId = cloudState ? cloudState.activeThemeId : null;

            const q = query(collection(db, "themes"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            grid.innerHTML = '';

            if (querySnapshot.empty) {
                grid.innerHTML = '<p style="opacity:0.5; margin-top:20px;">Library is empty. Upload your first theme!</p>';
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const theme = docSnap.data();
                const id = docSnap.id;
                const isActive = activeId === id;
                
                // Safety check: use theme layout or default
                const layoutData = theme.layout || DEFAULT_LAYOUT;

                const card = document.createElement('div');
                card.className = `theme-card ${isActive ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="theme-title">${id}</div>
                    <img src="${theme.url}" class="thumb">
                    <div class="card-controls">
                        <button id="btn-${id}" class="btn-use">
                            ${isActive ? '✅ ACTIVE' : 'USE THEME'}
                        </button>
                        <button class="btn-del" onclick="deleteTheme('${id}', '${theme.storagePath || ''}')">DELETE</button>
                    </div>
                `;
                grid.appendChild(card);

                // Attach listener directly to avoid stringification issues
                document.getElementById(`btn-${id}`).onclick = () => selectTheme(id, theme.url, layoutData);
            });
        } catch (err) {
            grid.innerHTML = 'Connection error.';
            console.error(err);
        }
    };

    window.selectTheme = async (id, url, layout) => {
        const status = document.getElementById('status-msg');
        status.style.display = 'block';
        status.innerText = "⏳ Updating Global Theme...";
        
        const success = await saveGlobalTheme(id, url, layout);
        if (success) {
            status.innerText = "✅ Theme Updated!";
            setTimeout(() => { status.style.display = 'none'; }, 2000);
            loadThemes();
        } else {
            alert("Failed to update theme.");
        }
    };

    window.deleteTheme = async (id, storagePath) => {
        if(!confirm(`Delete ${id}?`)) return;
        try {
            await deleteDoc(doc(db, "themes", id));
            // Only try to delete from storage if we have a path
            if (storagePath) {
                await deleteObject(ref(storage, storagePath));
            }
            loadThemes();
        } catch (err) {
            console.error("Delete error:", err);
            // Even if storage delete fails, we should refresh the list
            loadThemes();
        }
    };

    loadThemes();
</script>
