<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BillyReads | Biblioteca Cloud</title>
    <style>
        :root { 
            --mc-font: 'Arial Black', Gadget, sans-serif; 
            --accent: #4a90e2;
            --flash-green: #76FF03;
        }
        body { 
            font-family: sans-serif; background: #1a1a1a; color: white;
            padding: 20px; text-align: center; margin: 0;
        }
        h1 { font-family: var(--mc-font); font-size: 1.5rem; color: var(--accent); }
        
        .nav-hub {
            display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 30px;
        }
        .nav-hub button {
            padding: 10px 15px; border-radius: 8px; border: none;
            font-family: var(--mc-font); font-size: 10px; cursor: pointer;
            background: #333; color: white; transition: 0.2s;
        }
        .nav-hub button:hover { background: var(--accent); }
        .btn-prompt { background: #9c27b0 !important; }

        .theme-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; max-width: 1000px; margin: 0 auto;
            padding-bottom: 100px;
        }
        .theme-card {
            background: #2a2a2a; border-radius: 12px; padding: 10px;
            border: 3px solid transparent; transition: 0.2s; position: relative;
        }
        .theme-card.active { border-color: var(--flash-green); }
        .thumb { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .card-controls { display: flex; flex-direction: column; gap: 5px; }
        .btn-use { background: var(--flash-green); color: black; font-weight: bold; font-size: 10px; padding: 8px; border:none; border-radius:4px; cursor:pointer;}
        .btn-del { background: #ff4d4d; color: white; font-size: 10px; opacity: 0.7; padding: 5px; border-radius: 4px; border:none; cursor:pointer;}

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #1a1a1a; padding: 20px; border-radius: 15px; width: 90%; max-width: 600px;
            border: 2px solid var(--accent); text-align: left;
        }
        textarea {
            width: 100%; height: 250px; background: #000; color: #ddd; font-family: sans-serif;
            font-size: 12px; padding: 10px; border: 1px solid #333; box-sizing: border-box; resize: none;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; }

        .back-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #444; color: white; padding: 15px 40px; border-radius: 30px; border: none; font-family: var(--mc-font); cursor:pointer;
        }
        #status-msg { font-size: 12px; color: var(--flash-green); margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <h1>BIBLIOTECA DE TEMAS CLOUD</h1>

    <div class="nav-hub">
        <button class="btn-prompt" onclick="openPrompt()">✨ GENERATE AI PROMPT</button>
        <button onclick="location.href='winadjust.html'">⚙️ WINGEN (AJUSTAR)</button>
        <button onclick="location.href='createbg.html'">🎨 CREAR NUEVO FONDO</button>
        <button onclick="document.getElementById('fileInput').click()">+ SUBIR A LA NUBE</button>
    </div>
    
    <div id="status-msg">Conectando con el puente...</div>

    <div class="theme-grid" id="themeGrid"></div>

    <button class="back-nav" onclick="location.href='settings.html'">VOLVER AL CONTROL</button>

    <div id="promptModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color: var(--accent);">V4 Architectural Prompt</h3>
            <div style="margin-bottom:10px;">
                <label style="color:var(--flash-green); font-size: 0.8rem; font-family: var(--mc-font);">MOOD / THEME:</label>
                <input type="text" id="moodInput" placeholder="e.g. Science Lab, Ancient Rome, Deep Sea..." 
                       style="width:100%; padding:10px; background:#222; border:1px solid #444; color:white; border-radius:5px;"
                       oninput="updatePromptText()">
            </div>
            <textarea id="promptArea" readonly></textarea>
            <div class="modal-btns">
                <button class="btn-use" style="flex:1" onclick="copyPrompt()">COPY TO CLIPBOARD</button>
                <button class="btn-del" style="background:#444; opacity:1" onclick="closePrompt()">CLOSE</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" hidden accept="image/*" onchange="handleUpload(event)">

    <script type="module">
        import { 
            db, storage, ref, uploadBytes, getDownloadURL, deleteObject, 
            collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, 
            saveGlobalTheme, getGlobalTheme 
        } from "./firebase-bridge.js";

        const BASE_PROMPT = `Role & Context: Act as an Architectural Illustrator specializing in children's educational interface design. 3D style (3:2 aspect ratio). Functional Constraint: Text Windows must be empty. Illustrated features (buttons/toggles) must be physical parts of environment. NO text/labeling. [Layout: Primary 45x27, Subject 41x9, Translation 53x6, Subtitle 57x6]. Theme/mood = `;

        window.updatePromptText = () => {
            const mood = document.getElementById('moodInput').value;
            document.getElementById('promptArea').value = BASE_PROMPT + mood;
        };

        window.openPrompt = () => { 
            document.getElementById('promptModal').style.display = 'flex'; 
            updatePromptText();
        };
        window.closePrompt = () => { document.getElementById('promptModal').style.display = 'none'; };
        
        window.copyPrompt = () => {
            const area = document.getElementById("promptArea");
            area.select();
            navigator.clipboard.writeText(area.value);
            alert("Prompt Copied!");
        };

        window.handleUpload = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const status = document.getElementById('status-msg');
            status.innerText = "Subiendo a la nube...";
            status.style.display = "block";

            try {
                const storageRef = ref(storage, `themes/${Date.now()}_${file.name}`);
                const snapshot = await uploadBytes(storageRef, file);
                const downloadURL = await getDownloadURL(snapshot.ref);

                await addDoc(collection(db, "themes"), {
                    name: file.name,
                    url: downloadURL,
                    storagePath: storageRef.fullPath,
                    createdAt: Date.now(),
                    layout: {
                        'pane-back': {t:12, l:3, w:9, h:15},
                        'pane-birch': {t:5, l:30, w:41, h:9},
                        'pane-stone': {t:27, l:28, w:45, h:27},
                        'pane-record': {t:66, l:37, w:27, h:11},
                        'pane-speech': {t:39, l:75, w:10, h:18},
                        'pane-valenciano': {t:75, l:26, w:53, h:6},
                        'pane-val-toggle': {t:75, l:18, w:6, h:12},
                        'pane-slab': {t:90, l:22, w:57, h:6}
                    }
                });
                status.style.display = "none";
                loadThemes();
            } catch (err) {
                console.error(err);
                alert("Error subiendo. Verifica las reglas de Firebase.");
                status.style.display = "none";
            }
        };

        window.loadThemes = async () => {
            const grid = document.getElementById('themeGrid');
            grid.innerHTML = 'Cargando temas cloud...';
            
            // Get active theme from Cloud first
            const cloudState = await getGlobalTheme();
            const activeId = cloudState ? cloudState.activeThemeId : localStorage.getItem('bg_flashcard_cloud');

            try {
                const q = query(collection(db, "themes"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                grid.innerHTML = '';

                querySnapshot.forEach((docSnap) => {
                    const theme = docSnap.data();
                    const id = docSnap.id;
                    const isActive = activeId === id;

                    const card = document.createElement('div');
                    card.className = `theme-card ${isActive ? 'active' : ''}`;
                    card.innerHTML = `
                        <img src="${theme.url}" class="thumb">
                        <div class="card-controls">
                            <button class="btn-use" onclick="selectTheme('${id}', '${theme.url}', ${JSON.stringify(theme.layout).replace(/"/g, '&quot;')})">
                                ${isActive ? '✅ ACTIVO' : 'USAR FONDO'}
                            </button>
                            <button class="btn-del" onclick="deleteTheme('${id}', '${theme.storagePath}')">ELIMINAR</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                grid.innerHTML = 'Error de conexión. Revisa las reglas de seguridad.';
            }
        };

        window.selectTheme = async (id, url, layout) => {
            const success = await saveGlobalTheme(id, url, layout);
            if (success) {
                loadThemes();
            } else {
                alert("Error al sincronizar con la nube.");
            }
        };

        window.deleteTheme = async (id, storagePath) => {
            if(!confirm("¿Borrar permanentemente?")) return;
            try {
                await deleteDoc(doc(db, "themes", id));
                await deleteObject(ref(storage, storagePath));
                loadThemes();
            } catch (err) {}
        };

        loadThemes();
    </script>
</body>
</html>
