<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biblioteca de Temas</title>
    <style>
        :root { 
            --mc-font: 'Arial Black', Gadget, sans-serif; 
            --accent: #4a90e2;
            --flash-green: #76FF03;
        }
        body { 
            font-family: sans-serif; background: #1a1a1a; color: white;
            padding: 20px; text-align: center; margin: 0;
        }
        h1 { font-family: var(--mc-font); font-size: 1.5rem; color: var(--accent); }
        
        .nav-hub {
            display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 30px;
        }
        .nav-hub button {
            padding: 10px 15px; border-radius: 8px; border: none;
            font-family: var(--mc-font); font-size: 10px; cursor: pointer;
            background: #333; color: white; transition: 0.2s;
        }
        .nav-hub button:hover { background: var(--accent); }
        .btn-prompt { background: #9c27b0 !important; }

        .theme-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; max-width: 1000px; margin: 0 auto;
            padding-bottom: 100px;
        }
        .theme-card {
            background: #2a2a2a; border-radius: 12px; padding: 10px;
            border: 3px solid transparent; transition: 0.2s;
        }
        .theme-card.active { border-color: var(--flash-green); }
        .thumb { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .card-controls { display: flex; flex-direction: column; gap: 5px; }
        .btn-use { background: var(--flash-green); color: black; font-weight: bold; font-size: 10px; padding: 8px; }
        .btn-del { background: #ff4d4d; color: white; font-size: 10px; opacity: 0.7; padding: 5px; border-radius: 4px; border:none; }

        /* Modal Styles */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #1a1a1a; padding: 20px; border-radius: 15px; width: 90%; max-width: 600px;
            border: 2px solid var(--accent); text-align: left;
        }
        textarea {
            width: 100%; height: 350px; background: #000; color: #ddd; font-family: sans-serif;
            font-size: 12px; padding: 10px; border: 1px solid #333; box-sizing: border-box; resize: none;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; }

        .back-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #444; color: white; padding: 15px 40px; border-radius: 30px; border: none; font-family: var(--mc-font);
        }
    </style>
</head>
<body>

    <h1>BIBLIOTECA DE TEMAS</h1>

    <div class="nav-hub">
        <button class="btn-prompt" onclick="openPrompt()">✨ GENERATE AI PROMPT</button>
        <button onclick="location.href='winadjust.html'">⚙️ WINGEN (AJUSTAR)</button>
        <button onclick="location.href='createbg.html'">🎨 CREAR NUEVO FONDO</button>
        <button onclick="document.getElementById('fileInput').click()">+ SUBIR ARCHIVO</button>
    </div>

    <div class="theme-grid" id="themeGrid"></div>

    <button class="back-nav" onclick="location.href='settings.html'">VOLVER AL CONTROL</button>

    <div id="promptModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color: var(--accent);">V4 Architectural Prompt</h3>
            <textarea id="promptArea" readonly>Role & Context: Act as an Architectural Illustrator specializing in children's educational interface design. You are creating a high-fidelity, polished thematic background for a learning application. The mood/theme is provided at the very end of this prompt. It must be rendered in a professional 3D style (3:2 aspect ratio). The Functional Constraint: This image is a functional framework. It is CRITICAL that the specified Text Windows are completely empty, flat, non-distracting zones where dynamic text will be placed. Do not place any characters, text, or focal points inside these specific zones. do not label the windows It is also CRITICAL that the Illustrated Features (buttons and toggles) are beautifully designed directly into the art. They must look like physical parts of the environment (carved, metallic, glowing, etc.) but must adhere strictly to the provided position and size constraints. Required Layout: There must be NO text/labelling anywhere in the image.

📝 Clear Text Windows (Must be left empty) 

1. PRIMARY TEXT FIELD: * centre of the image as the key focal point | Size: 45% width, 27% height. (The main display area). 

2. SUBJECT TITLE WINDOW: * just above the primary text field. Size: 41% width, 9% height. (A horizontal plaque/banner). 

3. SECONDARY TRANSLATION WINDOW: * Size: 53% width, 6% height. (A narrow horizontal strip). 

4. SUBTITLE/TRANSCRIPT BAR: • at the bottom of the screen. Size: 57% width, 6% height. (A flat bar at the bottom). 

🛠️ Illustrated Features (Incorporate into the art) 

1. EXIT BUTTON: * Pos: 3% left, 12% top | Size: 9% width, 15% height. (A clear "Back" or "Close" mechanism). 

2. LANGUAGE TOGGLE: * directly next to the secondary translation window | Size: 6% width, 12% height. (A physical switch or lever). 

3. MICROPHONE/RECORD BUTTON: * directly beneath the primary text field | Size: 27% width, 11% height. (An integrated recording interface). 

4. SPEAKER/AUDIO BUTTON: * directly next to the primary text field| Size: 10% width, 18% height. (An integrated "Listen" or speaker icon). 

Final Instruction: Maintain a clean visual hierarchy. The art should exist around the text windows, never overlapping them. The illustrated features should be part of the world’s architecture. NO TEXT ON THE PAGE

Theme/mood =</textarea>
            <div class="modal-btns">
                <button class="btn-use" style="flex:1" onclick="copyPrompt()">COPY TO CLIPBOARD</button>
                <button class="btn-del" style="background:#444; opacity:1" onclick="closePrompt()">CLOSE</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" hidden accept="image/*" onchange="handleUpload(event)">

    <script>
        let db;
        const request = indexedDB.open("ThemeDB", 1);

        request.onupgradeneeded = e => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("themes")) {
                db.createObjectStore("themes", { keyPath: "id", autoIncrement: true });
            }
        };

        request.onsuccess = e => { db = e.target.result; loadThemes(); };

        function openPrompt() { document.getElementById('promptModal').style.display = 'flex'; }
        function closePrompt() { document.getElementById('promptModal').style.display = 'none'; }
        function copyPrompt() {
            const copyText = document.getElementById("promptArea");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("Prompt copied!");
        }

        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const tx = db.transaction(["themes"], "readwrite");
                tx.objectStore("themes").add({
                    name: file.name,
                    data: e.target.result,
                    layout: {
                        'pane-back': {t:12, l:3, w:9, h:15},
                        'pane-birch': {t:5, l:30, w:41, h:9},
                        'pane-stone': {t:27, l:28, w:45, h:27},
                        'pane-record': {t:66, l:37, w:27, h:11},
                        'pane-speech': {t:39, l:75, w:10, h:18},
                        'pane-valenciano': {t:75, l:26, w:53, h:6},
                        'pane-val-toggle': {t:75, l:18, w:6, h:12},
                        'pane-slab': {t:90, l:22, w:57, h:6}
                    }
                });
                tx.oncomplete = () => loadThemes();
            };
            reader.readAsDataURL(file);
        }

        function loadThemes() {
            const grid = document.getElementById('themeGrid');
            grid.innerHTML = '';
            const activeId = localStorage.getItem('bg_flashcard');
            const tx = db.transaction("themes", "readonly");
            tx.objectStore("themes").getAll().onsuccess = e => {
                e.target.result.forEach(theme => {
                    const card = document.createElement('div');
                    card.className = `theme-card ${activeId == theme.id ? 'active' : ''}`;
                    card.innerHTML = `
                        <img src="${theme.data}" class="thumb">
                        <div class="card-controls">
                            <button class="btn-use" onclick="selectTheme(${theme.id})">USAR ESTE FONDO</button>
                            <button class="btn-del" onclick="deleteTheme(${theme.id})">ELIMINAR</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            };
        }

        function selectTheme(id) {
            const tx = db.transaction("themes", "readonly");
            tx.objectStore("themes").get(id).onsuccess = e => {
                const theme = e.target.result;
                localStorage.setItem('bg_flashcard', theme.id);
                if (theme.layout) localStorage.setItem('ui_positions', JSON.stringify(theme.layout));
                loadThemes();
                alert("Fondo seleccionado.");
            };
        }

        function deleteTheme(id) {
            if(!confirm("¿Borrar?")) return;
            const tx = db.transaction(["themes"], "readwrite");
            tx.objectStore("themes").delete(id);
            tx.oncomplete = () => loadThemes();
        }
    </script>
</body>
</html>
