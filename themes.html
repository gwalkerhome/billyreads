<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biblioteca de Temas</title>
    <style>
        :root { 
            --mc-font: 'Arial Black', Gadget, sans-serif; 
            --accent: #4a90e2;
            --flash-green: #76FF03;
        }
        body { 
            font-family: sans-serif; background: #1a1a1a; color: white;
            padding: 20px; text-align: center; margin: 0;
        }
        h1 { font-family: var(--mc-font); font-size: 1.5rem; color: var(--accent); }
        
        /* Navigation Bar */
        .nav-hub {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 30px;
        }
        .nav-hub button {
            padding: 12px 20px; border-radius: 8px; border: none;
            font-family: var(--mc-font); font-size: 12px; cursor: pointer;
            background: #333; color: white; transition: 0.2s;
        }
        .nav-hub button:hover { background: var(--accent); }

        /* Repository Grid */
        .theme-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; max-width: 1000px; margin: 0 auto;
            padding-bottom: 100px; /* Space for back button */
        }

        .theme-card {
            background: #2a2a2a; border-radius: 12px; padding: 10px;
            border: 3px solid transparent; transition: 0.2s; position: relative;
        }
        .theme-card.active { border-color: var(--flash-green); }

        .thumb {
            width: 100%; height: 120px; object-fit: cover;
            border-radius: 8px; margin-bottom: 10px;
        }

        .card-controls { display: flex; flex-direction: column; gap: 5px; }
        .btn-use { background: var(--flash-green); color: black; font-weight: bold; }
        .btn-del { background: #ff4d4d; color: white; font-size: 10px; opacity: 0.7; }

        .back-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #444; color: white; padding: 15px 40px; border-radius: 30px;
        }
    </style>
</head>
<body>

    <h1>BIBLIOTECA DE TEMAS</h1>

    <div class="nav-hub">
        <button onclick="location.href='winadjust.html'">⚙️ WINGEN (AJUSTAR)</button>
        <button onclick="location.href='createbg.html'">🎨 CREAR NUEVO FONDO</button>
        <button onclick="document.getElementById('fileInput').click()">+ SUBIR ARCHIVO</button>
    </div>

    <div class="theme-grid" id="themeGrid">
        </div>

    <button class="back-nav" onclick="location.href='settings.html'">VOLVER AL CONTROL</button>
    <input type="file" id="fileInput" hidden accept="image/*" onchange="handleUpload(event)">

    <script>
        let db;
        const request = indexedDB.open("ThemeDB", 1);

        request.onupgradeneeded = e => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("themes")) {
                db.createObjectStore("themes", { keyPath: "id", autoIncrement: true });
            }
        };

        request.onsuccess = e => {
            db = e.target.result;
            loadThemes();
        };

        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = e => {
                const transaction = db.transaction(["themes"], "readwrite");
                transaction.objectStore("themes").add({
                    name: file.name,
                    data: e.target.result,
                    // Default layout in case it's a fresh upload
                    layout: {
                        'pane-back': {t:12, l:3, w:9, h:15},
                        'pane-birch': {t:5, l:30, w:41, h:9},
                        'pane-stone': {t:27, l:28, w:45, h:27},
                        'pane-record': {t:66, l:37, w:27, h:11},
                        'pane-speech': {t:39, l:75, w:10, h:18},
                        'pane-valenciano': {t:75, l:26, w:53, h:6},
                        'pane-val-toggle': {t:75, l:18, w:6, h:12},
                        'pane-slab': {t:90, l:22, w:57, h:6}
                    }
                });
                transaction.oncomplete = () => loadThemes();
            };
            reader.readAsDataURL(file);
        }

        function loadThemes() {
            const grid = document.getElementById('themeGrid');
            grid.innerHTML = '';
            const activeId = localStorage.getItem('bg_flashcard');

            const transaction = db.transaction("themes", "readonly");
            transaction.objectStore("themes").getAll().onsuccess = e => {
                e.target.result.forEach(theme => {
                    const isActive = activeId == theme.id;
                    const card = document.createElement('div');
                    card.className = `theme-card ${isActive ? 'active' : ''}`;
                    
                    card.innerHTML = `
                        <img src="${theme.data}" class="thumb">
                        <div class="card-controls">
                            <button class="btn-use" onclick="selectTheme(${theme.id})">USAR ESTE FONDO</button>
                            <button class="btn-del" onclick="deleteTheme(${theme.id})">ELIMINAR</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            };
        }

        function selectTheme(id) {
            const transaction = db.transaction("themes", "readonly");
            transaction.objectStore("themes").get(id).onsuccess = e => {
                const theme = e.target.result;
                localStorage.setItem('bg_flashcard', theme.id);
                // Bolt the saved coordinates to the live UI session
                if (theme.layout) {
                    localStorage.setItem('ui_positions', JSON.stringify(theme.layout));
                }
                loadThemes();
                alert("¡Fondo y posiciones actualizados!");
            };
        }

        function deleteTheme(id) {
            if(!confirm("¿Borrar este fondo de la base de datos?")) return;
            const transaction = db.transaction(["themes"], "readwrite");
            transaction.objectStore("themes").delete(id);
            transaction.oncomplete = () => loadThemes();
        }
    </script>
</body>
</html>
