<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>childrens book background creator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #4285f4; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { background: #357ae8; }
        .secondary-btn { background: #34a853; }
        .action-btn { background: #ea4335; margin-top: 20px; }
        #status { font-size: 14px; color: #666; text-align: center; }
        img { max-width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h3>gemini api settings</h3>
        <input type="password" id="api-key" placeholder="enter gemini api key">
        <button onclick="saveKey()">save key</button>
        <p id="status"></p>
    </div>

    <div class="card">
        <h3>step 1: input capture</h3>
        <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden">
        <button class="secondary-btn" onclick="document.getElementById('camera-input').click()">take photograph</button>
        <img id="preview" alt="photo preview">
    </div>

    <div class="card">
        <h3>step 2: generate & download</h3>
        <button id="generate-btn" class="action-btn">generate background</button>
        <div id="result-container" class="hidden">
            <p>generation complete!</p>
            <button id="download-link" class="secondary-btn">download result</button>
        </div>
    </div>

    <script>
        // persistence for your api key
        const keyInput = document.getElementById('api-key');
        const statusMsg = document.getElementById('status');
        
        if (localStorage.getItem('gemini_key')) {
            keyInput.value = localStorage.getItem('gemini_key');
            statusMsg.innerText = "key loaded from storage";
        }

        function saveKey() {
            localStorage.setItem('gemini_key', keyInput.value);
            statusMsg.innerText = "key saved successfully";
        }

        // image preview handler
        const cameraInput = document.getElementById('camera-input');
        const preview = document.getElementById('preview');
        let photoBase64 = "";

        cameraInput.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                photoBase64 = event.target.result.split(',')[1];
                preview.src = event.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        };

        // main ai generation function
        document.getElementById('generate-btn').onclick = async () => {
            const key = localStorage.getItem('gemini_key');
            if (!key) return alert("please save an api key first");
            if (!photoBase64) return alert("please take a photograph first");

            statusMsg.innerText = "contacting nano banana...";
            
            try {
                // we fetch the template file from your server/directory
                const templateResponse = await fetch('assets/book_template.jpeg');
                const templateBlob = await templateResponse.blob();
                const templateBase64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = () => r(reader.result.split(',')[1]);
                    reader.readAsDataURL(templateBlob);
                });

                const promptText = "find out about the book shown in the photograph. Create a beautiful, 3d image incorporating the characters and theme of the book to act as a background for a children’s reading app. The second image with the coloured boxes shows where specific assets need to be incorporated into the design. The positioning and size of these assets is critical; do not deviate. The black boxes need to be kept clear for the app to paste text in such a way that it will be easy to read without visual distractions. The red oval should also be a clear space. The blue square shows the position of a ‘listen’ button which should be incorporated into the page design and be easily recognisable. The green square shows the positioning of a microphone button.";

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: promptText },
                                { inline_data: { mime_type: "image/jpeg", data: photoBase64 } },
                                { inline_data: { mime_type: "image/jpeg", data: templateBase64 } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                
                // nano banana returns image bytes in the response
                const generatedImageBase64 = data.candidates[0].content.parts[0].inline_data.data;
                const mimeType = data.candidates[0].content.parts[0].inline_data.mime_type;

                // prepare download
                const downloadBtn = document.getElementById('download-link');
                downloadBtn.onclick = () => {
                    const link = document.createElement('a');
                    link.href = `data:${mimeType};base64,${generatedImageBase64}`;
                    link.download = "generated_background.png";
                    link.click();
                };

                document.getElementById('result-container').classList.remove('hidden');
                statusMsg.innerText = "done!";

            } catch (error) {
                console.error(error);
                statusMsg.innerText = "error: check console or api key";
            }
        };
    </script>
</body>
</html>
