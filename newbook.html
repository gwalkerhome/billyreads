<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billy Reads | Añadir Nuevo Libro</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-blue: #4a90e2;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container {
            width: 100%; max-width: 500px;
            background: white; border-radius: 20px;
            padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 { font-family: var(--mc-font); color: #2c3e50; text-align: center; margin-top: 0; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; font-size: 0.9rem; }
        
        input[type="text"], input[type="file"] {
            width: 100%; padding: 12px;
            border: 2px solid #edf2f7; border-radius: 12px;
            box-sizing: border-box; font-size: 1rem;
        }

        .btn-save {
            width: 100%; padding: 18px;
            background: var(--accent-blue); color: white;
            border: none; border-radius: 15px;
            font-family: var(--mc-font); font-size: 1.1rem;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-save:disabled { background: #cbd5e0; cursor: not-allowed; }

        #status {
            margin-top: 15px; text-align: center;
            font-size: 0.85rem; color: #7f8c8d;
        }

        .nav-footer { margin-top: 20px; width: 100%; max-width: 500px; }
        #btn-back {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            background: #eee; color: #666; font-family: var(--mc-font);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NUEVO LIBRO</h1>
        
        <div class="input-group">
            <label>Título del Libro</label>
            <input type="text" id="bookTitle" placeholder="Ej: El Dragón Lector">
        </div>

        <div class="input-group">
            <label>Portada (Thumbnail)</label>
            <input type="file" id="coverImg" accept="image/*">
        </div>

        <div class="input-group">
            <label>Fondo Mágico (Backdrop)</label>
            <input type="file" id="backdropImg" accept="image/*">
        </div>

        <button id="saveBtn" class="btn-save" onclick="saveNewBook()">GUARDAR LIBRO</button>
        <div id="status"></div>
    </div>

    <div class="nav-footer">
        <button id="btn-back" onclick="location.href='magicbooks.html'">CANCELAR</button>
    </div>

    <script type="module">
        import { db, storage, collection, doc, setDoc, ref, uploadBytes, getDownloadURL } from "./firebase-bridge.js";

        async function saveNewBook() {
            const title = document.getElementById('bookTitle').value;
            const coverFile = document.getElementById('coverImg').files[0];
            const backdropFile = document.getElementById('backdropImg').files[0];
            const status = document.getElementById('status');
            const saveBtn = document.getElementById('saveBtn');

            if (!title || !coverFile || !backdropFile) {
                alert("Por favor, rellena todos los campos.");
                return;
            }

            saveBtn.disabled = true;
            status.innerText = "Iniciando subida mágica...";

            try {
                // 1. Create a new Reference for the book to get a unique ID
                const newBookRef = doc(collection(db, "books"));
                const bookId = newBookRef.id;

                // 2. Upload Cover to book-specific folder
                status.innerText = "Subiendo portada...";
                const coverRef = ref(storage, `books/${bookId}/cover`);
                const coverSnap = await uploadBytes(coverRef, coverFile);
                const coverURL = await getDownloadURL(coverSnap.ref);

                // 3. Upload Backdrop to book-specific folder
                status.innerText = "Subiendo fondo...";
                const backdropRef = ref(storage, `books/${bookId}/backdrop`);
                const backdropSnap = await uploadBytes(backdropRef, backdropFile);
                const backdropURL = await getDownloadURL(backdropSnap.ref);

                // 4. Save the Book Document in Firestore
                await setDoc(newBookRef, {
                    title: title,
                    coverURL: coverURL,
                    backdropURL: backdropURL,
                    createdAt: Date.now()
                });

                status.innerText = "¡Libro guardado con éxito!";
                setTimeout(() => location.href = 'magicbooks.html', 1500);

            } catch (error) {
                console.error(error);
                status.innerText = "Error: " + error.message;
                saveBtn.disabled = false;
            }
        }

        window.saveNewBook = saveNewBook;
    </script>
</body>
</html>
