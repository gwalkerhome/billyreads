<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billy Reads | Añadir Nuevo Libro</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-blue: #4a90e2;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: url('assets/addbook.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        
        .container { 
            width: 100%; 
            max-width: 500px; 
            /* THE GLASS EFFECT */
            background: rgba(255, 255, 255, 0.7) !important; 
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%); /* Safari support */
            
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: 0 10px 32px rgba(0,0,0,0.15); 
            box-sizing: border-box; 
            margin-top: 20px;
        }

        h1 { font-family: var(--mc-font); color: #2c3e50; text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; font-size: 0.9rem; }
        
        input[type="text"], input[type="file"] { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid rgba(0,0,0,0.05); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            background: rgba(255, 255, 255, 0.8); 
        }

        .btn-save { 
            width: 100%; 
            padding: 18px; 
            background: var(--accent-blue); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-family: var(--mc-font); 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: background 0.2s; 
        }
        .btn-save:active { background: #357abd; }
        .btn-save:disabled { background: #cbd5e0; }

        #status { margin-top: 15px; text-align: center; font-size: 0.85rem; color: #2c3e50; font-weight: bold; min-height: 1.5em; }
        
        .nav-footer { margin-top: 20px; width: 100%; max-width: 500px; }
        #btn-back { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 12px; 
            background: rgba(0, 0, 0, 0.7); 
            color: white; 
            font-family: var(--mc-font); 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NUEVO LIBRO</h1>
        <div class="input-group">
            <label>Título del Libro</label>
            <input type="text" id="bookTitle" placeholder="Ej: El Dragón Lector">
        </div>
        <div class="input-group">
            <label>Portada (Thumbnail)</label>
            <input type="file" id="coverImg" accept="image/*">
        </div>
        <div class="input-group">
            <label>Fondo Mágico (Backdrop)</label>
            <input type="file" id="backdropImg" accept="image/*">
        </div>
        <button id="saveBtn" class="btn-save">GUARDAR LIBRO</button>
        <div id="status"></div>
    </div>

    <div class="nav-footer">
        <button id="btn-back" onclick="location.href='magicbook.html'">CANCELAR</button>
    </div>

    <script type="module">
        import { db, storage, collection, doc, setDoc, ref, uploadBytes, getDownloadURL } from "./firebase-bridge.js";

        async function saveNewBook() {
            const titleInput = document.getElementById('bookTitle');
            const coverInput = document.getElementById('coverImg');
            const backdropInput = document.getElementById('backdropImg');
            const status = document.getElementById('status');
            const saveBtn = document.getElementById('saveBtn');

            if (!titleInput.value || !coverInput.files[0] || !backdropInput.files[0]) {
                alert("Por favor, rellena todos los campos y selecciona las imágenes.");
                return;
            }

            saveBtn.disabled = true;
            status.style.color = "#2c3e50";
            status.innerText = "⏳ Preparando archivos...";

            try {
                const newBookRef = doc(collection(db, "books"));
                const bookId = newBookRef.id;

                status.innerText = "📤 Subiendo portada...";
                const coverRef = ref(storage, `books/${bookId}/cover`);
                const coverSnap = await uploadBytes(coverRef, coverInput.files[0]);
                const coverURL = await getDownloadURL(coverSnap.ref);

                status.innerText = "📤 Subiendo fondo mágico...";
                const backdropRef = ref(storage, `books/${bookId}/backdrop`);
                const backdropSnap = await uploadBytes(backdropRef, backdropInput.files[0]);
                const backdropURL = await getDownloadURL(backdropSnap.ref);

                status.innerText = "✍️ Escribiendo en la nube...";
                await setDoc(newBookRef, {
                    title: titleInput.value,
                    coverURL: coverURL,
                    backdropURL: backdropURL,
                    createdAt: Date.now()
                });

                status.style.color = "green";
                status.innerText = "✅ ¡Libro guardado con éxito!";
                
                setTimeout(() => {
                    location.href = 'magicbook.html';
                }, 1500);

            } catch (error) {
                console.error("Firebase Error:", error);
                status.style.color = "red";
                status.innerText = "❌ Error: " + error.message;
                saveBtn.disabled = false;
            }
        }

        document.getElementById('saveBtn').onclick = saveNewBook;
    </script>
</body>
</html>
