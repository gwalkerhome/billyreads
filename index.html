<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aventura de Español</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            display: flex; justify-content: center; align-items: center;
        }

        /* 16:9 GOLD STANDARD CANVAS */
        #master-canvas {
            position: relative;
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh; 
            background-image: url('assets/indexback.png');
            background-size: 100% 100%;
            background-position: center;
            overflow: hidden;
        }

        /* MAGIC FLOAT ANIMATION */
        @keyframes magicFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-10px) rotate(1deg); }
            66% { transform: translateY(5px) rotate(-1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .img-nav {
            position: absolute;
            cursor: pointer;
            transition: filter 0.3s ease, scale 0.3s ease;
            animation: magicFloat 6s ease-in-out infinite;
        }

        /* Offset the animation start for the second book so they don't move in perfect sync */
        .delay-float {
            animation-delay: -3s;
        }

        .img-nav:hover {
            filter: brightness(1.2) drop-shadow(0 0 15px rgba(255,255,255,0.5));
            scale: 1.05;
        }

        /* BUTTON POSITIONS & SIZES */
        #btn-read {
            width: 35%; /* Increased size */
            top: 25%;
            left: 10%;
        }

        #btn-magic {
            width: 35%; /* Increased size */
            top: 25%;
            right: 10%;
        }

        #btn-settings {
            width: 18%; /* Size 200 equivalent in 16:9 scale */
            bottom: 5%;
            right: 5%;
            animation-duration: 8s; /* Slower float for settings */
        }
    </style>
</head>
<body>

    <div id="master-canvas">
        
        <img src="assets/readprac.png" 
             id="btn-read"
             class="img-nav" 
             onclick="window.location.href='flashcard.html'">
        
        <img src="assets/magicbook.png" 
             id="btn-magic"
             class="img-nav delay-float" 
             onclick="window.location.href='magicbook.html'">

        <img src="assets/settings.png" 
             id="btn-settings"
             class="img-nav" 
             onclick="window.location.href='settings.html'">

    </div>

</body>
</html>
