<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aventura de Español</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url('assets/indexback.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: transparent !important;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Container for the main two assets */
        .grid-choice {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
        }

        /* Image Button Styling */
        .img-nav {
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
            max-width: 280px; /* Adjust based on your actual image sizes */
            height: auto;
        }

        .img-nav:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .img-nav:active {
            transform: scale(0.98);
        }

        /* Settings specific sizing (usually smaller than main buttons) */
        .img-settings {
            max-width: 80px;
            margin-top: 20px;
        }

        footer {
            width: 100%;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <main class="grid-choice">
            <img src="assets/readprac.png" 
                 alt="Práctica Rápida" 
                 class="img-nav" 
                 onclick="window.location.href='flashcard.html'">
            
            <img src="assets/magicbook.png" 
                 alt="Mi Libro Mágico" 
                 class="img-nav" 
                 onclick="window.location.href='magicbook.html'">
        </main>

        <footer>
            <img src="assets/settings.png" 
                 alt="Configuración" 
                 class="img-nav img-settings" 
                 onclick="window.location.href='settings.html'">
        </footer>

    </div>
</body>
</html>
