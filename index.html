<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aventura de Español</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            display: flex; justify-content: center; align-items: center;
        }

        /* 16:9 GOLD STANDARD CANVAS */
        #master-canvas {
            position: relative;
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh; 
            background-image: url('assets/index.png');
            background-size: 100% 100%;
            background-position: center;
            overflow: hidden;
        }

        /* MAGIC FLOAT ANIMATION */
        @keyframes magicFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-12px) rotate(1.5deg); }
            66% { transform: translateY(6px) rotate(-1.5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .img-nav {
            position: absolute;
            cursor: pointer;
            transition: filter 0.3s ease, scale 0.3s ease;
            animation: magicFloat 7s ease-in-out infinite;
            /* width is auto to maintain proportions based on height */
            width: auto; 
        }

        .delay-float {
            animation-delay: -3.5s;
        }

        .img-nav:hover {
            filter: brightness(1.2) drop-shadow(0 0 20px rgba(255,255,255,0.4));
            scale: 1.03;
        }

        /* BUTTON HEIGHTS & POSITIONS */
        #btn-read {
            height: 45%; /* Set height, width scales automatically */
            top: 25%;
            left: 8%;
        }

        #btn-magic {
            height: 45%; /* Same height as the other button for visual balance */
            top: 25%;
            right: 8%;
        }

        #btn-settings {
            height: 22%; /* Adjusting height for the 200px look */
            bottom: 5%;
            right: 4%;
            animation-duration: 9s; 
        }
    </style>
</head>
<body>

    <div id="master-canvas">
        
        <img src="assets/readprac.png" 
             id="btn-read"
             class="img-nav" 
             onclick="window.location.href='flashcard.html'">
        
        <img src="assets/magbook.png" 
             id="btn-magic"
             class="img-nav delay-float" 
             onclick="window.location.href='magicbook.html'">

        <img src="assets/settings.png" 
             id="btn-settings"
             class="img-nav" 
             onclick="window.location.href='settings.html'">

    </div>

</body>
</html>
