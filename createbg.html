<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blueprint Architect: Prompt Gen</title>
    <style>
        :root { --mc-font: 'Arial Black', sans-serif; --accent: #4a90e2; }
        
        body, html {
            margin: 0; padding: 0; background: #111;
            height: 100vh; width: 100vw; overflow: hidden; font-family: var(--mc-font);
            display: flex; justify-content: center; align-items: center;
        }

        /* LOCKED 16:9 CANVAS */
        #master-canvas {
            position: relative;
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh; 
            background: #00FF00; /* Pure Green Screen */
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* SAFE ZONE VISUAL GUIDE */
        #safe-zone-guide {
            position: absolute;
            top: 5%; left: 5%; width: 90%; height: 90%;
            border: 2px dashed rgba(0, 0, 255, 0.3);
            pointer-events: none;
            z-index: 5;
        }

        .dynamic-pane {
            position: absolute; 
            border: 2px dashed rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.4); color: black; font-size: 10px;
            text-align: center; font-weight: bold; cursor: pointer;
            z-index: 10;
        }

        .active { border: 3px solid #000 !important; background: rgba(255, 255, 255, 0.8) !important; z-index: 100; }
        
        #control-panel {
            position: fixed; right: 20px; top: 20px; width: 240px;
            background: rgba(0,0,0,0.9); color: white; padding: 15px;
            border-radius: 12px; border: 1px solid #444; z-index: 1000;
        }
        
        label { font-size: 10px; color: var(--accent); display: block; margin-top: 10px; }
        input[type=range] { width: 100%; }
        
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        #gen-btn { background: var(--accent); color: white; }
        #back-btn { background: #333; color: #ccc; }

        /* MODAL FOR PROMPT */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal { background: #1a1a1a; padding: 20px; border-radius: 15px; width: 90%; max-width: 600px; border: 1px solid var(--accent); }
        textarea { width: 100%; height: 350px; background: #000; color: #76FF03; font-family: monospace; font-size: 12px; padding: 15px; border: 1px solid #333; box-sizing: border-box; resize: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="master-canvas">
        <div id="safe-zone-guide"></div>
        
        <div id="pane-back" class="dynamic-pane" onclick="selectPane('pane-back')">EXIT</div>
        <div id="pane-birch" class="dynamic-pane" onclick="selectPane('pane-birch')">HEADING</div>
        <div id="pane-stone" class="dynamic-pane" onclick="selectPane('pane-stone')">FOCUS</div>
        <div id="pane-record" class="dynamic-pane" onclick="selectPane('pane-record')">REC</div>
        <div id="pane-speech" class="dynamic-pane" onclick="selectPane('pane-speech')">LISTEN</div>
        <div id="pane-valenciano" class="dynamic-pane" onclick="selectPane('pane-valenciano')">TRANS</div>
        <div id="pane-val-toggle" class="dynamic-pane" onclick="selectPane('pane-val-toggle')">TOGGLE</div>
        <div id="pane-slab" class="dynamic-pane" onclick="selectPane('pane-slab')">SUBTITLE</div>
    </div>

    <div id="control-panel">
        <h3 id="panel-title" style="margin:0; color:var(--accent); font-size: 14px;">BLUEPRINT EDITOR</h3>
        <div id="active-label" style="font-size: 11px; margin-bottom: 10px;">Select a panel</div>

        <label>TOP %</label><input type="range" id="val-top" min="0" max="100" oninput="updateUI()">
        <label>LEFT %</label><input type="range" id="val-left" min="0" max="100" oninput="updateUI()">
        <label>WIDTH %</label><input type="range" id="val-width" min="1" max="100" oninput="updateUI()">
        <label>HEIGHT %</label><input type="range" id="val-height" min="1" max="100" oninput="updateUI()">
        
        <button id="gen-btn" onclick="generateStrictPrompt()">GENERATE AI PROMPT</button>
        <button id="back-btn" onclick="window.location.href='themes.html'">BACK TO THEMES</button>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 style="color:var(--accent); margin:0;">AI ARCHITECT PROMPT</h3>
            <textarea id="prompt-box" readonly></textarea>
            <button onclick="copyPrompt()" style="background: var(--accent); color:white;">COPY & CLOSE</button>
        </div>
    </div>

    <script type="module">
        import { getGlobalTheme } from "./firebase-bridge.js";
        
        let activeId = null;
        let layout = {};

        async function init() {
            const cloudState = await getGlobalTheme();
            // Load current layout so we start from existing positions
            layout = (cloudState && cloudState.layout) ? cloudState.layout : {
                'pane-back': {t:7, l:6, w:9, h:15},
                'pane-birch': {t:5, l:20, w:41, h:9},
                'pane-stone': {t:24, l:43, w:45, h:31},
                'pane-record': {t:66, l:37, w:27, h:11},
                'pane-speech': {t:23, l:32, w:10, h:18},
                'pane-valenciano': {t:56, l:14, w:53, h:6},
                'pane-val-toggle': {t:50, l:7, w:6, h:12},
                'pane-slab': {t:79, l:18, w:57, h:8}
            };

            Object.keys(layout).forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    const p = layout[id];
                    el.style.top = p.t + '%'; el.style.left = p.l + '%';
                    el.style.width = p.w + '%'; el.style.height = p.h + '%';
                }
            });
        }

        window.selectPane = (id) => {
            if(activeId) document.getElementById(activeId).classList.remove('active');
            activeId = id;
            document.getElementById(id).classList.add('active');
            document.getElementById('active-label').innerText = "Editing: " + id.replace('pane-','').toUpperCase();
            
            const p = layout[id];
            document.getElementById('val-top').value = p.t;
            document.getElementById('val-left').value = p.l;
            document.getElementById('val-width').value = p.w;
            document.getElementById('val-height').value = p.h;
        }

        window.updateUI = () => {
            if(!activeId) return;
            const t = parseInt(document.getElementById('val-top').value);
            const l = parseInt(document.getElementById('val-left').value);
            const w = parseInt(document.getElementById('val-width').value);
            const h = parseInt(document.getElementById('val-height').value);
            
            const el = document.getElementById(activeId);
            el.style.top = t+'%'; el.style.left = l+'%';
            el.style.width = w+'%'; el.style.height = h+'%';
            layout[activeId] = {t, l, w, h};
        }

        window.generateStrictPrompt = () => {
            const p = layout;
            const prompt = `Role & Context: Act as an Architectural Illustrator specializing in children's educational interface design. 3D style (16:9 aspect ratio). Functional Constraint: Text panels must be empty. \n\nIllustrated features (buttons/toggles) must be physical parts of environment. \n\nNO text/labeling. \n\n[Layout: \n\nText panels: position and size\n\n(heading)L:${p['pane-birch'].l}%, T:${p['pane-birch'].t}%, W:${p['pane-birch'].w}%, H:${p['pane-birch'].h}%\n(Main focus panel): L:${p['pane-stone'].l}%, T:${p['pane-stone'].t}%, W:${p['pane-stone'].w}%, H:${p['pane-stone'].h}%\n(Subtitle panel): L:${p['pane-slab'].l}%, T:${p['pane-slab'].t}%, W:${p['pane-slab'].w}%, H:${p['pane-slab'].h}%\n(Transcribe panel): L:${p['pane-valenciano'].l}%, T:${p['pane-valenciano'].t}%, W:${p['pane-valenciano'].w}%, H:${p['pane-valenciano'].h}%\n\nVisible assets; position and size\nListen: L:${p['pane-speech'].l}%, T:${p['pane-speech'].t}%, W:${p['pane-speech'].w}%, H:${p['pane-speech'].h}%\nRecord: L:${p['pane-record'].l}%, T:${p['pane-record'].t}%, W:${p['pane-record'].w}%, H:${p['pane-record'].h}%\n(Exit): L:${p['pane-back'].l}%, T:${p['pane-back'].t}%, W:${p['pane-back'].w}%, H:${p['pane-back'].h}%\n(Toggle switch): L:${p['pane-val-toggle'].l}%, T:${p['pane-val-toggle'].t}%, W:${p['pane-val-toggle'].w}%, H:${p['pane-val-toggle'].h}%\n\nTheme/mood =`;
            
            document.getElementById('prompt-box').value = prompt;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        window.copyPrompt = () => {
            const copyText = document.getElementById("prompt-box");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            document.getElementById('modal-overlay').style.display = 'none';
            alert("Prompt copied to clipboard!");
        }

        init();
    </script>
</body>
</html>
