<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blueprint Architect: Gold Sync</title>
    <style>
        :root { --mc-font: 'Arial Black', sans-serif; --accent: #4a90e2; }
        
        body, html {
            margin: 0; padding: 0; background: #111;
            height: 100vh; width: 100vw; overflow: hidden; font-family: var(--mc-font);
        }

        /* GOLD STANDARD CONTAINER */
        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            background-color: #00FF00; /* Green screen fallback */
        }

        .dynamic-pane {
            position: absolute; border: 2px dashed rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.3); color: black; font-size: 9px;
            text-align: center; font-weight: bold; overflow: hidden;
        }

        .active { border: 3px solid #000 !important; background: rgba(255, 255, 255, 0.7) !important; z-index: 100; }
        
        #control-panel {
            position: fixed; right: 20px; top: 20px; width: 240px;
            background: rgba(0,0,0,0.85); color: white; padding: 15px;
            border-radius: 12px; border: 1px solid #444; z-index: 1000;
        }
        
        button { width: 100%; padding: 10px; margin-top: 8px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; }
        #gen-btn { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="pane-back" class="dynamic-pane" onclick="selectPane('pane-back')">EXIT</div>
        <div id="pane-birch" class="dynamic-pane" onclick="selectPane('pane-birch')">TITLE</div>
        <div id="pane-stone" class="dynamic-pane" onclick="selectPane('pane-stone')">TEXT</div>
        <div id="pane-record" class="dynamic-pane" onclick="selectPane('pane-record')">REC</div>
        <div id="pane-speech" class="dynamic-pane" onclick="selectPane('pane-speech')">AUDIO</div>
        <div id="pane-valenciano" class="dynamic-pane" onclick="selectPane('pane-valenciano')">TRANS</div>
        <div id="pane-val-toggle" class="dynamic-pane" onclick="selectPane('pane-val-toggle')">V</div>
        <div id="pane-slab" class="dynamic-pane" onclick="selectPane('pane-slab')">SUBS</div>
    </div>

    <div id="control-panel">
        <h3 id="panel-title" style="margin:0; color:var(--accent);">BLUEPRINT EDITOR</h3>
        <label>TOP %</label><input type="range" id="val-top" min="0" max="100" oninput="updateUI()">
        <label>LEFT %</label><input type="range" id="val-left" min="0" max="100" oninput="updateUI()">
        <label>WIDTH %</label><input type="range" id="val-width" min="1" max="100" oninput="updateUI()">
        <label>HEIGHT %</label><input type="range" id="val-height" min="1" max="100" oninput="updateUI()">
        <button id="gen-btn" onclick="generateStrictPrompt()">GENERATE BLUEPRINT</button>
        <button onclick="window.location.href='themes.html'">BACK</button>
    </div>

    <script type="module">
        import { getGlobalTheme } from "./firebase-bridge.js";
        let activeId = 'pane-stone';
        let layout = {};

        async function init() {
            const cloudState = await getGlobalTheme();
            const container = document.getElementById('game-container');
            layout = (cloudState && cloudState.layout) ? cloudState.layout : {};
            if (cloudState && cloudState.activeThemeUrl) container.style.backgroundImage = `url('${cloudState.activeThemeUrl}')`;

            Object.keys(layout).forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    const p = layout[id];
                    el.style.top = p.t + '%'; el.style.left = p.l + '%';
                    el.style.width = p.w + '%'; el.style.height = p.h + '%';
                }
            });
            window.selectPane(activeId);
        }

        window.selectPane = (id) => {
            activeId = id;
            const p = layout[id] || {t:0, l:0, w:10, h:10};
            document.getElementById('val-top').value = p.t;
            document.getElementById('val-left').value = p.l;
            document.getElementById('val-width').value = p.w;
            document.getElementById('val-height').value = p.h;
        }

        window.updateUI = () => {
            const t = parseInt(document.getElementById('val-top').value);
            const l = parseInt(document.getElementById('val-left').value);
            const w = parseInt(document.getElementById('val-width').value);
            const h = parseInt(document.getElementById('val-height').value);
            const el = document.getElementById(activeId);
            el.style.top = t+'%'; el.style.left = l+'%';
            el.style.width = w+'%'; el.style.height = h+'%';
            layout[activeId] = {t, l, w, h};
        }

        init();
    </script>
</body>
</html>
