<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blueprint Architect: 3:2 Cloud Sync</title>
    <style>
        :root { 
            --mc-font: 'Arial Black', sans-serif; 
            --accent: #4a90e2;
            --canvas-green: #00FF00;
        }
        
        /* Synchronized with flashcard and winadjust */
        body, html {
            margin: 0; padding: 0; background: #111;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: var(--mc-font);
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        /* Maintain 3:2 aspect ratio lock for iPad architecting */
        #canvas-viewport {
            position: relative;
            width: 100vw;
            height: 66.66vw; 
            max-height: 100vh;
            max-width: 150vh; 
            background: var(--canvas-green);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .blueprint-pane {
            position: absolute; border: 2px dashed rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: black; font-size: 9px; box-sizing: border-box;
            background: rgba(255,255,255,0.3);
            text-align: center; font-weight: bold; transition: background 0.2s;
        }

        .active { 
            border: 3px solid #000 !important; 
            background: rgba(255, 255, 255, 0.7) !important; 
            z-index: 100; 
        }
        
        #control-panel {
            position: fixed; right: 20px; top: 20px; width: 240px;
            background: rgba(0,0,0,0.85); color: white; padding: 15px;
            border-radius: 12px; border: 1px solid #444; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        input[type=range] { width: 100%; margin: 5px 0 12px 0; accent-color: var(--accent); }
        
        button { 
            width: 100%; padding: 10px; margin-top: 8px; border: none; 
            border-radius: 6px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; font-size: 10px;
        }
        #gen-btn { background: var(--accent); color: white; }
        #back-btn { background: #333; color: white; }
        .pos-label { font-size: 10px; color: #76FF03; margin-bottom: 8px; display: block; }
        
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); display: none; 
            justify-content: center; align-items: center; z-index: 2000;
        }
        .modal {
            background: #1a1a1a; padding: 20px; border-radius: 12px;
            width: 90%; max-width: 550px; border: 2px solid var(--accent);
        }
        #prompt-output {
            width: 100%; height: 300px; background: #000; color: #76FF03; 
            font-family: monospace; font-size: 11px; padding: 12px; 
            border: 1px solid #333; box-sizing: border-box; resize: none;
        }
    </style>
</head>
<body>

    <div id="canvas-viewport">
        <div id="pane-back" class="blueprint-pane" onclick="selectPane('pane-back')">EXIT</div>
        <div id="pane-birch" class="blueprint-pane" onclick="selectPane('pane-birch')">TITLE</div>
        <div id="pane-stone" class="blueprint-pane" onclick="selectPane('pane-stone')">PRIMARY TEXT</div>
        <div id="pane-record" class="blueprint-pane" onclick="selectPane('pane-record')">REC</div>
        <div id="pane-speech" class="blueprint-pane" onclick="selectPane('pane-speech')">AUDIO</div>
        <div id="pane-valenciano" class="blueprint-pane" onclick="selectPane('pane-valenciano')">TRANS</div>
        <div id="pane-val-toggle" class="blueprint-pane" onclick="selectPane('pane-val-toggle')">TOGGLE</div>
        <div id="pane-slab" class="blueprint-pane" onclick="selectPane('pane-slab')">SUBS</div>
    </div>

    <div id="control-panel">
        <h3 id="panel-title" style="margin:0 0 10px 0; color:var(--accent); font-size: 14px;">BLUEPRINT EDITOR</h3>
        <span id="pos-info" class="pos-label">Cargando Nube...</span>

        <label style="font-size: 9px; color:#888;">TOP %</label><input type="range" id="val-top" min="0" max="100" oninput="updateUI()">
        <label style="font-size: 9px; color:#888;">LEFT %</label><input type="range" id="val-left" min="0" max="100" oninput="updateUI()">
        <label style="font-size: 9px; color:#888;">WIDTH %</label><input type="range" id="val-width" min="1" max="100" oninput="updateUI()">
        <label style="font-size: 9px; color:#888;">HEIGHT %</label><input type="range" id="val-height" min="1" max="100" oninput="updateUI()">
        
        <button id="gen-btn" onclick="generateStrictPrompt()">GENERATE BLUEPRINT PROMPT</button>
        <button id="back-btn" onclick="window.location.href='themes.html'">BACK TO THEMES</button>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h2 style="color: var(--accent); margin-top:0; font-size: 18px;">Blueprint-First Prompt</h2>
            <textarea id="prompt-output" readonly></textarea>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="copyToClipboard()" style="background:#76FF03; color:black; flex:1">COPY</button>
                <button onclick="document.getElementById('modal-overlay').style.display='none'" style="background:#444; color:white; flex:1">CLOSE</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { getGlobalTheme } from "./firebase-bridge.js";

        let activeId = 'pane-stone';
        let layout = {};

        async function init() {
            // Pull real coordinates from Cloud to ensure prompt matches current iPad view
            const cloudState = await getGlobalTheme();
            
            if (cloudState && cloudState.layout) {
                layout = cloudState.layout;
                // Preview the active theme in the background behind the green screen
                if (cloudState.activeThemeUrl) {
                    document.body.style.backgroundImage = `url('${cloudState.activeThemeUrl}')`;
                }
            } else {
                // Fallback defaults
                layout = {
                    'pane-back': {t:12, l:3, w:9, h:15},
                    'pane-birch': {t:5, l:30, w:41, h:9},
                    'pane-stone': {t:27, l:28, w:45, h:27},
                    'pane-record': {t:66, l:37, w:27, h:11},
                    'pane-speech': {t:39, l:75, w:10, h:18},
                    'pane-valenciano': {t:75, l:26, w:53, h:6},
                    'pane-val-toggle': {t:75, l:18, w:6, h:12},
                    'pane-slab': {t:90, l:22, w:57, h:6}
                };
            }

            Object.keys(layout).forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    const p = layout[id];
                    el.style.top = p.t + '%'; el.style.left = p.l + '%';
                    el.style.width = p.w + '%'; el.style.height = p.h + '%';
                }
            });
            window.selectPane(activeId);
        }

        window.selectPane = (id) => {
            document.querySelectorAll('.blueprint-pane').forEach(el => el.classList.remove('active'));
            activeId = id;
            document.getElementById(id).classList.add('active');
            document.getElementById('panel-title').innerText = id.replace('pane-', '').toUpperCase();
            
            const p = layout[id];
            if (p) {
                document.getElementById('val-top').value = p.t;
                document.getElementById('val-left').value = p.l;
                document.getElementById('val-width').value = p.w;
                document.getElementById('val-height').value = p.h;
                updatePosLabel(p);
            }
        }

        window.updateUI = () => {
            const t = parseInt(document.getElementById('val-top').value);
            const l = parseInt(document.getElementById('val-left').value);
            const w = parseInt(document.getElementById('val-width').value);
            const h = parseInt(document.getElementById('val-height').value);
            
            const el = document.getElementById(activeId);
            el.style.top = t+'%'; el.style.left = l+'%';
            el.style.width = w+'%'; el.style.height = h+'%';
            
            layout[activeId] = {t, l, w, h};
            updatePosLabel(layout[activeId]);
        }

        function updatePosLabel(p) {
            document.getElementById('pos-info').innerText = `T:${p.t}% L:${p.l}% | W:${p.w}% H:${p.h}%`;
        }

        window.generateStrictPrompt = () => {
            const modal = document.getElementById('modal-overlay');
            const output = document.getElementById('prompt-output');
            modal.style.display = 'flex';
            
            let prompt = "Role: Architectural UI Illustrator.\n";
            prompt += "Task: Design a thematic environment AROUND a pre-existing 3:2 structural blueprint.\n\n";
            prompt += "STRICT OPERATING PROTOCOL:\n";
            prompt += "1. FOUNDATION FIRST: Elements are FIXED in 3D space. Do NOT move or ignore coordinates.\n";
            prompt += "2. ILLUSTRATE AROUND: Environment must incorporate these zones as physical parts of the architecture.\n";
            prompt += "3. ZERO INTERFERENCE: Windows must remain FLAT and EMPTY. No focal points inside.\n";
            prompt += "4. NO TEXT: No labels. Use only physical 3D symbols.\n\n";
            
            const names = {
                'pane-stone': 'PRIMARY TEXT FIELD',
                'pane-birch': 'SUBJECT TITLE WINDOW',
                'pane-valenciano': 'SECONDARY TRANSLATION WINDOW',
                'pane-slab': 'SUBTITLE BAR'
            };

            const features = {
                'pane-back': 'EXIT MECHANISM',
                'pane-val-toggle': 'LANGUAGE TOGGLE SWITCH',
                'pane-record': 'RECORDING INTERFACE',
                'pane-speech': 'AUDIO SPEAKER'
            };

            prompt += "[CLEAR WINDOWS]\n";
            Object.keys(names).forEach(id => {
                const p = layout[id];
                if(p) prompt += `- ${names[id]}: Fixed at ${p.l}% Left, ${p.t}% Top. Size: ${p.w}% Width, ${p.h}% Height.\n`;
            });

            prompt += "\n[THEMATIC FEATURES]\n";
            Object.keys(features).forEach(id => {
                const p = layout[id];
                if(p) prompt += `- ${features[id]}: Fixed at ${p.l}% Left, ${p.t}% Top. Size: ${p.w}% Width, ${p.h}% Height.\n`;
            });

            prompt += "\nFINAL RULES: No text. 3D Style. Theme must wrap around anchors.\n\nTheme/Mood = ";
            output.value = prompt;
        }

        window.copyToClipboard = () => {
            const box = document.getElementById('prompt-output');
            box.select();
            navigator.clipboard.writeText(box.value);
            alert("Blueprint Prompt Copied!");
        }

        init();
    </script>
</body>
</html>
