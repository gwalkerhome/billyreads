<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Handshake</title>
    <style>
        body { background: #1A202C; color: #A0AEC0; font-family: monospace; padding: 20px; }
        .console { 
            background: #000; padding: 20px; border-radius: 12px; border: 1px solid #4A5568; 
            min-height: 200px; color: #4ADE80; font-size: 14px; margin-bottom: 15px;
        }
        .btn { background: #3182CE; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>TESTING MODEL: gemini-2.5-flash</h2>
    <div id="console-output" class="console">> Waiting for command...</div>
    
    <button class="btn" onclick="pingModel()">SEND PING</button>
    <button class="btn" style="background:#4A5568;" onclick="window.location.href='settings.html'">BACK TO SETTINGS</button>

    <script>
        async function pingModel() {
            const output = document.getElementById('console-output');
            const apiKey = localStorage.getItem('gemini_key');
            output.innerText = "> Sending request...";

            // Targeted URL based on your scan results
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Respond with: SYSTEM ONLINE 2.5" }] }] })
                });

                const data = await response.json();
                
                if (data.candidates) {
                    output.innerText = `> SUCCESS: ${data.candidates[0].content.parts[0].text}`;
                    output.style.color = "#4ADE80";
                } else {
                    output.innerText = `> API ERROR: ${JSON.stringify(data.error)}`;
                    output.style.color = "#F87171";
                }
            } catch (err) {
                output.innerText = `> CONNECTION ERROR: ${err.message}`;
                output.style.color = "#F87171";
            }
        }
    </script>
</body>
</html>
