<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Discovery: BillyReads</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #222; color: #eee; }
        .box { max-width: 800px; margin: 0 auto; background: #333; padding: 20px; border-radius: 12px; border: 1px solid #444; }
        h2 { color: #76FF03; }
        pre { background: #000; color: #0f0; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 14px; border: 1px solid #555; min-height: 60px; white-space: pre-wrap; }
        .btn { width: 100%; padding: 15px; background: #4a90e2; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: background 0.2s; }
        .btn:hover { background: #357abd; }
        .back-link { color: #999; display: block; margin-top: 20px; text-align: center; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="box">
    <h2>📡 OpenAI Model Discovery</h2>
    <p>Click below to verify your key and see the latest **GPT-5.4** models available to your account.</p>

    <button class="btn" onclick="testConnection()">VERIFY CONNECTION & MODELS</button>

    <div id="results-area" style="margin-top:20px;">
        <pre id="status-box">Waiting for command...</pre>
    </div>

    <a href="settings.html" class="back-link">← Back to Settings</a>
</div>

<script>
    async function testConnection() {
        // Must match the ID used in your settings.html
        const apiKey = localStorage.getItem('gemini-key'); 
        const statusBox = document.getElementById('status-box');
        
        if (!apiKey || apiKey.trim() === "") {
            statusBox.style.color = "#ff4444";
            statusBox.innerText = "Error: No API key found. Please save it in Settings first.";
            return;
        }

        statusBox.style.color = "#0f0";
        statusBox.innerText = "Connecting to OpenAI Gateway...";

        try {
            // Updated to use the OpenAI 2026 Models endpoint
            const response = await fetch('https://api.openai.com/v1/models', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                }
            });

            const data = await response.json();

            if (response.ok) {
                // Filter for the new 2026 GPT-5.4 series and GPT-4.5
                const relevantModels = data.data
                    .map(m => m.id)
                    .filter(id => id.includes('gpt-5') || id.includes('gpt-4'))
                    .sort()
                    .slice(0, 8);

                statusBox.style.color = "#76FF03";
                statusBox.innerText = "✅ CONNECTION SUCCESSFUL!\n\nAvailable Models:\n" + 
                                     relevantModels.map(name => `• ${name}`).join("\n");
                
                console.log("Full model list:", data.data);
            } else {
                statusBox.style.color = "#ff4444";
                const errorMsg = data.error ? data.error.message : "Unknown API Error";
                statusBox.innerText = `❌ API ERROR (${response.status}):\n${errorMsg}`;
            }
        } catch (err) {
            statusBox.style.color = "#ff4444";
            statusBox.innerText = "⚠️ NETWORK FAILURE:\n" + err.message + 
                                 "\n\nCheck your iPad's internet connection or if OpenAI is blocked.";
        }
    }
</script>

</body>
</html>
