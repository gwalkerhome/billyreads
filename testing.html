<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Discovery: BillyReads</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #222; color: #eee; }
        .box { max-width: 800px; margin: 0 auto; background: #333; padding: 20px; border-radius: 12px; border: 1px solid #444; }
        h2 { color: #76FF03; }
        pre { background: #000; color: #0f0; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 14px; border: 1px solid #555; }
        .btn { width: 100%; padding: 15px; background: #4a90e2; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .model-item { padding: 10px; border-bottom: 1px solid #444; color: #AACCFF; }
    </style>
</head>
<body>

<div class="box">
    <h2>📡 API Model Discovery</h2>
    <p>Click below to find the exact model name that works with your key.</p>

    <button class="btn" onclick="listModels()">FETCH AVAILABLE MODELS</button>

    <div id="results-area" style="margin-top:20px;">
        <pre id="output">Waiting for command...</pre>
    </div>

    <a href="settings.html" style="color: #999; display: block; margin-top: 20px; text-align: center;">Back to Settings</a>
</div>

<script>
    async function listModels() {
        const apiKey = localStorage.getItem('gemini_key');
        const output = document.getElementById('output');
        
        if (!apiKey) {
            output.innerText = "ERROR: No API Key found in storage. Please save it in Settings first.";
            return;
        }

        output.innerText = "Querying Google for allowed models...";

        const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (response.ok) {
                // We want to see the list of names
                let modelNames = data.models.map(m => m.name.replace('models/', '')).join('\n');
                output.innerText = "SUCCESS! AVAILABLE MODELS:\n\n" + modelNames;
                console.log(data);
            } else {
                output.innerText = "API ERROR: " + JSON.stringify(data, null, 2);
            }
        } catch (err) {
            output.innerText = "NETWORK ERROR: " + err.message;
        }
    }
</script>

</body>
</html>
