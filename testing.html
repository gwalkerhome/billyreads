<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Discovery: BillyReads</title>
    <style>
        :root {
            --mc-font: 'Arial Black', Gadget, sans-serif;
            --accent-blue: #4a90e2;
            --mc-green: #76FF03;
            --gemini-color: #8ab4f8;
            --openai-color: #10a37f;
        }

        body { 
            font-family: sans-serif; margin: 0; padding: 20px; 
            background: #1a1a1a; color: #eee; 
            display: flex; flex-direction: column; align-items: center;
        }

        .split-container {
            display: flex; gap: 20px; width: 100%; max-width: 1200px;
            flex-wrap: wrap;
        }

        .box { 
            flex: 1; min-width: 340px; background: #2a2a2a; 
            padding: 25px; border-radius: 15px; border: 1px solid #444; 
            display: flex; flex-direction: column; gap: 15px;
        }

        h2 { font-family: var(--mc-font); font-size: 1.1rem; margin-top: 0; }
        .openai-title { color: var(--openai-color); }
        .gemini-title { color: var(--gemini-color); }

        label { font-size: 0.8rem; font-weight: bold; color: #999; }
        
        input[type="password"] {
            width: 100%; padding: 12px; background: #111; border: 1px solid #444;
            border-radius: 8px; color: #fff; box-sizing: border-box;
        }

        .btn-row { display: flex; gap: 10px; }
        
        .btn { 
            flex: 2; padding: 12px; color: white; border: none; 
            border-radius: 8px; font-weight: bold; cursor: pointer; 
            font-size: 14px; transition: opacity 0.2s;
        }

        .save-btn { flex: 1; background: #444; font-size: 0.7rem; }
        .fetch-btn { background: var(--accent-blue); }

        pre { 
            background: #000; color: #0f0; padding: 15px; border-radius: 8px; 
            overflow-y: auto; font-size: 13px; border: 1px solid #333; 
            height: 200px; white-space: pre-wrap; margin: 0;
        }

        .back-link { 
            color: #7f8c8d; display: block; margin-top: 30px; 
            text-align: center; text-decoration: none; font-size: 0.9rem; 
        }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

    <h1 style="font-family: var(--mc-font); margin-bottom: 30px;">API Gateway Tester</h1>

    <div class="split-container">
        
        <div class="box">
            <h2 class="openai-title">📡 OpenAI Gateway</h2>
            
            <label>API Key</label>
            <input type="password" id="openai-key-input" placeholder="sk-...">
            
            <div class="btn-row">
                <button class="btn save-btn" onclick="saveKey('openai')">SAVE</button>
                <button class="btn fetch-btn" onclick="testOpenAI()">DISCOVER MODELS</button>
            </div>

            <pre id="openai-status">Waiting for OpenAI command...</pre>
        </div>

        <div class="box">
            <h2 class="gemini-title">✨ Gemini Gateway</h2>
            
            <label>API Key</label>
            <input type="password" id="gemini-key-input" placeholder="AIza...">
            
            <div class="btn-row">
                <button class="btn save-btn" onclick="saveKey('gemini')">SAVE</button>
                <button class="btn fetch-btn" onclick="testGemini()">DISCOVER MODELS</button>
            </div>

            <pre id="gemini-status">Waiting for Gemini command...</pre>
        </div>

    </div>

    <a href="settings.html" class="back-link">← Return to Command Center</a>

    <script>
        // Load keys on startup
        window.onload = () => {
            document.getElementById('openai-key-input').value = localStorage.getItem('openai_key') || '';
            document.getElementById('gemini-key-input').value = localStorage.getItem('gemini_key') || '';
        };

        function saveKey(type) {
            const key = document.getElementById(`${type}-key-input`).value.trim();
            localStorage.setItem(`${type}_key`, key);
            alert(`${type.toUpperCase()} key updated.`);
        }

        async function testOpenAI() {
            const apiKey = localStorage.getItem('openai_key');
            const status = document.getElementById('openai-status');
            
            if (!apiKey) {
                status.innerText = "Error: No OpenAI key found.";
                return;
            }

            status.style.color = "#0f0";
            status.innerText = "Connecting to OpenAI...";

            try {
                const response = await fetch('https://api.openai.com/v1/models', {
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });
                const data = await response.json();

                if (response.ok) {
                    const relevant = data.data
                        .map(m => m.id)
                        .filter(id => id.includes('gpt-4') || id.includes('gpt-5'))
                        .sort().reverse().slice(0, 10);
                    
                    status.innerText = "✅ OPENAI SUCCESS\n\nModels found:\n" + relevant.map(m => `• ${m}`).join("\n");
                } else {
                    status.style.color = "#f44";
                    status.innerText = `❌ ERROR: ${data.error.message}`;
                }
            } catch (e) {
                status.style.color = "#f44";
                status.innerText = "⚠️ Network Failure: " + e.message;
            }
        }

        async function testGemini() {
            const apiKey = localStorage.getItem('gemini_key');
            const status = document.getElementById('gemini-status');
            
            if (!apiKey) {
                status.innerText = "Error: No Gemini key found.";
                return;
            }

            status.style.color = "#0f0";
            status.innerText = "Connecting to Google AI Studio...";

            try {
                // Gemini Discovery URL
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await response.json();

                if (response.ok) {
                    const relevant = data.models
                        .map(m => m.name.replace('models/', ''))
                        .filter(name => name.includes('flash') || name.includes('pro'))
                        .sort().reverse();
                    
                    status.innerText = "✅ GEMINI SUCCESS\n\nModels found:\n" + relevant.map(m => `• ${m}`).join("\n");
                } else {
                    status.style.color = "#f44";
                    status.innerText = `❌ ERROR: ${data.error.message}`;
                }
            } catch (e) {
                status.style.color = "#f44";
                status.innerText = "⚠️ Network Failure: " + e.message;
            }
        }
    </script>
</body>
</html>
