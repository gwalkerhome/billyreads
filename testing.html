<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Diagnostics: BillyReads</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; color: #333; line-height: 1.6; }
        .test-box { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #4a90e2; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .status { padding: 15px; margin: 15px 0; border-radius: 8px; font-weight: bold; }
        .idle { background: #eee; }
        .working { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        pre { background: #222; color: #0f0; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 13px; }
        .btn-test { width: 100%; padding: 15px; background: #4a90e2; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .back-link { display: block; margin-top: 20px; text-align: center; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="test-box">
    <h2>🛠️ API Connection Test</h2>
    <p>This page tests if your <strong>Gemini API Key</strong> is valid and if the <strong>2026 Model</strong> is responding.</p>

    <div id="status-box" class="status idle">Ready to test connection...</div>

    <button class="btn-test" onclick="runTest()">RUN MISSION CHECK</button>

    <div id="results" style="display:none; margin-top:20px;">
        <label><strong>Server Response:</strong></label>
        <pre id="raw-output">Waiting for data...</pre>
    </div>

    <a href="settings.html" class="back-link">⬅ Back to Command Center</a>
</div>

<script>
    async function runTest() {
        const statusBox = document.getElementById('status-box');
        const resultsDiv = document.getElementById('results');
        const output = document.getElementById('raw-output');
        
        // Handshake: Pulling the key you just saved in Settings
        const apiKey = localStorage.getItem('gemini_key');
        
        if (!apiKey) {
            statusBox.className = "status error";
            statusBox.innerText = "❌ FAILED: No API Key found in storage.";
            return;
        }

        statusBox.className = "status working";
        statusBox.innerText = "📡 CONTACTING GEMINI SERVERS...";
        resultsDiv.style.display = "block";
        output.innerText = "Sending request to: v1beta/models/gemini-3.1-flash-lite-preview...";

        // The 2026 Frontier Endpoint
        const model = "gemini-3.1-flash-lite-preview";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

        const payload = {
            contents: [{
                parts: [{ text: "Respond with only one word: 'CONNECTED'" }]
            }]
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                statusBox.className = "status success";
                statusBox.innerText = "✅ SUCCESS: Connection Established!";
                output.innerText = JSON.stringify(data, null, 2);
            } else {
                statusBox.className = "status error";
                statusBox.innerText = `❌ ERROR ${response.status}: ${data.error ? data.error.message : 'Unknown Error'}`;
                output.innerText = JSON.stringify(data, null, 2);
            }
        } catch (err) {
            statusBox.className = "status error";
            statusBox.innerText = "❌ NETWORK CRASH: Could not reach Google.";
            output.innerText = err.toString();
        }
    }
</script>

</body>
</html>
