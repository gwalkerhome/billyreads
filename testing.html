<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Discovery: BillyReads</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #222; color: #eee; }
        .box { max-width: 800px; margin: 0 auto; background: #333; padding: 20px; border-radius: 12px; border: 1px solid #444; }
        h2 { color: #76FF03; }
        pre { background: #000; color: #0f0; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 14px; border: 1px solid #555; }
        .btn { width: 100%; padding: 15px; background: #4a90e2; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .model-item { padding: 10px; border-bottom: 1px solid #444; color: #AACCFF; }
    </style>
</head>
<body>

<div class="box">
    <h2>📡 API Model Discovery</h2>
    <p>Click below to find the exact model name that works with your key.</p>

    <button class="btn" onclick="listModels()">FETCH AVAILABLE MODELS</button>

    <div id="results-area" style="margin-top:20px;">
        <pre id="output">Waiting for command...</pre>
    </div>

    <a href="settings.html" style="color: #999; display: block; margin-top: 20px; text-align: center;">Back to Settings</a>
</div>

<script>
    async function testConnection() {
    // We use the exact ID from your settings page
    const apiKey = localStorage.getItem('gemini-key'); 
    const statusBox = document.getElementById('status-box');
    
    if (!apiKey) {
        statusBox.innerText = "Error: No se encontró ninguna clave en memoria.";
        return;
    }

    statusBox.innerText = "Conectando con la pasarela de OpenAI...";

    try {
        // We call the models list to verify the key and see the 2026 lineup
        const response = await fetch('https://api.openai.com/v1/models', {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${apiKey}`
            }
        });

        const data = await response.json();

        if (response.ok) {
            // Filter to show the relevant GPT-5 and GPT-4 models
            const relevantModels = data.data
                .map(m => m.id)
                .filter(id => id.includes('gpt-5') || id.includes('gpt-4'))
                .slice(0, 5)
                .join(", ");

            statusBox.style.color = "#76FF03";
            statusBox.innerText = "¡CONEXIÓN EXITOSA!\nModelos detectados: " + relevantModels;
        } else {
            statusBox.style.color = "#ff4444";
            statusBox.innerText = `ERROR ${data.error.code || 'API'}: ${data.error.message}`;
        }
    } catch (err) {
        statusBox.style.color = "#ff4444";
        statusBox.innerText = "Fallo de conexión: " + err.message;
    }
}
</script>

</body>
</html>
